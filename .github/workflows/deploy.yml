name: CI Build & Deploy (Legacy)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: softfactory
  DEFAULT_DOCKER_NAMESPACE: piwpiw99

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.meta.outputs.can_deploy }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_full: ${{ steps.meta.outputs.image_full }}
      image_latest: ${{ steps.meta.outputs.image_latest }}
      docker_username: ${{ steps.meta.outputs.docker_username }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image metadata and deploy safety mode
        id: meta
        run: |
          DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}'
          DOCKER_PASSWORD='${{ secrets.DOCKER_PASSWORD }}'
          DOCKER_NAMESPACE='${{ vars.DOCKER_NAMESPACE }}'
          if [[ -z "$DOCKER_NAMESPACE" ]]; then
            DOCKER_NAMESPACE='${{ env.DEFAULT_DOCKER_NAMESPACE }}'
          fi
          if [[ -z "$DOCKER_USERNAME" ]]; then
            DOCKER_USERNAME="$DOCKER_NAMESPACE"
          fi

          if [[ -n "$DOCKER_USERNAME" && -n "$DOCKER_PASSWORD" ]]; then
            IMAGE_NAME="${DOCKER_USERNAME}/softfactory"
            CAN_DEPLOY="true"
          else
            IMAGE_NAME="${DOCKER_NAMESPACE}/softfactory"
            CAN_DEPLOY="false"
            echo "::notice::Missing DOCKER_PASSWORD, deployment is skipped safely."
          fi

          IMAGE_TAG="legacy-$(echo '${{ github.sha }}' | cut -c1-8)"
          IMAGE_FULL="${{ env.REGISTRY }}/$IMAGE_NAME:$IMAGE_TAG"
          IMAGE_LATEST="${{ env.REGISTRY }}/$IMAGE_NAME:latest"

          echo "can_deploy=${CAN_DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE_FULL}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "docker_username=${DOCKER_USERNAME}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.can_deploy == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate OpenAPI from routes
        run: python scripts/generate_openapi.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ needs.prepare.outputs.docker_username }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_full }}
            ${{ needs.prepare.outputs.image_latest }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.image_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.prepare.outputs.image_tag }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.prepare.outputs.image_full }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  deploy:
    name: Deploy to Legacy Host
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    if: ${{ needs.build-and-push.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (safe no-op if host not configured)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            if [[ -z "${{ secrets.SSH_HOST }}" || -z "${{ secrets.SSH_PRIVATE_KEY }}" ]]; then
              echo "Legacy deploy skipped: SSH host/key are not configured."
              exit 0
            fi

            set -euo pipefail
            echo "Deploy to legacy host ${{ secrets.SSH_HOST }}"
            docker pull "${{ needs.prepare.outputs.image_full }}"
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
            if [[ -z "${DEPLOY_DIR}" ]]; then
              DEPLOY_DIR="/opt/softfactory"
            fi
            mkdir -p "${DEPLOY_DIR}"
            echo "Deploy command placeholder: image=${{ needs.prepare.outputs.image_full }}"
            echo "Legacy deploy script intentionally kept minimal in this workflow."

  notify:
    name: Notify via Telegram (if configured)
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, deploy]
    if: always()
    steps:
      - name: Deployment summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION:            ${{ needs.prepare.outputs.image_tag }}
          IMAGE:              ${{ needs.prepare.outputs.image_full }}
          DEPLOY_RESULT:      ${{ needs.deploy.result }}
          PREP_RESULT:        ${{ needs.prepare.outputs.can_deploy }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Telegram not configured. Skip notification."
            exit 0
          fi

          if [[ "$PREP_RESULT" != "true" ]]; then
            ICON="[SKIP]"
            STATUS="LEGACY DEPLOY SKIPPED: Missing DOCKER_PASSWORD."
          elif [[ "$DEPLOY_RESULT" == "success" ]]; then
            ICON="[OK]"
            STATUS="Legacy deployment completed."
          else
            ICON="[FAIL]"
            STATUS="Legacy deployment failed."
          fi

          MESSAGE="${ICON} Legacy Deploy - ${STATUS}%0AVersion: ${VERSION}%0AImage: ${IMAGE}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            -d text="${MESSAGE}"
