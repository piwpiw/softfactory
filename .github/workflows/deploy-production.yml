name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Exact image tag to deploy (e.g. v1.2.3). Defaults to latest main.'
        required: false
        default: ''
      skip_health_check:
        description: 'Skip pre-deploy health check (emergency only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  REGISTRY: docker.io
  IMAGE_NAME: piwpiw99/softfactory
  DEFAULT_DOCKER_NAMESPACE: piwpiw99
  APP_PORT: "8000"
  CANARY_PORT: "9002"
  PROD_PORT: "9000"

# Never run two production deploys simultaneously
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # STAGE 1: Determine version / tag
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.version.outputs.version }}
      image_tag:  ${{ steps.version.outputs.image_tag }}
      image_full: ${{ steps.version.outputs.image_full }}
      can_deploy: ${{ steps.version.outputs.can_deploy }}
      image_latest: ${{ steps.version.outputs.image_latest }}
      docker_username: ${{ steps.version.outputs.docker_username }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          SECRET_DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          SECRET_DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          DOCKER_USERNAME="${SECRET_DOCKER_USERNAME}"
          DOCKER_PASSWORD="${SECRET_DOCKER_PASSWORD}"
          DOCKER_NAMESPACE="${{ vars.DOCKER_NAMESPACE }}"

          MISSING=()
          [[ -z "$DOCKER_PASSWORD" ]] && MISSING+=("DOCKER_PASSWORD")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            printf -v joined '%s,' "${MISSING[@]}"
            joined="${joined%,}"
            echo "::error::Required registry secret is missing: ${joined}"
            echo "::error::Set DOCKER_PASSWORD in repository Actions secrets and re-run deploy-production."
            exit 1
          fi

          if [[ -z "$DOCKER_NAMESPACE" ]]; then
            DOCKER_NAMESPACE="${{ env.DEFAULT_DOCKER_NAMESPACE }}"
          fi
          if [[ -z "$DOCKER_USERNAME" ]]; then
            DOCKER_USERNAME="$DOCKER_NAMESPACE"
          fi
          IMAGE_NAME="${DOCKER_USERNAME}/softfactory"
          CAN_DEPLOY="true"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.image_tag }}" ]]; then
            VERSION="${{ github.event.inputs.image_tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v0.0.0-sha-${GITHUB_SHA::8}"
          fi

          IMAGE_TAG="${VERSION}"
          IMAGE_FULL="${{ env.REGISTRY }}/${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${IMAGE_NAME}:latest"

          echo "version=${VERSION}"    >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE_FULL}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "can_deploy=${CAN_DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "docker_username=${DOCKER_USERNAME}" >> "$GITHUB_OUTPUT"

          echo "Deploying version: ${VERSION}"
          echo "Image: ${IMAGE_FULL}"
          echo "Can deploy: ${CAN_DEPLOY}"

  # ---------------------------------------------------------------------------
  # STAGE 2: Build & push production image (tagged + latest)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.can_deploy == 'true' }}

    steps:
      - name: Validate production SSH secrets
        env:
          SECRET_PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          SECRET_PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          SECRET_PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SECRET_DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          MISSING=()
          [[ -z "$SECRET_DOCKER_PASSWORD" ]] && MISSING+=("DOCKER_PASSWORD")
          [[ -z "$SECRET_PRODUCTION_HOST" ]] && MISSING+=("PRODUCTION_HOST")
          [[ -z "$SECRET_PRODUCTION_USER" ]] && MISSING+=("PRODUCTION_USER")
          [[ -z "$SECRET_PRODUCTION_SSH_KEY" ]] && MISSING+=("PRODUCTION_SSH_KEY")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            printf -v joined '%s,' "${MISSING[@]}"
            joined="${joined%,}"
            echo "::error::Required production deploy secrets are missing: ${joined}"
            echo "::error::Set these in repository Actions secrets, then re-run deploy-production."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate OpenAPI from routes
        run: python scripts/generate_openapi.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ needs.prepare.outputs.docker_username }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_full }}
            ${{ needs.prepare.outputs.image_latest }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.prepare.outputs.version }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.prepare.outputs.image_full }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # STAGE 3: Manual approval gate (environment: production)
  # ---------------------------------------------------------------------------
  approval:
    name: Awaiting Manual Approval
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    if: ${{ needs.build-and-push.result == 'success' }}
    environment: production      # <- configure required reviewers in repo settings

    steps:
      - name: Approved
        run: |
          echo "Production deployment approved by: ${{ github.actor }}"
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "Image: ${{ needs.prepare.outputs.image_full }}"

  # ---------------------------------------------------------------------------
  # STAGE 4: Pre-flight health check on current production
  # ---------------------------------------------------------------------------
  pre-flight:
    name: Pre-Flight Health Check
    runs-on: ubuntu-latest
    needs: [prepare, approval]
    if: ${{ needs.prepare.outputs.can_deploy == 'true' }}

    steps:
      - name: Check current production health
        env:
          PROD_HOST: ${{ secrets.PRODUCTION_HOST }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.skip_health_check }}" == "true" ]]; then
            echo "Skip pre-flight health check by manual request."
            exit 0
          fi

          if [[ -z "$PROD_HOST" ]]; then
            echo "::warning::PRODUCTION_HOST not set, skip pre-flight health check."
            exit 0
          fi

          echo "Checking current production state before swap..."
          PROD_PORT="${{ env.PROD_PORT }}"
          STATUS=$(curl -sf --max-time 10 "http://${PROD_HOST}:${PROD_PORT}/ready" \
            -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
          echo "Current production HTTP status: ${STATUS}"
          if [[ "${STATUS}" == "000" ]]; then
            echo "::warning::Production is already unreachable proceeding with deploy"
          else
            echo "Production is healthy, proceeding with zero-downtime swap"
          fi

  # ---------------------------------------------------------------------------
  # STAGE 5: Deploy to production with automatic rollback
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, approval, pre-flight]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      needs.approval.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (zero-downtime)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_FULL:      ${{ needs.prepare.outputs.image_full }}
          IMAGE_TAG:       ${{ needs.prepare.outputs.image_tag }}
          VERSION:         ${{ needs.prepare.outputs.version }}
          DOCKER_USERNAME: ${{ needs.prepare.outputs.docker_username }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          GIT_SHA:         ${{ github.sha }}
          APP_PORT:        ${{ env.APP_PORT }}
          CANARY_PORT:     ${{ env.CANARY_PORT }}
          PROD_PORT:       ${{ env.PROD_PORT }}
        with:
          host:     ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key:      ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          envs: IMAGE_FULL,IMAGE_TAG,VERSION,DOCKER_USERNAME,DOCKER_PASSWORD,GIT_SHA,APP_PORT,CANARY_PORT,PROD_PORT
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/softfactory/production"
            HEALTH_URL="http://localhost:${PROD_PORT}/ready"
            HEALTH_RETRIES=10
            HEALTH_INTERVAL=6  # seconds; total wait = 60s

            log() { echo "[$(date '+%H:%M:%S')] $*"; }

            #  1. Pull image 
            log "Pulling image: $IMAGE_FULL"
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker pull "$IMAGE_FULL"

            #  2. Save current container as rollback target ?
            if docker ps -q --filter name=softfactory-prod | grep -q .; then
              log "Saving current container as rollback: softfactory-prod"
              CURRENT_IMAGE=$(docker inspect softfactory-prod \
                --format '{{.Config.Image}}' 2>/dev/null || echo "")
              echo "$CURRENT_IMAGE" > "$DEPLOY_DIR/rollback_image.txt"
              log "Rollback image saved: $CURRENT_IMAGE"
            else
              log "No existing container first deploy"
            fi

            #  3. Start new container alongside old 
            log "Starting new container on canary port ${CANARY_PORT}..."
            docker stop softfactory-canary 2>/dev/null || true
            docker rm   softfactory-canary 2>/dev/null || true

            docker run -d \
              --name softfactory-canary \
              --restart no \
              -p "${CANARY_PORT}:${APP_PORT}" \
              --env-file "$DEPLOY_DIR/.env" \
              -e GIT_SHA="$GIT_SHA" \
              -e VERSION="$VERSION" \
              -v "$DEPLOY_DIR/logs:/app/logs" \
              "$IMAGE_FULL"

            #  4. Health check on canary 
            log "Health-checking canary on port ${CANARY_PORT} (${HEALTH_RETRIES} retries)..."
            RETRY=0
            HEALTHY=false
            while [[ $RETRY -lt $HEALTH_RETRIES ]]; do
              CODE=$(curl -sf --max-time 5 "http://localhost:${CANARY_PORT}/ready" \
                -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
              if [[ "$CODE" == "200" ]]; then
                log "Canary healthy (attempt $((RETRY+1)))"
                HEALTHY=true
                break
              fi
              log "Canary not ready yet [${CODE}], waiting ${HEALTH_INTERVAL}s... ($((RETRY+1))/${HEALTH_RETRIES})"
              sleep $HEALTH_INTERVAL
              RETRY=$((RETRY + 1))
            done

            if [[ "$HEALTHY" != "true" ]]; then
              log "ERROR: Canary health check failed aborting deploy"
              docker stop softfactory-canary 2>/dev/null || true
              docker rm   softfactory-canary 2>/dev/null || true
              exit 1
            fi

            #  5. Swap: stop old, promote canary to prod ?
            log "Swapping: stopping old production container..."
            docker stop softfactory-prod 2>/dev/null || true
            docker rm   softfactory-prod 2>/dev/null || true

            log "Renaming canary -> prod"
            docker stop softfactory-canary
            docker rm   softfactory-canary

            docker run -d \
              --name softfactory-prod \
              --restart unless-stopped \
              -p "${PROD_PORT}:${APP_PORT}" \
              --env-file "$DEPLOY_DIR/.env" \
              -e GIT_SHA="$GIT_SHA" \
              -e VERSION="$VERSION" \
              -v "$DEPLOY_DIR/logs:/app/logs" \
              "$IMAGE_FULL"

            #  6. Final health check on production port ?
            log "Final health check on production port ${PROD_PORT}..."
            RETRY=0
            FINAL_HEALTHY=false
            while [[ $RETRY -lt 10 ]]; do
              CODE=$(curl -sf --max-time 10 "${HEALTH_URL}" \
                -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
              if [[ "$CODE" == "200" ]]; then
                FINAL_HEALTHY=true
                break
              fi
              RETRY=$((RETRY + 1))
              sleep 5
            done

            if [[ "$FINAL_HEALTHY" != "true" ]]; then
              log "CRITICAL: Post-swap health check failed initiating automatic rollback"

              ROLLBACK_IMAGE=$(cat "$DEPLOY_DIR/rollback_image.txt" 2>/dev/null || echo "")
              if [[ -n "$ROLLBACK_IMAGE" ]]; then
                log "Rolling back to: $ROLLBACK_IMAGE"
                docker stop softfactory-prod 2>/dev/null || true
                docker rm   softfactory-prod 2>/dev/null || true
                docker run -d \
                  --name softfactory-prod \
                  --restart unless-stopped \
                  -p "${PROD_PORT}:${APP_PORT}" \
                  --env-file "$DEPLOY_DIR/.env" \
                  "$ROLLBACK_IMAGE"
                log "Rollback complete. Previous version restored."
                docker logs softfactory-prod --tail=40 || true
              else
                log "No rollback image found cannot auto-rollback"
              fi
              exit 1
            fi

            #  7. Cleanup ?
            log "Deployment successful: $IMAGE_TAG"
            docker image prune -f --filter "label=app=softfactory" 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # STAGE 6: Post-deployment verification
  # ---------------------------------------------------------------------------
  verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: ${{ needs.deploy.result == 'success' }}

    steps:
      - name: Run production smoke tests
        env:
          PROD_URL: http://${{ secrets.PRODUCTION_HOST }}:${{ env.PROD_PORT }}
          VERSION:  ${{ needs.prepare.outputs.version }}
        run: |
          python - <<'EOF'
          import os, sys
          import urllib.request
          from urllib.parse import urlparse

          base = os.environ.get("BASE_URL", os.environ.get("PROD_URL", ""))
          version = os.environ["VERSION"]

          parsed = urlparse(base)
          if not (parsed.scheme in {"http", "https"} and parsed.hostname):
            print("No valid PROD_URL configured. Skip smoke verification.")
            sys.exit(0)

          checks = [
              ("/ready",               200),
              ("/health",              200),
              ("/api/platform/stats",  200),
          ]

          failed = 0
          for path, expected in checks:
              url = f"{base}{path}"
              try:
                  resp = urllib.request.urlopen(url, timeout=10)
                  code = resp.getcode()
                  ok   = (code == expected)
              except Exception as e:
                  code, ok = 0, False
              mark = "OK" if ok else "FAIL"
              print(f"  [{mark}] {code} {path}")
              if not ok:
                  failed += 1

          print(f"\n{len(checks) - failed}/{len(checks)} smoke tests passed (version={version})")
          sys.exit(1 if failed > 0 else 0)
          EOF
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # STAGE 7: Telegram notification
  # ---------------------------------------------------------------------------
  notify:
    name: Notify via Telegram
    runs-on: ubuntu-latest
    needs: [prepare, deploy, verify]
    if: always()

    steps:
      - name: Send deployment summary to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION:       ${{ needs.prepare.outputs.version }}
          IMAGE_TAG:     ${{ needs.prepare.outputs.image_tag }}
          CAN_DEPLOY:    ${{ needs.prepare.outputs.can_deploy }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
          ACTOR:         ${{ github.actor }}
          SHA:           ${{ github.sha }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$CAN_DEPLOY" != "true" ]]; then
            ICON="[SKIP]"
            STATUS="DEPLOY SKIPPED: Missing container publish credential (DOCKER_PASSWORD)"
          elif [[ "$DEPLOY_RESULT" == "success" ]]; then
            ICON="[OK]"
            STATUS="DEPLOYED TO PRODUCTION"
          else
            ICON="[FAIL]"
            STATUS="PRODUCTION DEPLOY FAILED"
          fi

          if [[ "$VERIFY_RESULT" == "success" ]]; then
            VERIFY_ICON="[PASS]"
          else
            VERIFY_ICON="[FAIL]"
          fi

          MESSAGE="${ICON} *SoftFactory ${STATUS}*

          Version: \`${VERSION}\`
          Image: \`${IMAGE_TAG}\`
          Commit: \`${SHA::8}\`
          Actor: ${ACTOR}

          Smoke Tests: ${VERIFY_ICON} ${VERIFY_RESULT}

          [View Run](${RUN_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            -d text="${MESSAGE}"


