name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: branch SHA)'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: piwpiw99/softfactory
  DEFAULT_DOCKER_NAMESPACE: piwpiw99
  APP_PORT: "8000"
  STAGING_PORT: "9001"

# Prevent concurrent staging deploys
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # STAGE 1: Prepare image metadata and gate deployment
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.meta.outputs.can_deploy }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_full: ${{ steps.meta.outputs.image_full }}
      image_latest: ${{ steps.meta.outputs.image_latest }}
      docker_username: ${{ steps.meta.outputs.docker_username }}

    steps:
      - name: Resolve image metadata and deployment safety mode
        id: meta
        run: |
          DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}'
          DOCKER_PASSWORD='${{ secrets.DOCKER_PASSWORD }}'
          DOCKER_NAMESPACE='${{ vars.DOCKER_NAMESPACE }}'
          REQUESTED_TAG='${{ github.event.inputs.image_tag }}'
          if [[ -z "$DOCKER_NAMESPACE" ]]; then
            DOCKER_NAMESPACE='${{ env.DEFAULT_DOCKER_NAMESPACE }}'
          fi
          if [[ -z "$DOCKER_USERNAME" ]]; then
            DOCKER_USERNAME="$DOCKER_NAMESPACE"
          fi

          if [[ -n "$DOCKER_USERNAME" && -n "$DOCKER_PASSWORD" ]]; then
            IMAGE_NAME="${DOCKER_USERNAME}/softfactory"
            CAN_DEPLOY="true"
          else
            IMAGE_NAME="${DOCKER_NAMESPACE}/softfactory"
            CAN_DEPLOY="false"
            echo "::notice::Missing DOCKER_PASSWORD. Staging deploy will be skipped."
          fi

          if [[ -n "$REQUESTED_TAG" ]]; then
            IMAGE_TAG="$REQUESTED_TAG"
          else
            IMAGE_TAG="staging-${GITHUB_SHA::8}"
          fi
          IMAGE_FULL="${{ env.REGISTRY }}/${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${IMAGE_NAME}:staging-latest"

          echo "can_deploy=${CAN_DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE_FULL}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "docker_username=${DOCKER_USERNAME}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # STAGE 2: Build & push Docker image to Docker Hub
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.can_deploy == 'true' }}
    outputs:
      image_tag: ${{ needs.prepare.outputs.image_tag }}
      image_full: ${{ needs.prepare.outputs.image_full }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate OpenAPI from routes
        run: python scripts/generate_openapi.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ needs.prepare.outputs.docker_username }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_full }}
            ${{ needs.prepare.outputs.image_latest }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.prepare.outputs.image_tag }}

  # ---------------------------------------------------------------------------
  # STAGE 3: Deploy to staging server
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' && secrets.STAGING_HOST != '' && secrets.STAGING_USER != '' && secrets.STAGING_SSH_KEY != '' }}
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_FULL: ${{ needs.build-and-push.outputs.image_full }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DOCKER_USERNAME: ${{ needs.prepare.outputs.docker_username }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          GIT_SHA: ${{ github.sha }}
          APP_PORT: ${{ env.APP_PORT }}
          STAGING_PORT: ${{ env.STAGING_PORT }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          envs: IMAGE_FULL,IMAGE_TAG,DOCKER_USERNAME,DOCKER_PASSWORD,GIT_SHA,APP_PORT,STAGING_PORT
          script: |
            if [[ -z "${{ secrets.STAGING_HOST }}" || -z "${{ secrets.STAGING_SSH_KEY }}" ]]; then
              echo "Staging deploy skipped: host or SSH key not configured."
              exit 0
            fi

            set -euo pipefail

            echo "[deploy] Pulling image: $IMAGE_FULL"
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker pull "$IMAGE_FULL"

            echo "[deploy] Stopping old container (if any)"
            docker stop softfactory-staging 2>/dev/null || true
            docker rm   softfactory-staging 2>/dev/null || true

            echo "[deploy] Starting new container"
            docker run -d \
              --name softfactory-staging \
              --restart unless-stopped \
              -p "${STAGING_PORT}:${APP_PORT}" \
              --env-file /opt/softfactory/staging/.env \
              -e GIT_SHA="$GIT_SHA" \
              -e IMAGE_TAG="$IMAGE_TAG" \
              -v /opt/softfactory/staging/logs:/app/logs \
              "$IMAGE_FULL"

            echo "[deploy] Waiting for staging health check up to 45s..."
            RETRY=0
            HEALTHY=false
            while [[ $RETRY -lt 9 ]]; do
              if curl -sf "http://localhost:${STAGING_PORT}/health" >/dev/null; then
                HEALTHY=true
                break
              fi
              RETRY=$((RETRY + 1))
              sleep 5
            done

            echo "[deploy] Verifying health"
            if [[ "$HEALTHY" != "true" ]]; then
              docker logs softfactory-staging --tail=80
              exit 1
            fi

            echo "[deploy] Staging deployment complete: $IMAGE_TAG"

  # ---------------------------------------------------------------------------
  # STAGE 4: Integration tests against staging
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ needs.deploy.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        suite: [pytest, smoke]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
        if: matrix.suite == 'pytest'

      - name: Install test dependencies
        if: matrix.suite == 'pytest'
        run: |
          pip install requests pytest pytest-timeout

      - name: Wait for staging to warm up
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ env.STAGING_PORT }}
        run: |
          if [[ -z "$STAGING_HOST" ]]; then
            echo "STAGING_HOST missing, skip integration tests."
            exit 0
          fi
          URL="http://${STAGING_HOST}:${STAGING_PORT}/health"
          echo "Polling staging health: ${URL}"
          RETRY=0
          while [[ $RETRY -lt 12 ]]; do
            CODE=$(curl -sf --max-time 5 "${URL}" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [[ "$CODE" == "200" ]]; then
              echo "Staging is healthy."
              exit 0
            fi
            RETRY=$((RETRY + 1))
            echo "Attempt ${RETRY}/12 failed [${CODE}], wait 5s..."
            sleep 5
          done
          echo "Staging health endpoint not ready after poll timeout."
          exit 0

      - name: Run tests
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          BASE_URL: http://${{ secrets.STAGING_HOST }}:${{ env.STAGING_PORT }}
          STAGING_DEMO_TOKEN: demo_token
        run: |
          BASE_URL="${BASE_URL}"
          if [[ -z "$STAGING_HOST" ]]; then
            echo "STAGING_HOST missing. skip checks."
            exit 0
          fi

          if [[ "${{ matrix.suite }}" == "smoke" ]]; then
            echo "Running smoke endpoint checks..."
            python - <<'EOF'
          import os
          import urllib.parse
          import urllib.request

          base = os.environ["BASE_URL"]
          parsed = urllib.parse.urlparse(base)
          if not (parsed.scheme in {"http", "https"} and parsed.hostname):
              print("No valid BASE_URL configured. Skip smoke verification.")
              raise SystemExit(0)

          def check(label, url, expect_status=200):
              try:
                  req = urllib.request.Request(url)
                  resp = urllib.request.urlopen(req, timeout=10)
                  code = resp.getcode()
                  ok = (code == expect_status)
                  print(f"{'OK' if ok else 'FAIL'} [{code}] {label}: {url}")
                  return ok
              except Exception as e:
                  print(f"FAIL [ERR] {label}: {e}")
                  return False

          results = [
              check("Health",          f"{base}/health"),
              check("Platform API",    f"{base}/api/platform/stats"),
          ]

          failed = results.count(False)
          print(f"\n{len(results) - failed}/{len(results)} checks passed")
          raise SystemExit(1 if failed > 0 else 0)
          EOF
          fi

          if [[ "${{ matrix.suite }}" == "pytest" ]]; then
            echo "Running integration suite..."
            python -m pytest tests/integration/ \
              -v \
              --tb=short \
              --timeout=60 \
              -m "smoke or integration" \
              --ignore=tests/integration/test_cross_validation.py \
              -k "not slow"
            exit $?
          fi


  # ---------------------------------------------------------------------------
  # STAGE 5: Telegram notification
  # ---------------------------------------------------------------------------
  notify:
    name: Notify via Telegram
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, deploy, integration-tests]
    if: always()

    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          IMAGE_TAG:          ${{ needs.prepare.outputs.image_tag }}
          IMAGE_FULL:         ${{ needs.prepare.outputs.image_full }}
          DEPLOY_STATUS:      ${{ needs.deploy.result }}
          TEST_STATUS:        ${{ needs.integration-tests.result }}
          CAN_DEPLOY:         ${{ needs.prepare.outputs.can_deploy }}
          ACTOR:              ${{ github.actor }}
          REF:                ${{ github.ref_name }}
          SHA:                ${{ github.sha }}
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Telegram not configured. Skip notification."
            exit 0
          fi

          if [[ "$CAN_DEPLOY" != "true" ]]; then
            ICON="[SKIP]"
            STATUS_TEXT="Skipped: missing DOCKER_PASSWORD"
          elif [[ "$DEPLOY_STATUS" == "success" ]]; then
            ICON="[OK]"
            STATUS_TEXT="DEPLOYED"
          else
            ICON="[FAIL]"
            STATUS_TEXT="FAILED"
          fi

          if [[ "$TEST_STATUS" == "success" ]]; then
            TEST_ICON="[PASS]"
          elif [[ "$TEST_STATUS" == "skipped" ]]; then
            TEST_ICON="[SKIP]"
          else
            TEST_ICON="[FAIL]"
          fi

          MESSAGE="${ICON} *SoftFactory Staging ${STATUS_TEXT}*\n\nBranch: \`${REF}\`\nImage: \`${IMAGE_TAG}\`\nImage URI: \`${IMAGE_FULL}\`\nCommit: \`${SHA::8}\`\nActor: ${ACTOR}\n\nTests: ${TEST_ICON} ${TEST_STATUS}\n\n[View Run](${RUN_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            -d text="${MESSAGE}"
