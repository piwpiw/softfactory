    <div class="flex-1 flex flex-col overflow-hidden">

        <div class="flex gap-3">
          <button id="saveCodeBtn" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium text-sm transition">저장</button>
          <button id="runCodeBtn" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg font-medium text-sm transition">실행</button>
        </div>
      </header>

      <main class="flex-1 overflow-hidden flex gap-4 p-4">
        <div class="flex-1 flex flex-col bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
          <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center justify-between">
            <div class="text-sm font-medium text-slate-300"><span class="text-cyan-400">파일</span> workflow.js</div>
            <div class="text-xs text-slate-500">줄: <span id="lineNumber">1</span> | 열: <span id="colNumber">1</span></div>
          </div>
          <div class="flex-1 overflow-hidden relative">
            <textarea id="codeEditor" class="absolute inset-0 bg-slate-900 text-slate-100 p-4 font-mono text-sm resize-none focus:outline-none" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">// AI 워크플로우 예시
// ===================================

async function loadData(source) {
  const response = await fetch(`/api/${source}`);
  return await response.json();
}

function processData(data) {
  return data
    .filter(item => item.active === true)
    .map(item => ({
      id: item.id,
      name: item.name,
      timestamp: new Date().toISOString()
    }));
}

async function saveResult(result) {
  const response = await fetch('/api/workflow/result', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(result)
  });
  return response.ok;
}

async function main() {
  try {
    const rawData = await loadData('data-source');
    const processed = processData(rawData);
    await saveResult({ status: 'success', count: processed.length, data: processed });
    console.log('처리 완료');
  } catch (error) {
    console.error('실행 오류:', error);
  }
}

main();</textarea>
            <pre class="absolute inset-0 bg-slate-900 text-slate-100 p-4 font-mono text-sm pointer-events-none overflow-hidden" id="highlightPre"><code id="highlight" class="language-javascript"></code></pre>
          </div>
        </div>

        <div class="w-80 flex flex-col gap-4 overflow-hidden">
          <div class="flex-1 bg-slate-800 rounded-lg border border-slate-700 overflow-hidden flex flex-col">
            <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 font-semibold text-cyan-400 flex items-center justify-between">
              <span>코드 템플릿</span>
            </div>
            <div class="flex-1 overflow-y-auto p-3 space-y-2 text-sm" id="templatesList">
              <div class="text-slate-500 px-3 py-2">로딩 중...</div>
            </div>
          </div>

          <div class="flex-1 bg-slate-800 rounded-lg border border-slate-700 overflow-hidden flex flex-col">
            <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 font-semibold text-green-400 flex items-center justify-between">
              <span>실행 로그</span>
              <button onclick="clearConsole()" class="text-xs text-slate-400 hover:text-slate-200">초기화</button>
            </div>
            <div class="flex-1 overflow-y-auto p-3 font-mono text-xs bg-slate-900 space-y-1" id="console">
              <div class="text-slate-500">준비됨. 실행 버튼을 눌러 보세요.</div>
            </div>
          </div>
        </div>

    </div>
  </div>

  <script>
    requireAuth();

    const editor = document.getElementById('codeEditor');
    const consoleOutput = document.getElementById('console');
    const templatesList = document.getElementById('templatesList');
    let isExecuting = false;
    const API_BASE = '/api/ai-automation';

    function formatToken(type) {
      const map = { info: '[정보]', success: '[성공]', error: '[오류]', warning: '[주의]', log: '[로그]' };
      return map[type] || '[로그]';
    }

    function addConsoleLog(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = 'console-entry text-slate-200';
      line.textContent = `[${timestamp}] ${formatToken(type)} ${message}`;
      consoleOutput.appendChild(line);
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }

    function clearConsole() {
      consoleOutput.innerHTML = '<div class="text-slate-500 console-entry">콘솔이 초기화되었습니다.</div>';
    }

    function updateHighlight() {
      const code = editor.value;
      const lines = code.substring(0, editor.selectionStart).split('\n');
      document.getElementById('lineNumber').textContent = lines.length;
      document.getElementById('colNumber').textContent = lines[lines.length - 1].length + 1;
      const highlight = document.getElementById('highlight');
      highlight.textContent = code;
      hljs.highlightElement(highlight);
    }

    function syncScroll() {
      const highlight = document.getElementById('highlightPre');
      highlight.scrollTop = editor.scrollTop;
      highlight.scrollLeft = editor.scrollLeft;
    }

    async function loadTemplates() {
      try {
        const response = await fetch(`${API_BASE}/code/templates`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await response.json();
        if (data.templates && data.templates.length > 0) {
          templatesList.innerHTML = data.templates.map((template) => `
            <div onclick="loadTemplate('${template.id}')" class="bg-slate-900 p-3 rounded border border-slate-700 cursor-pointer hover:border-cyan-500 transition">
              <div class="text-cyan-400 font-medium text-sm">${template.name}</div>
              <p class="text-slate-400 text-xs mt-1">${template.description}</p>
            </div>
          `).join('');
        } else {
          templatesList.innerHTML = '<div class="text-slate-500 px-3 py-2">등록된 템플릿이 없습니다.</div>';
        }
      } catch (error) {
        console.error('템플릿 조회 실패:', error);
        templatesList.innerHTML = '<div class="text-red-400 px-3 py-2">템플릿 조회 실패</div>';
      }
    }

    async function loadTemplate(templateId) {
      try {
        const response = await fetch(`${API_BASE}/code/templates/${templateId}`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const template = await response.json();
        if (!template || !template.code) {
          addConsoleLog('템플릿 코드가 없습니다.', 'warning');
          return;
        }
        editor.value = template.code;
        updateHighlight();
        addConsoleLog(`템플릿 불러오기 완료: ${template.name}`, 'success');
      } catch (error) {
        addConsoleLog(`템플릿 로드 실패: ${error.message}`, 'error');
      }
    }

    function saveCode() {
      const code = editor.value;
      localStorage.setItem('customCode', code);
      addConsoleLog('코드가 저장되었습니다.', 'success');
    }

    async function runCode() {
      if (isExecuting) {
        addConsoleLog('현재 실행 중입니다. 잠시 후 다시 시도하세요.', 'warning');
        return;
      }

      const code = editor.value;
      if (!code || !code.trim()) {
        addConsoleLog('실행할 코드가 없습니다.', 'error');
        return;
      }

      clearConsole();
      isExecuting = true;
      addConsoleLog('코드 실행 시작...', 'info');
      const btn = document.getElementById('runCodeBtn');
      if (btn) btn.disabled = true;

      try {
        const validateResponse = await fetch(`${API_BASE}/code/validate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({ code })
        });

        const validate = await validateResponse.json();
        if (!validateResponse.ok || !validate?.valid) {
          addConsoleLog(`검증 실패: ${validate?.error || '문법 오류가 있습니다.'}`, 'error');
          return;
        }

        addConsoleLog('실행 요청 전송...', 'info');
        const runResponse = await fetch(`${API_BASE}/code/run`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({ code })
        });

        const result = await runResponse.json();
        addConsoleLog(`실행 결과: ${result?.message || '성공'}`, runResponse.ok ? 'success' : 'error');
      } catch (error) {
        addConsoleLog(`실행 중 오류: ${error.message}`, 'error');
      } finally {
        isExecuting = false;
        if (btn) btn.disabled = false;
      }
    }

    editor.addEventListener('input', updateHighlight);
    editor.addEventListener('scroll', syncScroll);

    document.getElementById('saveCodeBtn')?.addEventListener('click', saveCode);
    document.getElementById('runCodeBtn')?.addEventListener('click', runCode);

    window.addEventListener('DOMContentLoaded', () => {
      updateHighlight();
      const saved = localStorage.getItem('customCode');
      if (saved) {
        editor.value = saved;
        updateHighlight();
      }
      loadTemplates();
    });
  </script>
  <script src="../mobile-optimization.js" defer></script>
</body>
