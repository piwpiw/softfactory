<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>성과 포트폴리오</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../platform/api.js"></script>
    <style>
        body { font-family: 'Pretendard', 'Inter', 'Noto Sans KR', sans-serif; }
    </style>
    <script src="../mobile-optimization.js" defer></script>
</head>

<body class="bg-slate-950 text-slate-100 overflow-hidden">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
            <div class="p-6 border-b border-slate-800">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-amber-600 to-amber-400 p-0.5 shadow-lg shadow-amber-900/20">
                        <div class="w-full h-full bg-slate-950 rounded-2xl flex items-center justify-center text-2xl">⭐</div>
                    </div>
                    <div>
                        <h1 class="font-black text-white text-lg tracking-tight">리뷰 허브</h1>
                        <p class="text-[10px] text-amber-500 font-bold tracking-[0.2em]">리뷰 포트폴리오</p>
                    </div>
                </div>
            </div>

            <nav class="soft-nav-tree flex-1 p-6 space-y-1.5 overflow-y-auto">
                <button class="hamburger" aria-label="메뉴 열기/닫기"><span></span><span></span><span></span></button>
                <a href="index.html" class="soft-nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-slate-400 font-medium hover:bg-slate-800/50 hover:text-white transition-all">
                    <span>🏠</span><span class="text-sm">리뷰 허브</span>
                </a>
                <a href="aggregator.html" class="soft-nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-slate-400 font-medium hover:bg-slate-800/50 hover:text-white transition-all">
                    <span>🧩</span><span class="text-sm">통합 집계</span>
                </a>
                <a href="my-campaigns.html" class="soft-nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl bg-amber-500/10 text-amber-500 font-bold border-l-2 border-amber-500 transition-all">
                    <span>📝</span><span class="text-sm">성과 포트폴리오</span>
                </a>
            </nav>

            <div class="p-6 border-t border-slate-800">
                <button onclick="if (typeof logout === 'function') { logout(); }" class="w-full text-left p-2 hover:bg-slate-800 rounded-lg text-slate-300">🚪 로그아웃</button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden relative">
            <header class="h-24 px-10 flex items-center justify-between shrink-0 z-40">
                <div>
                    <h2 class="text-3xl font-black text-white tracking-tight">활성 캠페인 포트폴리오</h2>
                    <p class="text-xs text-slate-400 mt-1 font-medium">신규 신청부터 보상 정산까지 진행 상태를 한 눈에 확인하세요.</p>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs bg-slate-800 px-3 py-2 rounded-full border border-slate-700">목표: 신청 → 확정 → 정산</span>
                    <button id="refreshCampaigns" class="px-3 py-2 bg-amber-500/20 border border-amber-500 rounded-lg text-xs hover:bg-amber-500/30">새로고침</button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-10 pt-0">
                <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div class="bg-slate-900 rounded-[2rem] border border-slate-800 p-8 animate-pulse h-64"></div>
                    <div class="bg-slate-900 rounded-[2rem] border border-slate-800 p-8 animate-pulse h-64"></div>
                    <div class="bg-slate-900 rounded-[2rem] border border-slate-800 p-8 animate-pulse h-64"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        requireAuth();

        async function init() {
            try {
                const response = await apiFetch('/api/review/applications');
                const result = await response.json();
                const items = result?.data?.applications || [];
                renderPortfolio(items);
            } catch (err) {
                console.error('Portfolio Error:', err);
                renderPortfolio([]);
            }
        }

        function renderPortfolio(apps) {
            const grid = document.getElementById('portfolio-grid');
            if (!apps.length) {
                grid.innerHTML = '<div class="col-span-full rounded-[2rem] border border-slate-800 bg-slate-900 p-10 text-center text-slate-400">진행 중인 캠페인이 없습니다.</div>';
                return;
            }

            grid.innerHTML = '';
            apps.forEach((app) => {
                const reward = Number(app.reward_value || 0).toLocaleString('ko-KR');
                const status = app.status || '준비';
                const card = `
                    <article class="rounded-[2rem] border border-slate-800 p-8 bg-gradient-to-br from-slate-900/60 to-slate-950">
                        <div class="flex items-start justify-between">
                            <div>
                                <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest">${status}</p>
                                <h4 class="mt-3 text-xl font-black text-white">${app.listing_title || '제목 없음'}</h4>
                                <p class="text-sm text-slate-400 mt-2">${app.account_name || '계정 미지정'}</p>
                            </div>
                            <a href="detail.html?id=${app.listing_id || ''}" class="px-3 py-1 rounded-xl bg-amber-500/10 text-amber-300 text-xs font-black">상세</a>
                        </div>
                        <div class="mt-8 pt-6 border-t border-slate-800">
                            <p class="text-xs text-slate-500">예상 보상</p>
                            <p class="text-2xl font-black text-amber-400">₩ ${reward}</p>
                            <p class="text-xs text-slate-400 mt-2">신청 ID: ${app.id || '-'}</p>
                        </div>
                    </article>
                `;
                grid.innerHTML += card;
            });
        }

        document.getElementById('refreshCampaigns').addEventListener('click', init);
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
