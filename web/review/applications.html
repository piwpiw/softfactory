<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>리워드 및 정산 | 리뷰 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../platform/api.js"></script>
    <style>
        :root {
            --primary-amber: #f59e0b;
            --primary-dark: #020617;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: #020617;
            color: #f8fafc;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .status-applied {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .status-selected {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-completed {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
    </style>
    <script src="../mobile-optimization.js" defer></script>
    <link rel="stylesheet" href="../responsive-framework.css">
</head>
<body class="overflow-hidden bg-slate-950">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 glass-panel border-r border-slate-800/50 flex flex-col z-50">
            <div class="p-8 border-b border-slate-800/50">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-amber-600 to-amber-400 p-0.5">
                        <div class="w-full h-full bg-slate-950 rounded-2xl flex items-center justify-center text-2xl">🧾</div>
                    </div>
                    <div>
                        <h1 class="font-black text-white text-lg tracking-tight uppercase">리뷰Engine</h1>
                        <p class="text-[10px] text-amber-500 font-bold tracking-[0.2em]">PLATINUM EDITION</p>
                    </div>
                </div>
            </div>

            <nav class="soft-nav-tree flex-1 p-6 space-y-1.5 overflow-y-auto">
                <button class="hamburger" aria-label="메뉴 열기/닫기"><span></span><span></span><span></span></button>
                <p class="text-[10px] font-black text-slate-500 uppercase px-4 mb-4 tracking-widest text-slate-400">재무 센터</p>
                <a href="index.html" class="soft-nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-slate-400 font-medium hover:bg-slate-800/50 hover:text-white transition-all">
                    <span>🧠</span><span class="text-sm">AI 전략</span>
                </a>
                <a href="aggregator.html" class="soft-nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-slate-400 font-medium hover:bg-slate-800/50 hover:text-white transition-all">
                    <span>📥</span><span class="text-sm">통합 집계</span>
                </a>
                <a href="applications.html" class="soft-nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl bg-amber-500/10 text-amber-500 font-bold border-l-2 border-amber-500 transition-all">
                    <span>💳</span><span class="text-sm">정산/보상 (Settlements)</span>
                </a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden relative">
            <header class="h-24 px-10 flex items-center justify-between shrink-0 z-40">
                <div>
                    <h2 class="text-3xl font-black text-white tracking-tight">리워드 및 정산</h2>
                    <p class="text-xs text-slate-400 mt-1 font-medium">지원 현황과 정산 내역을 한눈에 확인하세요.</p>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20 px-6 py-3 rounded-2xl">
                        <span class="text-xs font-black text-indigo-400 uppercase tracking-widest">Total Earned</span>
                        <span class="text-xl font-black text-white" id="summary-total-earned">₩0</span>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-10 pt-0">
                <div class="grid grid-cols-4 gap-6 mb-12">
                    <div class="glass-panel p-6 rounded-[2rem] border-slate-800/50 flex flex-col items-center">
                        <p id="stat-total" class="text-3xl font-black text-white">0</p>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-2">총 지원</p>
                    </div>
                    <div class="glass-panel p-6 rounded-[2rem] border-slate-800/50 flex flex-col items-center">
                        <p id="stat-selected" class="text-3xl font-black text-green-500">0</p>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-2">선정 수</p>
                    </div>
                    <div class="glass-panel p-6 rounded-[2rem] border-slate-800/50 flex flex-col items-center">
                        <p id="stat-pending" class="text-3xl font-black text-blue-500">0</p>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-2">심사중</p>
                    </div>
                    <div class="glass-panel p-6 rounded-[2rem] border-slate-800/50 flex flex-col items-center">
                        <p id="stat-rate" class="text-3xl font-black text-amber-500">0%</p>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-2">승인율</p>
                    </div>
                </div>

                <div class="glass-panel rounded-[2.5rem] border-slate-800/50 overflow-hidden bg-slate-900/40 mb-12">
                    <div class="p-8 flex items-center justify-between border-b border-white/5">
                        <h3 class="text-lg font-black text-white">지원 정산 장부</h3>
                        <div class="flex gap-4">
                            <select id="status-filter" onchange="loadApplications()" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-xs font-bold text-slate-300 focus:outline-none focus:border-amber-500">
                                <option value="">상태 필터</option>
                                <option value="applied">신청완료</option>
                                <option value="selected">선정</option>
                                <option value="rejected">반려</option>
                                <option value="completed">정산완료</option>
                            </select>
                            <button onclick="loadApplications()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-white font-black text-xs rounded-xl transition-all">새로고침</button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="bg-slate-950/50 border-b border-slate-800/50">
                                    <th class="px-8 py-5 text-left font-black text-[10px] text-slate-500 uppercase tracking-widest">캠페인</th>
                                    <th class="px-8 py-5 text-left font-black text-[10px] text-slate-500 uppercase tracking-widest">연동 계정</th>
                                    <th class="px-8 py-5 text-left font-black text-[10px] text-slate-500 uppercase tracking-widest">보상 금액</th>
                                    <th class="px-8 py-5 text-left font-black text-[10px] text-slate-500 uppercase tracking-widest">상태</th>
                                    <th class="px-8 py-5 text-left font-black text-[10px] text-slate-500 uppercase tracking-widest">바로가기</th>
                                </tr>
                            </thead>
                            <tbody id="applications-table" class="divide-y divide-slate-800/50">
                                <tr class="animate-pulse h-20">
                                    <td colspan="5" class="px-8 py-5 text-center text-slate-600 text-xs">정산 내역을 동기화하고 있습니다...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="flex justify-center items-center gap-6 pb-20">
                    <button id="prev-btn" onclick="previousPage()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center text-slate-500 hover:text-white transition-all">◀</button>
                    <span id="page-info" class="text-xs font-black text-slate-500 uppercase tracking-widest">1 / 1</span>
                    <button id="next-btn" onclick="nextPage()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center text-slate-500 hover:text-white transition-all">▶</button>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-10 glass-panel bg-slate-900 border-green-500/50 px-6 py-3 rounded-xl shadow-2xl opacity-0 translate-y-20 transition-all pointer-events-none">
        <p id="toast-message" class="text-xs font-black text-white"></p>
    </div>

    <script>
        requireAuth();

        let currentPage = 1;
        let totalPages = 1;

        const fallbackApplications = [
            { id: 'fallback-1', listing_title: 'AI 마케팅 리뷰 체험단', account_name: '@sample_shop', reward_value: 40000, status: 'selected', applied_at: '2026-03-01T09:00:00', review_url: 'https://example.com/review/1' },
            { id: 'fallback-2', listing_title: '주방용품 체험단', account_name: '@sample_insta', reward_value: 60000, status: 'applied', applied_at: '2026-03-03T10:20:00', review_url: '' },
            { id: 'fallback-3', listing_title: '식자재 구독형 리뷰', account_name: '@sample_blog', reward_value: 30000, status: 'completed', applied_at: '2026-02-25T16:40:00', review_url: 'https://example.com/review/2' }
        ];

        function normalizeApplication(app) {
            return {
                id: app?.id || `legacy-${Math.random().toString(16).slice(2)}`,
                listing_title: app?.listing_title || app?.campaign_title || '이름 없음',
                account_name: app?.account_name || app?.account || '@unknown',
                reward_value: Number(app?.reward_value || 0),
                status: app?.status || 'applied',
                applied_at: app?.applied_at || app?.created_at || new Date().toISOString(),
                review_url: app?.review_url || app?.url || ''
            };
        }

        function getStatusLabel(status) {
            return {
                applied: '신청완료',
                selected: '선정',
                rejected: '반려',
                completed: '지급완료'
            }[status] || status;
        }

        function updatePageInfo(total) {
            totalPages = Math.max(1, Math.ceil(total / 10));
            document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
        }

        async function loadApplications() {
            const statusFilter = document.getElementById('status-filter').value;
            try {
                const params = new URLSearchParams();
                if (statusFilter) params.append('status', statusFilter);
                params.append('page', currentPage);
                params.append('limit', 10);

                const response = await apiFetch(`/api/review/applications?${params.toString()}`);
                if (!response || !response.ok) throw new Error('API 응답 실패');

                const result = await response.json();
                const payload = {
                    applications: result?.data?.applications || result?.applications || [],
                    total: result?.data?.total || result?.total || 0
                };
                const rows = payload.applications.map(normalizeApplication);
                renderTable(rows);
                updateStats({ applications: rows, total: payload.total || rows.length });
                updatePageInfo(payload.total || rows.length);
                return;
            } catch (error) {
                const normalized = fallbackApplications.map(normalizeApplication);
                const filtered = statusFilter ? normalized.filter((app) => app.status === statusFilter) : normalized;
                renderTable(filtered);
                updateStats({ applications: filtered, total: filtered.length });
                updatePageInfo(filtered.length);
                showInfo('API 연동이 지연되어 샘플 데이터로 표시합니다.');
            }
        }

        function renderTable(applications) {
            const tbody = document.getElementById('applications-table');
            tbody.innerHTML = '';

            if (!applications.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-12 text-center text-slate-500 font-bold uppercase text-[10px] tracking-[0.2em]">현재 필터 조건의 데이터가 없습니다</td></tr>';
                return;
            }

            applications.forEach((app) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-800/30 transition-all group';
                row.innerHTML = `
                    <td class="px-8 py-6">
                        <p class="font-black text-white line-clamp-1 group-hover:text-amber-500 transition-colors">${app.listing_title}</p>
                        <p class="text-[10px] text-slate-600 font-bold mt-1 uppercase">${new Date(app.applied_at).toLocaleDateString()}</p>
                    </td>
                    <td class="px-8 py-6 text-xs text-slate-400 font-bold">${app.account_name}</td>
                    <td class="px-8 py-6 text-sm font-black text-slate-200">₩${app.reward_value.toLocaleString()}</td>
                    <td class="px-8 py-6">
                        <span class="status-badge status-${app.status}">${getStatusLabel(app.status)}</span>
                    </td>
                    <td class="px-8 py-6">
                        ${app.review_url ? `<a href="${app.review_url}" target="_blank" class="w-10 h-10 inline-flex items-center justify-center glass-panel rounded-xl text-sm hover:border-amber-500 hover:text-amber-500 transition-all">바로가기</a>` : '<span class="text-slate-500 text-xs">미제공</span>'}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateStats(data) {
            const rows = data?.applications || [];
            const total = Number(data?.total || rows.length || 0);
            const selected = rows.filter((app) => app.status === 'selected' || app.status === 'completed').length;
            const pending = rows.filter((app) => app.status === 'applied').length;
            const payout = rows.reduce((acc, app) => acc + (app.reward_value || 0), 0);

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-selected').textContent = selected;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-rate').textContent = total > 0 ? `${Math.round((selected / total) * 100)}%` : '0%';
            document.getElementById('summary-total-earned').textContent = `₩${payout.toLocaleString()}`;
        }

        function previousPage() { if (currentPage > 1) { currentPage--; loadApplications(); } }
        function nextPage() { if (currentPage < totalPages) { currentPage++; loadApplications(); } }

        document.addEventListener('DOMContentLoaded', loadApplications);
    </script>
</body>
</html>
