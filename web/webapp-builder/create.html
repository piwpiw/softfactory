<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <title>앱 생성 — 웹앱 빌더 | SoftFactory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../platform/api.js"></script>
    <link rel="stylesheet" href="../responsive-framework.css">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 soft-sidebar border-r border-slate-800 flex flex-col shrink-0">
            <div class="p-6 border-b border-slate-800">
                <a href="index.html" class="soft-nav-link flex items-center gap-3 text-sm text-cyan-200">
                    <span class="text-lg">💻</span>
                    <div>
                        <h1 class="font-bold text-white">웹앱 빌더</h1>
                        <p class="text-xs text-slate-400">새 앱 생성 마법사</p>
                    </div>
                </a>
            </div>

            <nav class="soft-nav-tree flex-1 p-6 space-y-2 overflow-y-auto" aria-label="웹앱 빌더 네비게이션">
                <button class="hamburger" aria-label="메뉴 열기/닫기" type="button">
                    <span></span><span></span><span></span>
                </button>
                <a href="index.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 transition">🚀 소개</a>
                <a href="dashboard.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 transition">📊 대시보드</a>
                <a href="my-apps.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 transition">📱 내 앱</a>
                <a href="create.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg bg-indigo-600 text-white font-semibold border-l-2 border-indigo-400" aria-current="page">✍️ 앱 생성</a>
                <a href="../platform/index.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 transition">🏭 플랫폼 홈</a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between shrink-0">
                <div>
                    <h2 class="text-xl font-bold text-white">🛠️ 앱 생성</h2>
                    <p class="text-xs text-slate-400">템플릿/스타일/요구사항을 입력하면 즉시 앱 생성 항목을 등록합니다.</p>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <form id="createForm" class="max-w-3xl mx-auto space-y-6">
                    <section class="bg-slate-800 rounded-xl p-6 border border-slate-700">
                        <h3 class="text-lg font-bold text-white mb-4">앱 기본 정보</h3>
                        <div class="grid gap-4">
                            <div>
                                <label for="appName" class="block text-sm font-medium text-slate-300 mb-2">앱 이름</label>
                                <input id="appName" type="text" placeholder="예: 고객관리 포털" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-indigo-500 focus:outline-none" required />
                            </div>
                            <div>
                                <label for="appDescription" class="block text-sm font-medium text-slate-300 mb-2">설명</label>
                                <textarea id="appDescription" rows="4" placeholder="앱의 주요 기능과 사용자 시나리오를 입력하세요" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-indigo-500 focus:outline-none resize-none"></textarea>
                            </div>
                            <div>
                                <label for="appTemplate" class="block text-sm font-medium text-slate-300 mb-2">템플릿</label>
                                <select id="appTemplate" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-indigo-500 focus:outline-none">
                                    <option>기본 템플릿</option>
                                    <option>고객지원 CRM</option>
                                    <option>이커머스 쇼핑몰</option>
                                    <option>예약/예약관리</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <section class="bg-slate-800 rounded-xl p-6 border border-slate-700">
                        <h3 class="text-lg font-bold text-white mb-4">브랜딩 옵션</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div>
                                <label for="primaryColor" class="block text-sm font-medium text-slate-300 mb-2">기본 색상</label>
                                <input id="primaryColor" type="color" value="#4f46e5" class="w-full h-11 bg-slate-900 border border-slate-700 rounded-lg" />
                            </div>
                            <div>
                                <label for="accentColor" class="block text-sm font-medium text-slate-300 mb-2">강조 색상</label>
                                <input id="accentColor" type="color" value="#14b8a6" class="w-full h-11 bg-slate-900 border border-slate-700 rounded-lg" />
                            </div>
                        </div>
                    </section>

                    <div class="flex gap-3">
                        <button type="button" id="aiGenerateButton" class="px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold transition">🤖 AI 구성 제안 생성</button>
                        <button type="button" id="submitApp" class="px-4 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-semibold transition">✨ 앱 생성하기</button>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <script>
        requireAuth();

        const STORAGE_KEY = 'softfactory_webapps';
        const form = document.getElementById('createForm');
        const submitButton = document.getElementById('submitApp');
        const aiButton = document.getElementById('aiGenerateButton');

        function getStoredApps() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function nextId(apps) {
            return apps.reduce((max, item) => Math.max(max, item.id || 0), 0) + 1;
        }

        function buildSeedDescription(name, template) {
            if (name && template) {
                return `${name}는 ${template}으로 구성된 웹앱입니다.`;
            }
            return '사용자 지정 웹앱';
        }

        aiButton.addEventListener('click', () => {
            const name = document.getElementById('appName').value || '신규 앱';
            const template = document.getElementById('appTemplate').value;
            const description = buildSeedDescription(name, template);
            const primary = document.getElementById('primaryColor').value;
            const accent = document.getElementById('accentColor').value;

            document.getElementById('appDescription').value = `${description}\n기본 색상: ${primary}\n강조 색상: ${accent}`;
            if (typeof showSuccess === 'function') {
                showSuccess('AI가 앱 초기 구성을 제안했습니다.');
            }
        });

        submitButton.addEventListener('click', () => {
            const name = document.getElementById('appName').value.trim();
            const description = document.getElementById('appDescription').value.trim();
            const template = document.getElementById('appTemplate').value;
            const primary = document.getElementById('primaryColor').value;
            const accent = document.getElementById('accentColor').value;

            if (!name) {
                if (typeof showWarning === 'function') {
                    showWarning('앱 이름을 입력하세요.');
                } else {
                    alert('앱 이름을 입력하세요.');
                }
                return;
            }

            const apps = getStoredApps();
            const item = {
                id: nextId(apps),
                name,
                description: description || buildSeedDescription(name, template),
                template,
                status: '개발 중',
                createdAt: new Date().toISOString().slice(0, 10),
                updatedAt: new Date().toLocaleString('ko-KR'),
                version: 'v1.0',
                primary,
                accent
            };

            const next = [item, ...apps];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(next));

            if (typeof showSuccess === 'function') {
                showSuccess('웹앱이 생성되어 내 앱 목록에 추가되었습니다.');
            }

            setTimeout(() => {
                location.href = 'my-apps.html';
            }, 900);
        });
    </script>

    <script src="../mobile-optimization.js" defer></script>
</body>
</html>
