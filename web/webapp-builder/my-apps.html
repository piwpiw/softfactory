<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <title>내 앱 관리 — 웹앱 빌더 | SoftFactory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../platform/api.js"></script>
    <link rel="stylesheet" href="../responsive-framework.css">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 soft-sidebar border-r border-slate-800 flex flex-col shrink-0">
            <div class="p-6 border-b border-slate-800">
                <a href="index.html" class="soft-nav-link flex items-center gap-3 text-sm text-cyan-200">
                    <span class="text-lg">💻</span>
                    <div>
                        <h1 class="font-bold text-white">웹앱 빌더</h1>
                        <p class="text-xs text-slate-400">프로젝트 운영 콘솔</p>
                    </div>
                </a>
            </div>

            <nav class="soft-nav-tree flex-1 p-6 space-y-2 overflow-y-auto" aria-label="웹앱 빌더 네비게이션">
                <button class="hamburger" aria-label="메뉴 열기/닫기" type="button">
                    <span></span><span></span><span></span>
                </button>
                <a href="index.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 transition">🚀 소개</a>
                <a href="dashboard.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 transition">📊 대시보드</a>
                <a href="my-apps.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg bg-indigo-600 text-white font-semibold border-l-2 border-indigo-400" aria-current="page">📱 내 앱</a>
                <a href="create.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 transition">✍️ 앱 생성</a>
                <a href="../platform/index.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 transition">🏭 플랫폼 홈</a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between shrink-0">
                <h2 class="text-xl font-bold text-white">📱 내 앱</h2>
                <div class="flex items-center gap-2">
                    <a href="create.html" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm">+ 새 앱 만들기</a>
                    <button type="button" id="refreshApps" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm">새로고침</button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6 space-y-6">
                <section class="bg-slate-800 rounded-xl p-6 border border-indigo-500/40">
                    <div class="flex flex-wrap items-center justify-between gap-3">
                        <div>
                            <h3 class="text-lg font-bold text-white">웹앱 운영 현황</h3>
                            <p class="text-sm text-slate-300 mt-1">로컬 생성 앱, 배포 상태, 최근 동작 로그를 한 번에 확인합니다.</p>
                        </div>
                        <span class="text-xs px-3 py-1 rounded-full bg-indigo-900/70 text-indigo-200">운영 모드</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4" id="summaryCards"></div>
                </section>

                <section class="bg-slate-900 rounded-xl p-4 border border-slate-700">
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                        <h3 class="font-semibold text-white">내 앱 목록</h3>
                        <div class="flex items-center gap-2">
                            <label for="statusFilter" class="text-sm text-slate-300">상태</label>
                            <select id="statusFilter" class="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-white">
                                <option value="">전체</option>
                                <option value="운영">운영</option>
                                <option value="개발 중">개발 중</option>
                                <option value="중단">중단</option>
                            </select>
                        </div>
                    </div>
                    <div id="appsList" class="space-y-3"></div>
                </section>
            </main>
        </div>
    </div>

    <script>
        requireAuth();

        const STORAGE_KEY = 'softfactory_webapps';

        const seedApps = [
            {
                id: 1,
                name: 'Customer Portal',
                description: 'CRM 기반 고객 대응 대시보드',
                template: 'CRM 템플릿',
                status: '개발 중',
                createdAt: '2026-02-24',
                updatedAt: '2026-03-03 11:40',
                version: 'v1.1'
            }
        ];

        function toKRDate(input) {
            const d = new Date(input);
            return Number.isNaN(d.getTime()) ? input : d.toLocaleString('ko-KR');
        }

        function loadApps() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return seedApps;
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) && parsed.length ? parsed : seedApps;
            } catch {
                return seedApps;
            }
        }

        function saveApps(apps) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
        }

        function statusStyle(status) {
            if (status === '운영') {
                return 'bg-emerald-900 text-emerald-200 border-emerald-500';
            }
            if (status === '중단') {
                return 'bg-rose-900 text-rose-200 border-rose-500';
            }
            return 'bg-amber-900 text-amber-200 border-amber-500';
        }

        function renderSummary(apps) {
            const summaryTarget = document.getElementById('summaryCards');
            const total = apps.length;
            const active = apps.filter((app) => app.status === '운영').length;
            const staging = apps.filter((app) => app.status === '개발 중').length;
            const stopped = apps.filter((app) => app.status === '중단').length;

            summaryTarget.innerHTML = `
                <article class="rounded-lg border border-slate-700 bg-slate-900 p-4">
                    <p class="text-slate-400 text-sm">전체 앱</p>
                    <p class="text-2xl font-bold text-white">${total}개</p>
                </article>
                <article class="rounded-lg border border-emerald-800 bg-emerald-900/20 p-4">
                    <p class="text-emerald-200 text-sm">운영 중</p>
                    <p class="text-2xl font-bold text-white">${active}개</p>
                </article>
                <article class="rounded-lg border border-amber-700 bg-amber-900/20 p-4">
                    <p class="text-amber-200 text-sm">개발 중</p>
                    <p class="text-2xl font-bold text-white">${staging}개</p>
                </article>
                <article class="rounded-lg border border-rose-700 bg-rose-900/20 p-4">
                    <p class="text-rose-200 text-sm">중단</p>
                    <p class="text-2xl font-bold text-white">${stopped}개</p>
                </article>
            `;
        }

        function setStatus(apps, id, status) {
            const next = apps.map((app) => app.id === id ? { ...app, status, updatedAt: new Date().toLocaleString('ko-KR') } : app);
            saveApps(next);
            renderApps(next);
        }

        function removeApp(apps, id) {
            if (!confirm('해당 앱을 삭제하면 복구할 수 없습니다.')) return;
            const next = apps.filter((app) => app.id !== id);
            saveApps(next);
            renderApps(next);
        }

        function renderApps(apps) {
            const list = document.getElementById('appsList');
            const filter = document.getElementById('statusFilter').value;
            const filtered = filter ? apps.filter((app) => app.status === filter) : apps;

            renderSummary(apps);

            if (!filtered.length) {
                list.innerHTML = '<p class="text-sm text-slate-400">조건에 맞는 앱이 없습니다.</p>';
                return;
            }

            list.innerHTML = filtered.map((app) => {
                const badge = statusStyle(app.status);
                return `
                    <article class="p-4 rounded-lg border border-slate-700 bg-slate-800">
                        <div class="flex items-start justify-between gap-3 flex-wrap">
                            <div>
                                <p class="font-semibold text-white text-base">${app.name}</p>
                                <p class="text-sm text-slate-400 mt-1">${app.description}</p>
                                <p class="text-xs text-slate-500 mt-1">템플릿: ${app.template} · 버전: ${app.version}</p>
                            </div>
                            <span class="text-xs px-2 py-1 rounded-full border ${badge}">${app.status}</span>
                        </div>
                        <p class="text-xs text-slate-500 mt-2">생성: ${app.createdAt} · 마지막 수정: ${toKRDate(app.updatedAt)}</p>
                        <div class="mt-4 flex flex-wrap gap-2">
                            <button data-id="${app.id}" data-action="deploy" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg text-sm bg-indigo-600 hover:bg-indigo-700 text-white">배포 실행</button>
                            <button data-id="${app.id}" data-action="operate" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg text-sm bg-slate-700 hover:bg-slate-600 text-white">운영 전환</button>
                            <button data-id="${app.id}" data-action="pause" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg text-sm bg-rose-600 hover:bg-rose-700 text-white">중단</button>
                            <button data-id="${app.id}" data-action="delete" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg text-sm bg-slate-700 hover:bg-slate-600 text-slate-100">삭제</button>
                        </div>
                    </article>
                `;
            }).join('');

            list.querySelectorAll('button[data-action]').forEach((button) => {
                button.addEventListener('click', () => {
                    const action = button.dataset.action;
                    const id = Number(button.dataset.id);
                    const source = loadApps();
                    if (action === 'delete') {
                        removeApp(source, id);
                        return;
                    }
                    if (action === 'deploy') {
                        setStatus(source, id, '운영');
                        if (typeof showSuccess === 'function') {
                            showSuccess('배포 요청이 접수되었습니다.');
                        }
                        return;
                    }
                    if (action === 'operate') {
                        setStatus(source, id, '운영');
                        return;
                    }
                    if (action === 'pause') {
                        setStatus(source, id, '중단');
                        return;
                    }
                });
            });
        }

        document.getElementById('statusFilter').addEventListener('change', () => {
            renderApps(loadApps());
        });

        document.getElementById('refreshApps').addEventListener('click', () => renderApps(loadApps()));

        renderApps(loadApps());
    </script>

    <script src="../mobile-optimization.js" defer></script>
</body>
</html>
