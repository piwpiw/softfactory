    <!-- Create/Edit 캠페인 Modal -->

                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">대상 플랫폼</label>

                            <span class="text-sm text-slate-300">Facebook</span>

                            <input type="checkbox" value="twitter" class="platformCheckbox w-4 h-4">
                            <span class="text-sm text-slate-300">Twitter</span>
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" value="tiktok" class="platformCheckbox w-4 h-4">
                            <span class="text-sm text-slate-300">TikTok</span>
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" value="linkedin" class="platformCheckbox w-4 h-4">
                            <span class="text-sm text-slate-300">LinkedIn</span>
                        </label>
                    </div>

                <div class="grid grid-cols-2 gap-4">

                        <label class="block text-sm font-medium text-slate-300 mb-2">시작 날짜</label>

                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">종료 날짜</label>
                        <input type="date" id="campaignEnd" required class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:border-pink-500 focus:outline-none">
                    </div>

                        <option value="active">진행 중</option>

                <div class="flex gap-3 justify-end pt-4 border-t border-slate-700">
                    <button type="button" onclick="close캠페인Modal()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-lg">
                        취소
                    </button>

    <script>
        requireAuth();
        let editingCampaignId = null;
        let refreshTimer = null;

        function normalizeCampaignPayload(payload) {
            if (!payload) return [];
            if (Array.isArray(payload)) return payload;
            if (Array.isArray(payload.campaigns)) return payload.campaigns;
            if (Array.isArray(payload.data)) return payload.data;
            if (Array.isArray(payload.results)) return payload.results;
            if (payload.campaign) return [payload.campaign];
            return [];
        }

        function normalizeCampaign(raw) {
            if (!raw) return null;
            if (raw.campaign) return raw.campaign;
            return raw;
        }

        function safeDate(value) {
            if (!value) return '미정';
            const dt = new Date(value);
            if (Number.isNaN(dt.getTime())) return value;
            return dt.toLocaleDateString('ko-KR');
        }

        function getFilters() {
            const status = (document.getElementById('statusFilter')?.value || '').trim();
            const platform = (document.getElementById('platformFilter')?.value || '').trim();
            const filters = {};
            if (status) filters.status = status;
            if (platform) filters.platform = platform;
            return filters;
        }

        function updateCampaignSummary(list) {
            const total = list.length;
            const active = list.filter((item) => item.status === 'active').length;
            const paused = list.filter((item) => item.status === 'paused').length;
            const completed = list.filter((item) => item.status === 'completed').length;
            const postCount = list.reduce((sum, item) => sum + Number(item.post_count || item.postCount || 0), 0);
            document.getElementById('campaignSummary').textContent =
                `총 ${total}개 · 진행 중 ${active}개 · 일시중지 ${paused}개 · 완료 ${completed}개 · 연동 콘텐츠 ${postCount}개`;
        }

        async function init() {
            document.getElementById('statusFilter').addEventListener('change', refreshCampaigns);
            document.getElementById('platformFilter').addEventListener('change', refreshCampaigns);
            document.getElementById('campaignSearch').addEventListener('input', refreshCampaigns);
            await refreshCampaigns();

            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(refreshCampaigns, 120000);

            window.addEventListener('beforeunload', () => {
                if (refreshTimer) clearInterval(refreshTimer);
            });
        }

        async function refreshCampaigns() {
            try {
                const query = getFilters();
                const result = await getSNSCampaigns(query);
                const campaigns = normalizeCampaignPayload(result);
                const container = document.getElementById('campaignsList');
                const keyword = (document.getElementById('campaignSearch').value || '').toLowerCase();
                const filteredCampaigns = campaigns.filter((item) => {
                    if (!keyword) return true;
                    return String(item.name || '').toLowerCase().includes(keyword);
                });

                updateCampaignSummary(filteredCampaigns);

                if (filteredCampaigns.length === 0) {
                    container.innerHTML = '<div class="text-slate-400 text-center py-12">캠페인이 없습니다. 새로 만들어보세요!</div>';
                    return;
                }

                container.innerHTML = filteredCampaigns.map((camp) => {
                    const statusColor = camp.status === 'active' ? 'bg-green-900/50 border-green-700' :
                                       camp.status === 'paused' ? 'bg-yellow-900/50 border-yellow-700' :
                                       'bg-slate-800 border-slate-700';
                    const statusLabel = camp.status === 'active' ? '진행 중' :
                                       camp.status === 'paused' ? '일시 중지' : '완료';
                    const safePlatforms = (camp.target_platforms || []).length ? (camp.target_platforms || []).join(', ') : '전체';
                    const campaignId = encodeURIComponent(camp.id);
                    const hashtagHint = encodeURIComponent((camp.name || '').slice(0, 12).trim() || 'campaign');

                    return `
                        <div class="bg-slate-800 rounded-lg p-6 border border-slate-700 hover:border-pink-600 transition">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex-1">
                                    <h3 class="text-lg font-bold text-white">${camp.name}</h3>
                                    <p class="text-sm text-slate-400 mt-1">${camp.description || '설명 없음'}</p>
                                </div>
                                <span class="px-3 py-1 bg-slate-700 text-slate-300 text-xs rounded font-medium">${statusLabel}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
                                <div>
                                    <p class="text-slate-400">기간</p>
                                    <p class="text-white">${safeDate(camp.start_date)} ~ ${safeDate(camp.end_date)}</p>
                                </div>
                                <div>
                                    <p class="text-slate-400">플랫폼</p>
                                    <p class="text-white">${safePlatforms}</p>
                                </div>
                            </div>

                            <div class="mb-4 p-3 bg-slate-900 rounded-lg">
                                <p class="text-xs text-slate-400">연결된 포스트</p>
                                <p class="text-lg font-bold text-pink-400">${camp.post_count || 0}개</p>
                            </div>

                            <div class="flex gap-2 justify-end">
                                <button onclick="triggerCampaignAction('edit', ${camp.id})" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded transition">
                                    수정
                                </button>
                                <button onclick="triggerCampaignAction('delete', ${camp.id})" class="px-3 py-2 bg-red-600 hover:bg-red-700 text-white text-sm rounded transition">
                                    삭제
                                </button>
                                <button onclick="openCreateFromCampaign('${hashtagHint}', '${campaignId}')" class="px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white text-sm rounded transition">
                                    🚀 바이럴 시작
                                </button>
                                <button onclick="window.location.href='monetize.html?source=campaign&campaignId=${campaignId}'" class="px-3 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm rounded transition">
                                    💰 수익화 연계
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                document.getElementById('campaignsList').innerHTML = '<div class="text-red-400 text-center py-12">캠페인 로드 실패</div>';
            }
        }

        function openCreateFromCampaign(encodedName, id) {
            const encodedTag = encodeURIComponent(`#${decodeURIComponent(encodedName)}`);
            window.location.href = `create.html?hashtag=${encodedTag}&campaignId=${id}`;
        }

        async function triggerCampaignAction(type, campaignId) {
            if (type === 'edit') return editCampaign(campaignId);
            if (type === 'delete') return deleteCampaign(campaignId);
            return;
        }

        function showCreateModal() {
            editingCampaignId = null;
            document.getElementById('modalTitle').textContent = '새 캠페인 만들기';
            document.getElementById('campaignForm').reset();
            document.getElementById('campaignModal').classList.remove('hidden');
        }

        function close캠페인Modal() {
            document.getElementById('campaignModal').classList.add('hidden');
            editingCampaignId = null;
        }

        async function editCampaign(campaignId) {
            try {
                const response = await apiFetch(`/api/sns/campaigns/${campaignId}`);
                const result = await response.json();
                const camp = normalizeCampaign(result);

                if (!camp) {
                    throw new Error('조회된 캠페인 데이터가 없습니다.');
                }

                document.getElementById('modalTitle').textContent = '캠페인 수정';
                document.getElementById('campaignName').value = camp.name;
                document.getElementById('campaignDesc').value = camp.description || '';
                document.getElementById('campaignStart').value = camp.start_date.split('T')[0];
                document.getElementById('campaignEnd').value = camp.end_date.split('T')[0];
                document.getElementById('campaignStatus').value = camp.status;

                // Set platforms
                document.querySelectorAll('.platformCheckbox').forEach(checkbox => {
                    checkbox.checked = camp.target_platforms.includes(checkbox.value);
                });

                editingCampaignId = campaignId;
                document.getElementById('campaignModal').classList.remove('hidden');
            } catch (error) {
                showError('캠페인 로드 실패');
            }
        }

        document.getElementById('campaignForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const platforms = Array.from(document.querySelectorAll('.platformCheckbox:checked')).map(c => c.value);
                const payload = {
                    name: document.getElementById('campaignName').value,
                    description: document.getElementById('campaignDesc').value,
                    target_platforms: platforms,
                    start_date: document.getElementById('campaignStart').value,
                    end_date: document.getElementById('campaignEnd').value,
                    status: document.getElementById('campaignStatus').value
                };

                if (editingCampaignId) {
                    await updateSNSCampaign(editingCampaignId, payload);
                    showSuccess('캠페인이 수정되었습니다!');
                } else {
                    await createSNSCampaign(payload);
                    showSuccess('캠페인이 생성되었습니다!');
                }

                close캠페인Modal();
                refreshCampaigns();
            } catch (error) {
                showError('저장 실패: ' + error.message);
            }
        });

        async function deleteCampaign(campaignId) {
            if (!confirm('이 캠페인을 삭제하시겠습니까? (연결된 포스트는 삭제되지 않습니다)')) return;
            try {
                await deleteSNSCampaign(campaignId);
                showSuccess('캠페인이 삭제되었습니다!');
                await refreshCampaigns();
            } catch (error) {
                showError('삭제 실패');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
    <script src="../mobile-optimization.js" defer></script>
</body>
