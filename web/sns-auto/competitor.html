<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
<title>경쟁사 분석 — SNS 자동화 | SoftFactory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../platform/api.js"></script>
    <link rel="stylesheet" href="../responsive-framework.css">
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-6 border-b border-slate-800">
                <a href="../platform/dashboard.html" class="flex items-center gap-3">
                    <span class="text-2xl">🏭</span>
                    <div><h1 class="font-bold text-white text-sm">SoftFactory</h1></div>
                </a>
            </div>
            <nav class="soft-nav-tree flex-1 p-6 space-y-2">
                <button class="hamburger" aria-label="Toggle navigation menu">
                    <span></span><span></span><span></span>
                </button>
                <p class="text-xs font-semibold text-slate-400 uppercase px-4 mb-3">📱 SNS 자동화</p>
                <a href="index.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">📊 대시보드</a>
                <a href="accounts.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🔗 계정 연동</a>
                <a href="create.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">✍️ 블로그 자동포스팅</a>
                <a href="schedule.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">📅 스케줄 관리</a>
                <a href="analytics.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">📈 분석</a>
                <a href="templates.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🎨 템플릿</a>
                <a href="settings.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">⚙️ 설정</a>
                <a href="campaigns.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">📢 캠페인</a>
                <a href="viral.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🚀 바이럴</a>
                <a href="monetize.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">💰 수익화</a>
                <a href="link-in-bio.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🔗 링크 바이오</a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-white">👁️ 경쟁사 분석</h2>
                    <p class="text-xs text-slate-400">계정 추적 및 성과 비교</p>
                </div>
                <div class="flex items-center gap-2">
                    <select id="platformFilter" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white">
                        <option value="">전체 플랫폼</option>
                        <option value="Instagram">Instagram</option>
                        <option value="YouTube">YouTube</option>
                        <option value="TikTok">TikTok</option>
                        <option value="LinkedIn">LinkedIn</option>
                    </select>
                    <select id="sortFilter" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white">
                        <option value="engagement">참여율순</option>
                        <option value="followers">팔로워순</option>
                        <option value="growth">성장률순</option>
                        <option value="posts">게시물순</option>
                    </select>
                    <button onclick="addCompetitor()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm font-medium">
                        ➕ 경쟁사 추가
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-hidden grid grid-cols-3 gap-0">
                <div class="col-span-2 overflow-y-auto p-6 border-r border-slate-800">
                    <div class="mb-4 flex items-center justify-between gap-3">
                        <p class="text-sm text-slate-300" id="competitorCount">0개 경쟁사 추적 중</p>
                        <button onclick="refreshAllCompetitors()" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-xs font-medium">♻️ 새로고침</button>
                    </div>
                    <div id="competitorList" class="space-y-4"></div>
                </div>

                <div class="bg-slate-900 overflow-y-auto p-6">
                    <h3 class="text-lg font-bold text-white mb-4">📊 비교 분석</h3>
                    <div class="space-y-4" id="comparisonContainer"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        requireAuth();

        const STORAGE_KEY = 'sf_sns_competitors_v1';
        const PLATFORM_EMOJI = {
            Instagram: '📸',
            YouTube: '▶️',
            TikTok: '🎬',
            LinkedIn: '💼',
            Facebook: '👥'
        };

        const DEFAULT_COMPETITORS = [
            { username: 'fashion_guru', platform: 'Instagram', tags: ['코디', '뷰티', '라이프스타일'] },
            { username: 'tech_reviewer', platform: 'YouTube', tags: ['기술', '리뷰', '튜토리얼'] },
            { username: 'lifestyle_blogger', platform: 'TikTok', tags: ['일상', '팁', '엔터테인먼트'] }
        ];

        let competitors = [];
        let myMetrics = { followers: 125000, engagement: 6.2, growth: 12 };
        let isLoading = false;

        function sanitizeUsername(raw) {
            return String(raw || '').replace(/^@/, '').trim();
        }

        function getSeededCompetitors() {
            try {
                const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
                if (!Array.isArray(parsed) || !parsed.length) return DEFAULT_COMPETITORS.map(item => ({ ...item }));
                return parsed
                    .filter((item) => item && typeof item.username === 'string')
                    .map((item) => ({
                        username: sanitizeUsername(item.username),
                        platform: item.platform || 'Instagram',
                        tags: Array.isArray(item.tags) ? item.tags : []
                    }));
            } catch (_) {
                return DEFAULT_COMPETITORS.map(item => ({ ...item }));
            }
        }

        function saveSeededCompetitors() {
            try {
                localStorage.setItem(
                    STORAGE_KEY,
                    JSON.stringify(competitors.map((item) => ({ username: item.username, platform: item.platform, tags: item.tags })))
                );
            } catch (_) {}
        }

        function normalizeCompetitor(raw) {
            if (!raw) return null;
            const data = raw.data || raw;
            const followerGrowth = Number(
                data.follower_growth ??
                data.followerGrowth ??
                data.growth ??
                0
            );
            return {
                username: sanitizeUsername(data.username),
                platform: data.platform || 'Instagram',
                followers: Number(data.followers || data.follower_count || 0),
                followerGrowth,
                engagement: Number(data.engagement_rate ?? data.engagement ?? 0),
                engagementTrend: Number(data.engagement_trend ?? data.engagementTrend ?? 0),
                weeklyPosts: Number(data.weekly_posts ?? data.weeklyPosts ?? 0),
                topPostLikes: Number(data.top_post_likes ?? data.topPostLikes ?? 0),
                tags: Array.isArray(data.tags) ? data.tags : [],
                lastUpdated: new Date().toLocaleTimeString()
            };
        }

        function getFilteredSortedCompetitors() {
            const platformFilter = document.getElementById('platformFilter')?.value || '';
            const sortFilter = document.getElementById('sortFilter')?.value || 'engagement';
            const list = competitors.filter((item) => {
                if (!platformFilter) return true;
                return (item.platform || '').toLowerCase() === platformFilter.toLowerCase();
            });

            return list.sort((a, b) => {
                if (sortFilter === 'followers') return (Number(b.followers || 0) - Number(a.followers || 0));
                if (sortFilter === 'growth') return (Number(b.followerGrowth || 0) - Number(a.followerGrowth || 0));
                if (sortFilter === 'posts') return (Number(b.weeklyPosts || 0) - Number(a.weeklyPosts || 0));
                return (Number(b.engagement || 0) - Number(a.engagement || 0));
            });
        }

        function toReadableNumber(value) {
            const num = Number(value || 0);
            if (num >= 1000000) return `${(num / 1000000).toFixed(1)}M`;
            if (num >= 1000) return `${(num / 1000).toFixed(0)}K`;
            return String(num);
        }

        function renderCompetitors() {
            const container = document.getElementById('competitorList');
            const count = document.getElementById('competitorCount');
            if (!container || !count) return;

            const list = getFilteredSortedCompetitors();
            count.textContent = `📌 ${list.length}개 경쟁사 추적 중`;

            if (!list.length) {
                container.innerHTML = '<div class="bg-slate-800 rounded-lg border border-slate-700 p-6 text-slate-400 text-sm">추적 중인 경쟁사가 없습니다.</div>';
                renderComparison();
                return;
            }

            container.innerHTML = list.map((comp, index) => {
                const color = index % 2 === 0 ? 'from-pink-500 to-pink-600' : 'from-blue-500 to-blue-600';
                const metricName = ['Instagram', 'TikTok', 'YouTube'].includes(comp.platform) ? '팔로워' : '팔로워';
                const badge = PLATFORM_EMOJI[comp.platform] || '📱';
                return `
                    <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-gradient-to-br ${color} rounded-full flex items-center justify-center text-white font-bold text-lg">${badge}</div>
                                <div>
                                    <p class="font-bold text-white">@${comp.username}</p>
                                    <p class="text-xs text-slate-400">${comp.platform}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="updateTracking('${comp.username}', this)" class="px-3 py-1 text-xs bg-slate-700 hover:bg-slate-600 text-slate-100 rounded transition">📊 갱신</button>
                                <button onclick="removeCompetitor('${comp.username}')" class="px-3 py-1 text-xs bg-slate-800 hover:bg-slate-700 text-slate-200 rounded transition">🗑️ 삭제</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-4 gap-3">
                            <div class="text-center">
                                <p class="text-sm text-slate-400">${metricName}</p>
                                <p class="text-xl font-bold text-white">${toReadableNumber(comp.followers)}</p>
                                <p class="text-xs ${comp.followerGrowth >= 0 ? 'text-green-400' : 'text-red-400'}">${comp.followerGrowth >= 0 ? '↑' : '↓'} ${Math.abs(comp.followerGrowth).toFixed(1)}%</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-slate-400">평균 참여율</p>
                                <p class="text-xl font-bold text-white">${Number(comp.engagement || 0).toFixed(1)}%</p>
                                <p class="text-xs ${comp.engagementTrend >= 0 ? 'text-green-400' : 'text-red-400'}">${comp.engagementTrend >= 0 ? '↑' : '↓'} ${Math.abs(comp.engagementTrend).toFixed(1)}%</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-slate-400">주간 게시물</p>
                                <p class="text-xl font-bold text-white">${comp.weeklyPosts || 0}</p>
                                <p class="text-xs text-slate-400">최근 반영: ${comp.lastUpdated || '-'}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-slate-400">최상위 게시물</p>
                                <p class="text-xl font-bold text-white">${toReadableNumber(comp.topPostLikes)}</p>
                                <p class="text-xs text-slate-400">좋아요</p>
                            </div>
                        </div>
                        <div class="mt-4 p-3 bg-slate-700/50 rounded-lg">
                            <p class="text-xs text-slate-400 mb-2">📌 콘텐츠 신호</p>
                            <div class="flex gap-2 flex-wrap">
                                ${(comp.tags || []).map((tag) => `<span class="text-xs px-2 py-1 bg-indigo-900/30 text-indigo-300 rounded">${tag}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            renderComparison();
        }

        function renderComparison() {
            const container = document.getElementById('comparisonContainer');
            if (!container) return;

            if (!competitors.length) {
                container.innerHTML = '<div class="text-slate-400 text-sm">비교 데이터가 없습니다.</div>';
                return;
            }

            const topByEngagement = [...competitors].sort((a, b) => Number(b.engagement || 0) - Number(a.engagement || 0))[0];
            const growthBars = [{ label: '내 계정', value: Math.max(2, Math.min(100, myMetrics.growth)) }, ...competitors.map((item) => ({
                label: `@${item.username}`,
                value: Math.max(2, Math.min(100, Number(item.followerGrowth || 0) * 6))
            }))];

            container.innerHTML = `
                <div>
                    <p class="text-sm font-medium text-white mb-2">성장률 비교</p>
                    <div class="space-y-2">
                        ${growthBars.map((item, idx) => `
                            <div>
                                <div class="flex justify-between text-xs mb-1">
                                    <span class="text-slate-400">${item.label}</span>
                                    <span class="${idx === 0 ? 'text-blue-300' : 'text-green-400'}">${item.value.toFixed(1)}%</span>
                                </div>
                                <div class="w-full bg-slate-700 rounded-full h-2">
                                    <div class="${idx === 0 ? 'bg-blue-600' : 'bg-green-600'} h-2 rounded-full" style="width:${item.value}%"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div>
                    <p class="text-sm font-medium text-white mb-2">참여율 비교</p>
                    <div class="space-y-2 text-xs">
                        <div class="flex justify-between">
                            <span class="text-slate-400">내 계정</span>
                            <span class="text-white font-medium">${myMetrics.engagement.toFixed(1)}%</span>
                        </div>
                        ${competitors.map((item) => `
                            <div class="flex justify-between">
                                <span class="text-slate-400">@${item.username}</span>
                                <span class="text-white font-medium">${Number(item.engagement || 0).toFixed(1)}%</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="p-3 bg-purple-900/20 border border-purple-900 rounded-lg">
                    <p class="text-xs font-bold text-purple-300 mb-2">💡 인사이트</p>
                    <p class="text-xs text-slate-300">${topByEngagement ? `${topByEngagement.username}의 참여율(${Number(topByEngagement.engagement || 0).toFixed(1)}%)이 가장 높습니다. 콘텐츠 주제 신호 '${(topByEngagement.tags || [])[0] || 'N/A'}'를 중심으로 비교 메시지를 맞추세요.` : '데이터를 수집한 뒤 인사이트가 표시됩니다.'}</p>
                </div>
            `;
        }

        function getMyBenchmark() {
            getSNSAccounts().then((result) => {
                const accounts = result.accounts || [];
                const current = accounts[0];
                if (current) {
                    myMetrics = {
                        followers: Number(current.followers || myMetrics.followers),
                        engagement: Number(current.engagement_rate || myMetrics.engagement),
                        growth: Number(current.growth || myMetrics.growth)
                    };
                }
            }).catch(() => {});
        }

        function attachEvents() {
            const platformFilter = document.getElementById('platformFilter');
            const sortFilter = document.getElementById('sortFilter');
            platformFilter?.addEventListener('change', renderCompetitors);
            sortFilter?.addEventListener('change', renderCompetitors);
        }

        async function addCompetitor() {
            const raw = prompt('경쟁사 사용자명 입력 (예: @username)');
            if (!raw) return;
            const username = sanitizeUsername(raw);
            if (!username) return;

            if (competitors.some((item) => item.username.toLowerCase() === username.toLowerCase())) {
                showInfo('이미 추적 중인 경쟁사입니다.');
                return;
            }

            try {
                showInfo(`@${username} 추적 정보를 가져오는 중...`);
                const response = await getCompetitor(username);
                const normalized = normalizeCompetitor(response);
                if (!normalized) throw new Error('데이터 형식이 맞지 않습니다');

                competitors = [normalized, ...competitors];
                saveSeededCompetitors();
                renderCompetitors();
                showSuccess(`@${username}이 추가되었습니다`);
            } catch (error) {
                showError('경쟁사 추가 실패: ' + error.message);
            }
        }

        async function updateTracking(username, button) {
            if (isLoading) return;
            if (!button) return;
            const originalText = button.textContent;
            isLoading = true;
            button.disabled = true;
            button.textContent = '⏳ 갱신 중';
            try {
                const response = await getCompetitor(username);
                const normalized = normalizeCompetitor(response);
                if (!normalized) throw new Error('데이터 파싱 실패');
                const index = competitors.findIndex((item) => item.username === username);
                if (index >= 0) {
                    competitors[index] = { ...competitors[index], ...normalized };
                    saveSeededCompetitors();
                    renderCompetitors();
                    showSuccess(`@${username} 데이터 갱신 완료`);
                }
            } catch (error) {
                showError('갱신 실패: ' + error.message);
            } finally {
                isLoading = false;
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        async function refreshAllCompetitors() {
            if (!competitors.length) return;
            try {
                const list = await Promise.all(
                    competitors.map((item) => getCompetitor(item.username).then((res) => normalizeCompetitor(res)))
                );
                competitors = list
                    .map((item, index) => item || { ...competitors[index], lastUpdated: new Date().toLocaleTimeString() })
                    .map((item) => ({ ...competitors.find((it) => it.username === item.username) || {}, ...item }));
                renderCompetitors();
                showSuccess('일괄 갱신이 완료되었습니다.');
            } catch (error) {
                showError('일괄 갱신 실패: ' + error.message);
            }
        }

        function removeCompetitor(username) {
            if (!confirm(`@${username} 항목을 제거하시겠습니까?`)) return;
            competitors = competitors.filter((item) => item.username.toLowerCase() !== username.toLowerCase());
            saveSeededCompetitors();
            renderCompetitors();
            showSuccess('경쟁사 목록에서 제거했습니다.');
        }

        async function loadInitialCompetitors() {
            const stored = getSeededCompetitors();
            const firstLoad = await Promise.all(
                stored.map((item) => {
                    return getCompetitor(item.username)
                        .then((res) => normalizeCompetitor(res))
                        .then((normalized) => normalized ? { ...item, ...normalized } : item)
                        .catch(() => item);
                })
            );
            competitors = firstLoad;
            saveSeededCompetitors();
        }

        async function init() {
            await loadInitialCompetitors();
            attachEvents();
            getMyBenchmark();
            renderCompetitors();
            renderComparison();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
    <script src="../mobile-optimization.js" defer></script>
</body>
</html>
