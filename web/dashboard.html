<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>운영 대시보드</title>
  <style>
    :root {
      --line: #e2e8f0;
      --muted: #64748b;
      --good: #16a34a;
      --warn: #d97706;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      color: #0f172a;
      background:
        radial-gradient(80rem 80rem at 0% -20%, #dbeafe 0%, transparent 45%),
        radial-gradient(60rem 60rem at 100% -10%, #dcfce7 0%, transparent 40%),
        #f8fafc;
      min-height: 100vh;
    }
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .header h1 { margin: 0; font-size: 1.9rem; }
    .subtitle { color: var(--muted); margin-top: 4px; }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      margin-bottom: 12px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 10px 18px rgba(15,23,42,.05);
    }
    .card .label { color: var(--muted); font-size: .88rem; }
    .card .value { font-size: 1.7rem; margin-top: 6px; font-weight: 800; }
    .card .meta { margin-top: 8px; color: var(--good); font-size: .83rem; font-weight: 700; }
    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 10px 18px rgba(15,23,42,.05);
      padding: 14px;
      margin-bottom: 12px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .toolbar button, .toolbar select {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      cursor: pointer;
    }
    .toolbar button {
      color: #fff;
      background: #0f172a;
      border-color: #0f172a;
    }
    .two-col {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
    }
    .list {
      max-height: 300px;
      overflow: auto;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .list li {
      border-top: 1px solid #f1f5f9;
      padding: 8px 0;
      font-size: .9rem;
    }
    .list .ts { color: var(--muted); margin-right: 8px; }
    .status {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      color: #fff;
      font-size: .75rem;
    }
    .status.ok { background: #16a34a; }
    .status.warn { background: #d97706; }
    .status.bad { background: #dc2626; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 9px 0;
      border-top: 1px solid #f1f5f9;
    }
    .bar-wrap { width: 110px; background: #e2e8f0; border-radius: 999px; height: 8px; overflow: hidden; }
    .bar { background: linear-gradient(90deg,#2563eb,#0ea5e9); height: 8px; }
    .inline { font-size: .87rem; color: var(--muted); }
    @media (max-width: 1040px) {
      .card-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .card-grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; }
    }
  </style>
    <link rel="stylesheet" href="/unified-ui.css">
    <script src="/unified-ui.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>운영 대시보드</h1>
        <div class="subtitle">시스템 건강도, 팀 상태, 실시간 이벤트를 한 화면에서 확인하고 대응합니다.</div>
      </div>
      <span class="inline" id="syncTime">동기화: -</span>
    </div>

    <section class="toolbar">
      <select id="refreshRate">
        <option value="5000">5초</option>
        <option value="10000">10초</option>
        <option value="30000">30초</option>
      </select>
      <button id="manualRefresh">새로고침</button>
      <button id="exportBtn">CSV 저장</button>
      <span class="inline" id="statusHint"></span>
    </section>

    <section class="card-grid">
      <article class="card">
        <div class="label">서비스 가용성</div>
        <div class="value" id="availability">-</div>
        <div class="meta" id="availabilityDelta">-</div>
      </article>
      <article class="card">
        <div class="label">평균 응답시간</div>
        <div class="value" id="latency">-</div>
        <div class="meta" id="latencyDelta">-</div>
      </article>
      <article class="card">
        <div class="label">오류율</div>
        <div class="value" id="errorRate">-</div>
        <div class="meta" id="errorDelta">-</div>
      </article>
      <article class="card">
        <div class="label">활성 연결</div>
        <div class="value" id="activeConnections">-</div>
        <div class="meta" id="connectionsDelta">-</div>
      </article>
    </section>

    <section class="two-col">
      <div class="panel">
        <h2>팀 운영 현황</h2>
        <div id="teamRows"></div>
      </div>
      <div class="panel">
        <h2>최근 이벤트</h2>
        <ul class="list" id="eventList"></ul>
      </div>
    </section>

    <section class="panel">
      <h2>실시간 운영 로그</h2>
      <ul class="list" id="opLogs"></ul>
    </section>
  </div>

  <script src="shared-runtime.js"></script>
  <script>
    const state = {
      teams: [],
      logs: [],
      intervalId: null
    };

    const fallbackTeams = [
      { name: "Alpha", utilization: 87, members: 11, status: "active", tasks: 9, utilization_trend: 88 },
      { name: "Beta", utilization: 73, members: 9, status: "active", tasks: 6, utilization_trend: 69 },
      { name: "Gamma", utilization: 64, members: 8, status: "warn", tasks: 7, utilization_trend: 58 },
      { name: "Delta", utilization: 52, members: 6, status: "warn", tasks: 5, utilization_trend: 59 }
    ];

    function now() {
      return new Date().toLocaleString("ko-KR", { hour12: false });
    }

    function statusClass(status) {
      return status === "active" ? "ok" : status === "warn" ? "warn" : "bad";
    }

    function appendLog(message, kind = "ok") {
      state.logs.unshift({ at: now(), message, kind });
      state.logs = state.logs.slice(0, 20);
      renderLog();
    }

    function renderLog() {
      const ul = document.getElementById("opLogs");
      const events = document.getElementById("eventList");
      ul.innerHTML = "";
      events.innerHTML = "";
      for (const item of state.logs) {
        const li = document.createElement("li");
        li.innerHTML = `<span class=\"ts\">${item.at}</span><span class=\"status ${statusClass(item.kind)}\" style=\"vertical-align:middle;\">${item.kind}</span> ${item.message}`;
        ul.appendChild(li);
        if (events.children.length < 10) {
          const e = li.cloneNode(true);
          events.appendChild(e);
        }
      }
    }

    function renderCards(summary) {
      document.getElementById("availability").textContent = `${summary.availability}%`;
      document.getElementById("latency").textContent = `${summary.latency}ms`;
      document.getElementById("errorRate").textContent = `${summary.errorRate}%`;
      document.getElementById("activeConnections").textContent = String(summary.connections);
      document.getElementById("availabilityDelta").textContent = `변동: ${summary.availabilityDelta >= 0 ? "+" : ""}${summary.availabilityDelta}%`;
      document.getElementById("latencyDelta").textContent = `평균 대비 ${summary.latencyDelta >= 0 ? "+" : ""}${summary.latencyDelta}ms`;
      document.getElementById("errorDelta").textContent = `변동: ${summary.errorDelta >= 0 ? "+" : ""}${summary.errorDelta}%`;
      document.getElementById("connectionsDelta").textContent = `변동: ${summary.connectionsDelta >= 0 ? "+" : ""}${summary.connectionsDelta}`;
    }

    function renderTeamRows(list) {
      const wrap = document.getElementById("teamRows");
      wrap.innerHTML = "";
      for (const t of list) {
        const row = document.createElement("div");
        row.className = "row";
        const bar = Math.max(5, Math.min(100, t.utilization || 0));
        row.innerHTML = `
          <div>
            <div>${t.name}</div>
            <div class="inline">활성 작업 ${t.tasks || 0}건 · ${t.members || 0}명</div>
          </div>
          <div style="text-align:right; flex:1;">
            <span class="status ${statusClass(t.status || "warn")}">${t.status || "warn"}</span>
            <div class="bar-wrap">
              <div class="bar" style="width:${bar}%;"></div>
            </div>
          </div>
        `;
        wrap.appendChild(row);
      }
    }

    function randomSummary() {
      const a = 95 + Math.random() * 5;
      return {
        availability: a.toFixed(2),
        latency: Math.max(70, Math.round(140 + Math.random() * 30)),
        errorRate: (Math.random() * 0.45).toFixed(2),
        connections: Math.round(120 + Math.random() * 80),
        availabilityDelta: (Math.random() * 0.5 - 0.2).toFixed(2),
        latencyDelta: Math.round(Math.random() * 20 - 10),
        errorDelta: (Math.random() * 0.4 - 0.2).toFixed(2),
        connectionsDelta: Math.round(Math.random() * 18 - 9)
      };
    }

    function normalizeTeam(t) {
      return {
        name: t.name || t.team || "Unknown",
        utilization: Number(t.utilization || 0) || Number(t.throughput || 0) || Math.round(Math.random() * 80 + 15),
        members: Number(t.members || 0) || Math.round(Math.random() * 10 + 4),
        tasks: Number(t.tasks || 0) || Math.round(Math.random() * 10 + 1),
        status: t.status || (Math.random() > 0.8 ? "warn" : "active")
      };
    }

    async function loadDashboard() {
      let summary;
      try {
        const statusRes = await sfRuntime.apiFetch("/api/v1/status");
        if (!statusRes.ok) throw new Error("status api failed");
        const status = await statusRes.json();

        let teamsData;
        try {
          const teamRes = await sfRuntime.apiFetch("/api/v1/teams");
          if (!teamRes.ok) throw new Error("team api failed");
          const teamPayload = await teamRes.json();
          teamsData = Array.isArray(teamPayload.teams) ? teamPayload.teams : (Array.isArray(teamPayload) ? teamPayload : []);
        } catch {
          teamsData = [];
        }

        state.teams = teamsData.length
          ? teamsData.map(normalizeTeam)
          : fallbackTeams.map((t) => ({ ...t }));

        const base = randomSummary();
        summary = {
          ...base,
          availability: typeof status.uptime === "number" ? status.uptime.toFixed(2) : base.availability,
          latency: Math.max(30, status.latency_ms || base.latency),
          errorRate: typeof status.error_rate === "number" ? status.error_rate.toFixed(2) : base.errorRate,
          connections: Number(status.active_sessions || 0) || base.connections
        };
        renderCards(summary);
        renderTeamRows(state.teams);
        appendLog("상태 API 동기화 완료", "ok");
        document.getElementById("syncTime").textContent = `동기화: ${now()}`;
        document.getElementById("statusHint").textContent = "데이터: 실제 API 기반";
      } catch (err) {
        summary = randomSummary();
        state.teams = fallbackTeams.map((t) => ({ ...t }));
        renderCards(summary);
        renderTeamRows(state.teams);
        appendLog(`동기화 실패: ${err.message || err}`, "bad");
        document.getElementById("syncTime").textContent = `동기화(데모): ${now()}`;
        document.getElementById("statusHint").textContent = "폴백 모드";
      }
    }

    function collectCSVRows() {
      const headers = ["metric","value","collected_at"];
      const nowStr = new Date().toISOString();
      const payload = [
        ["availability", document.getElementById("availability").textContent, nowStr],
        ["latency_ms", document.getElementById("latency").textContent.replace("ms",""), nowStr],
        ["error_rate", document.getElementById("errorRate").textContent.replace("%",""), nowStr],
        ["active_connections", document.getElementById("activeConnections").textContent, nowStr]
      ];
      return [headers, ...payload].map((r) => r.map((x) => `"${x}"`).join(",")).join("\n");
    }

    function exportCSV() {
      const rows = [
        ["metric","value","collected_at"],
        ["availability", document.getElementById("availability").textContent, new Date().toISOString()],
        ["latency_ms", document.getElementById("latency").textContent.replace("ms", ""), new Date().toISOString()],
        ["error_rate", document.getElementById("errorRate").textContent.replace("%", ""), new Date().toISOString()],
        ["active_connections", document.getElementById("activeConnections").textContent, new Date().toISOString()]
      ];
      const csv = sfRuntime.toCSV(rows);
      sfRuntime.downloadText(`dashboard-metrics-${Date.now()}.csv`, csv, "text/csv;charset=utf-8;");
      appendLog("대시보드 지표 CSV 저장", "ok");
    }

    function setupAuto() {
      const delay = Number(document.getElementById("refreshRate").value || 10000);
      if (state.intervalId) clearInterval(state.intervalId);
      state.intervalId = setInterval(loadDashboard, delay);
    }

    document.getElementById("manualRefresh").addEventListener("click", loadDashboard);
    document.getElementById("exportBtn").addEventListener("click", exportCSV);
    document.getElementById("refreshRate").addEventListener("change", setupAuto);

    setupAuto();
    loadDashboard();
  </script>
</body>
</html>
