<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오토파일럿 | 보헤미안 마케팅 AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <script src="../mobile-optimization.js" defer></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <main class="mx-auto min-h-screen max-w-5xl px-6 py-10">
    <a href="index.html" class="text-sm text-cyan-300 hover:text-cyan-200">돌아가기</a>
    <h1 class="mt-4 text-3xl font-black">오토파일럿 제어</h1>
    <p class="mt-2 text-slate-300">일일 기획, 생성, 발행을 위한 안전 자동화 정책 화면입니다.</p>

    <section class="mt-8 grid gap-4 md:grid-cols-3">
      <article class="rounded-xl border border-slate-800 bg-slate-900 p-5">
        <p class="text-xs text-slate-400">정책</p>
        <h2 class="mt-1 text-lg font-bold">일일 발행 제한</h2>
        <p class="mt-2 text-sm text-slate-300">기본 1일 3건, 작업공간 단위로 조정 가능합니다.</p>
      </article>
      <article class="rounded-xl border border-slate-800 bg-slate-900 p-5">
        <p class="text-xs text-slate-400">안전</p>
        <h2 class="mt-1 text-lg font-bold">즉시 OFF</h2>
        <p class="mt-2 text-sm text-slate-300">한 번 클릭으로 향후 예약 작업을 즉시 중단합니다.</p>
      </article>
      <article class="rounded-xl border border-slate-800 bg-slate-900 p-5">
        <p class="text-xs text-slate-400">규정</p>
        <h2 class="mt-1 text-lg font-bold">약관 게이트</h2>
        <p class="mt-2 text-sm text-slate-300">법적 동의가 저장될 때까지 사용을 허용하지 않습니다.</p>
      </article>
    </section>
  </main>
</body>
</html>
