<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Workspace | Bohemian Marketing AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="min-h-screen md:grid md:grid-cols-[250px_1fr]">
    <aside class="border-b border-slate-800 bg-slate-900 p-5 md:border-b-0 md:border-r">
      <a href="index.html" class="text-sm text-cyan-300 hover:text-cyan-200">← Service Home</a>
      <h1 class="mt-4 text-xl font-black">Workspace</h1>
      <nav class="mt-4 space-y-2 text-sm">
        <a class="block rounded-lg border border-slate-700 bg-slate-800 px-3 py-2" href="#">Dashboard</a>
        <a class="block rounded-lg border border-slate-800 px-3 py-2 hover:border-slate-600" href="#">Content Studio</a>
        <a class="block rounded-lg border border-slate-800 px-3 py-2 hover:border-slate-600" href="#">Calendar</a>
        <a class="block rounded-lg border border-slate-800 px-3 py-2 hover:border-slate-600" href="#">Inbox</a>
        <a class="block rounded-lg border border-slate-800 px-3 py-2 hover:border-slate-600" href="#">Analytics</a>
      </nav>
    </aside>

    <main class="p-6">
      <header class="mb-6 rounded-2xl border border-slate-800 bg-slate-900 p-6">
        <p class="text-xs uppercase tracking-[0.18em] text-cyan-300">Bohemian Marketing AI</p>
        <h2 class="mt-2 text-3xl font-black">Unified App Shell</h2>
        <p class="mt-2 text-slate-300">This shell is ready for API bindings from persona, publish, inbox, and analytics modules.</p>
      </header>

      <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
        <article class="rounded-xl border border-slate-800 bg-slate-900 p-5">
          <p class="text-xs text-slate-400">Draft Queue</p>
          <p class="mt-2 text-3xl font-black">18</p>
        </article>
        <article class="rounded-xl border border-slate-800 bg-slate-900 p-5">
          <p class="text-xs text-slate-400">Scheduled</p>
          <p class="mt-2 text-3xl font-black">26</p>
        </article>
        <article class="rounded-xl border border-slate-800 bg-slate-900 p-5">
          <p class="text-xs text-slate-400">Inbox Pending</p>
          <p class="mt-2 text-3xl font-black">9</p>
        </article>
        <article class="rounded-xl border border-slate-800 bg-slate-900 p-5">
          <p class="text-xs text-slate-400">Autopilot Status</p>
          <p class="mt-2 text-3xl font-black text-emerald-300">ON</p>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
