<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>요금제 | 보헤미안 마케팅 AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <script src="../mobile-optimization.js" defer></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <main class="mx-auto min-h-screen max-w-6xl px-6 py-10">
    <a href="index.html" class="text-sm text-cyan-300 hover:text-cyan-200">돌아가기</a>
    <h1 class="mt-4 text-3xl font-black">요금제와 크레딧 정책</h1>
    <p class="mt-2 text-slate-300">워크스페이스별 기본 크레딧과 월간 초과 사용 한도를 제공합니다.</p>

    <section class="mt-8 grid gap-4 md:grid-cols-3">
      <article class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
        <p class="text-xs text-slate-400">스타터</p>
        <h2 class="mt-1 text-2xl font-black">$29</h2>
        <p class="mt-2 text-sm text-slate-300">단일 작업공간, 기본 크레딧, 수동 발행 플로우.</p>
      </article>
      <article class="rounded-2xl border border-cyan-500 bg-cyan-500/10 p-6">
        <p class="text-xs text-cyan-200">성장형</p>
        <h2 class="mt-1 text-2xl font-black">$99</h2>
        <p class="mt-2 text-sm text-cyan-100">오토파일럿, 인박스 자동응답, 고급 분석 제공.</p>
      </article>
      <article class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
        <p class="text-xs text-slate-400">확장형</p>
        <h2 class="mt-1 text-2xl font-black">Custom</h2>
        <p class="mt-2 text-sm text-slate-300">팀 역할, API 확장, 맞춤형 정책 제어.</p>
      </article>
    </section>
  </main>
</body>
</html>
