<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <title>인프라 모니터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../responsive-framework.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .status-ok { background: #10b981; color: #fff; }
        .status-warning { background: #f59e0b; color: #fff; }
        .status-error { background: #ef4444; color: #fff; }
        .metric { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e5e7eb1a; }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #94a3b8; font-size: 14px; }
        .metric-value { color: #f8fafc; font-weight: 700; }
        .mcp-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(148,163,184,.1); border-radius: .5rem; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
    <script src="../mobile-optimization.js" defer></script>
</head>
<body class="text-slate-100">
    <div class="min-h-screen p-6">
        <h1 class="text-3xl font-bold text-white mb-6">인프라 모니터</h1>

        <div class="flex items-center gap-4 mb-8">
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg" onclick="refreshAll()">전체 새로고침</button>
            <span class="text-sm text-slate-300">마지막 업데이트: <span id="lastUpdate">--:--:--</span></span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <section class="soft-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-semibold">시스템 상태</span>
                    <span class="status-badge status-ok" id="healthStatus">온라인</span>
                </div>
                <div id="healthMetrics" class="space-y-3">
                    <div class="metric">
                        <span class="metric-label">API 상태</span>
                        <span class="metric-value">--</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">데이터베이스</span>
                        <span class="metric-value">--</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">가동시간</span>
                        <span class="metric-value">--</span>
                    </div>
                </div>
                <div id="healthError" class="text-sm mt-2"></div>
            </section>

            <section class="soft-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-semibold">프로세스</span>
                    <span class="status-badge status-ok" id="processStatus">활성</span>
                </div>
                <div id="processList">
                    <div class="metric-label text-center text-slate-400">프로세스 정보를 불러오는 중...</div>
                </div>
                <div id="processError" class="text-sm mt-2"></div>
            </section>

            <section class="soft-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-semibold">토큰 사용량</span>
                    <span class="status-badge status-ok" id="costStatus">정상</span>
                </div>
                <div id="costMetrics">
                    <div class="metric">
                        <span class="metric-label">세션 토큰</span>
                        <span class="metric-value">--</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">예상 비용</span>
                        <span class="metric-value">--</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">월간 합계</span>
                        <span class="metric-value">--</span>
                    </div>
                </div>
                <div id="costError" class="text-sm mt-2"></div>
            </section>

            <section class="soft-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-semibold">MCP 서버</span>
                    <span class="status-badge status-ok" id="mcpStatus">연결됨</span>
                </div>
                <div class="grid grid-cols-2 gap-2" id="mcpList">
                    <div class="metric-label text-center text-slate-400 col-span-2">MCP 서버 정보를 불러오는 중...</div>
                </div>
                <div id="mcpError" class="text-sm mt-2"></div>
            </section>

            <section class="soft-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-semibold">백엔드 서비스</span>
                    <span class="status-badge status-ok" id="servicesStatus">실행 중</span>
                </div>
                <div id="servicesList">
                    <div class="metric-label text-center text-slate-400">서비스 목록을 불러오는 중...</div>
                </div>
                <div id="servicesError" class="text-sm mt-2"></div>
            </section>

            <section class="soft-card p-6">
                <h3 class="font-semibold mb-4">문서</h3>
                <div class="flex flex-col gap-3">
                    <a href="/docs/deployment.html" target="_blank" class="text-indigo-300 hover:text-indigo-200">배포 가이드</a>
                    <a href="/docs/architecture.html" target="_blank" class="text-indigo-300 hover:text-indigo-200">아키텍처 개요</a>
                    <a href="/docs/troubleshooting.html" target="_blank" class="text-indigo-300 hover:text-indigo-200">문제 해결</a>
                </div>
            </section>
        </div>
    </div>

    <script>
        const API_BASE = `${window.location.origin}/api/infrastructure`;

        async function fetchHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();

                const badge = data.overall_status === 'healthy' ? 'status-ok' : 'status-error';
                const status = document.getElementById('healthStatus');
                status.className = `status-badge ${badge}`;
                status.textContent = data.overall_status || '알 수 없음';

                document.getElementById('healthMetrics').innerHTML = `
                    <div class="metric"><span class="metric-label">API 상태</span><span class="metric-value">${data.api_status || '-'}</span></div>
                    <div class="metric"><span class="metric-label">데이터베이스</span><span class="metric-value">${data.database_status || '-'}</span></div>
                    <div class="metric"><span class="metric-label">가동시간</span><span class="metric-value">${data.uptime || '-'}</span></div>
                `;
                document.getElementById('healthError').innerHTML = '';
            } catch (e) {
                document.getElementById('healthStatus').className = 'status-badge status-error';
                document.getElementById('healthError').innerHTML = `<div class="text-red-300">오류: ${e.message}</div>`;
            }
        }

        async function fetchProcess() {
            try {
                const res = await fetch(`${API_BASE}/processes`);
                const data = await res.json();
                const html = data.processes.map((process) => `
                    <div class="metric">
                        <span class="metric-label">${process.name}</span>
                        <span class="metric-value">${process.pid || 'N/A'}</span>
                    </div>
                `).join('');
                document.getElementById('processList').innerHTML = html || '<div class="text-slate-400 text-center">실행 중인 프로세스가 없습니다.</div>';
                document.getElementById('processError').innerHTML = '';
            } catch (e) {
                document.getElementById('processStatus').className = 'status-badge status-error';
                document.getElementById('processError').innerHTML = `<div class="text-red-300">오류: ${e.message}</div>`;
            }
        }

        function updateCostMetrics() {
            try {
                const cost = {
                    sessions: 1,
                    totalTokens: 57000,
                    totalCost: 0.315
                };
                document.getElementById('costMetrics').innerHTML = `
                    <div class="metric"><span class="metric-label">세션 토큰</span><span class="metric-value">~${cost.totalTokens.toLocaleString()}</span></div>
                    <div class="metric"><span class="metric-label">예상 비용</span><span class="metric-value">$${cost.totalCost.toFixed(2)}</span></div>
                    <div class="metric"><span class="metric-label">월간 합계</span><span class="metric-value">${cost.sessions} session</span></div>
                `;
                document.getElementById('costError').innerHTML = '';
            } catch (e) {
                document.getElementById('costStatus').className = 'status-badge status-warning';
                document.getElementById('costError').innerHTML = `<div class="text-amber-300">비용 정보를 불러오지 못했습니다.</div>`;
            }
        }

        function updateMCPServers() {
            const servers = [
                { name: 'filesystem', status: 'connected' },
                { name: 'sequential-thinking', status: 'connected' },
                { name: 'memory', status: 'connected' },
                { name: 'sqlite', status: 'connected' },
                { name: 'github', status: 'connected' },
                { name: 'brave-search', status: 'connected' },
                { name: 'google-search', status: 'connected' },
                { name: 'puppeteer', status: 'connected' },
                { name: 'fetch', status: 'connected' },
                { name: 'postgres', status: 'standby' }
            ];
            const html = servers.map((server) => `
                <div class="mcp-item">
                    <span>${server.name}</span>
                    <span class="dot" style="background: ${server.status === 'connected' ? '#10b981' : '#f59e0b'};"></span>
                </div>
            `).join('');
            document.getElementById('mcpList').innerHTML = html;
        }

        function updateServices() {
            const services = ['coocook', 'sns_auto', 'review', 'ai_automation', 'webapp_builder'];
            const html = services.map((service) => `
                <div class="metric">
                    <span class="metric-label">${service.replace(/_/g, ' ').toUpperCase()}</span>
                    <span class="metric-value">운영중</span>
                </div>
            `).join('');
            document.getElementById('servicesList').innerHTML = html;
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
        }

        async function refreshAll() {
            updateLastUpdate();
            await fetchHealth();
            await fetchProcess();
            updateCostMetrics();
            updateMCPServers();
            updateServices();
        }

        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
