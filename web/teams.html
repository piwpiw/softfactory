<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 관리</title>
  <link rel="stylesheet" href="/unified-ui.css" />
  <script src="/unified-ui.js" defer></script>
  <style>
    :root {
      --line: #9fb0c4;
      --text: #0b1627;
      --muted: #334155;
      --panel: rgba(255,255,255,0.98);
      --surface: #edf6ff;
      --surface-2: #dfeaf5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Apple SD Gothic Neo", system-ui, sans-serif;
      background:
        radial-gradient(80rem 80rem at 0% -20%, #e2e8f0 0%, transparent 45%),
        #f8fafc;
      color: var(--text);
    }
    .container { max-width: 1240px; margin: 0 auto; padding: 28px 24px 40px; }
    .hero, .toolbar, .panel, .sum, .team-card {
      background: var(--panel);
      border: 1px solid #8da4bb;
      border-radius: 18px;
      box-shadow: 0 14px 30px rgba(15,23,42,.08);
    }
    .hero, .toolbar, .panel { padding: 18px; }
    .hero { display:grid; grid-template-columns:1.2fr 0.8fr; gap:16px; margin-bottom:16px; }
    h1 { margin: 0; font-size: 2rem; }
    .sub, .meta { color: var(--muted); line-height: 1.55; }
    .toolbar {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:16px;
    }
    .toolbar input, .toolbar select, .toolbar button {
      border:1px solid #7f96ad;
      border-radius:10px;
      padding:9px 11px;
      background:#fff;
      font: inherit;
      color: var(--text);
    }
    .toolbar button {
      color:#fff;
      background:#0f172a;
      border-color:#0f172a;
      cursor:pointer;
      font-weight:800;
    }
    .summary {
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-bottom:16px;
    }
    .sum { padding:14px; }
    .sum p { color: var(--muted); margin:0; font-size:.88rem; font-weight:700; }
    .sum b { font-size: 1.65rem; display:block; margin-top:8px; }
    .grid { display:grid; grid-template-columns: 0.95fr 1.05fr; gap:16px; }
    .list { display:grid; gap:10px; }
    .team-card { padding:12px; background: linear-gradient(180deg,#fff,#f8fafc); cursor:pointer; }
    .team-card.selected { outline: 2px solid #2563eb; background: #eff6ff; }
    .team-card h3 { margin: 0 0 6px; }
    .row {
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      margin-top:8px;
      flex-wrap:wrap;
    }
    .progress-wrap { background:#dbe7ef; border-radius:999px; width:220px; height:8px; overflow:hidden; }
    .progress { height:8px; background: linear-gradient(90deg,#2563eb,#22c55e); }
    .badge {
      display:inline-flex;
      padding:3px 8px;
      border-radius:999px;
      font-size:.75rem;
      color:#fff;
      font-weight:800;
      margin-right:6px;
    }
    .badge.ok { background:#16a34a; }
    .badge.warn { background:#d97706; }
    .badge.bad { background:#dc2626; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 8px; border-top:1px solid #d7e2ee; font-size:.92rem; }
    th { background: var(--surface-2); color:#1e293b; font-weight:800; }
    tbody tr:hover td { background: var(--surface); }
    .hidden { display:none; }
    ul { margin:0; padding-left:16px; }
    @media (max-width: 1050px) {
      .hero, .grid { grid-template-columns:1fr; }
      .summary { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 700px) {
      .container { padding:20px 16px 32px; }
      .summary { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div>
        <h1>팀 관리</h1>
        <div class="sub">팀 성과, 가동률, 현재 작업, 선택한 팀의 세부 로그와 배치 액션을 한 번에 처리합니다.</div>
      </div>
      <div class="meta" id="syncTime">동기화 중...</div>
    </section>

    <section class="toolbar">
      <input id="search" placeholder="팀/작업 검색" />
      <select id="statusFilter">
        <option value="">전체 상태</option>
        <option value="ok">정상</option>
        <option value="warn">주의</option>
        <option value="bad">위험</option>
      </select>
      <button id="refresh">새로고침</button>
      <button id="exportBtn">CSV 저장</button>
      <button id="bulkEnable">선택 항목 ON</button>
      <button id="bulkPause">선택 항목 PAUSE</button>
    </section>

    <section class="summary">
      <article class="sum"><p>전체 팀</p><b id="totalTeams">0</b></article>
      <article class="sum"><p>총 멤버</p><b id="totalMembers">0</b></article>
      <article class="sum"><p>평균 가동률</p><b id="avgUtil">0%</b></article>
      <article class="sum"><p>위험 항목</p><b id="badCount">0</b></article>
    </section>

    <section class="grid">
      <section class="panel">
        <h2>팀 목록</h2>
        <div class="list" id="cards"></div>
      </section>

      <section class="panel">
        <h2>팀 상세 / 작업 로그</h2>
        <div id="detailEmpty" class="meta">팀을 선택하세요.</div>
        <div id="detailView" class="hidden">
          <h3 id="dName"></h3>
          <p class="meta" id="dMeta"></p>
          <p class="meta">가동률 <b id="dUtil"></b></p>
          <div class="progress-wrap"><div id="dBar" class="progress" style="width:0%;"></div></div>
          <h4 style="margin: 12px 0 6px;">최근 로그</h4>
          <ul id="dLogs"></ul>
        </div>
      </section>
    </section>

    <section class="panel" style="margin-top:16px;">
      <h2>팀 상태 테이블</h2>
      <table>
        <thead>
          <tr><th>팀</th><th>멤버</th><th>가동률</th><th>상태</th><th>현재 작업</th><th>최종 업데이트</th></tr>
        </thead>
        <tbody id="tableRows"></tbody>
      </table>
    </section>
  </div>

  <script src="shared-runtime.js"></script>
  <script>
    const state = { teams: [], selectedId: null };
    const defaultTeams = [
      { id: "team-alpha", name: "Alpha", members: 11, utilization: 87, status: "ok", current_task: "운영 API 리팩터링", updatedAt: "2026-03-04T09:00:00Z", logs: ["배포 전 점검 완료", "통합 테스트 통과"] },
      { id: "team-beta", name: "Beta", members: 9, utilization: 73, status: "warn", current_task: "권한 감사", updatedAt: "2026-03-03T17:00:00Z", logs: ["권한 정책 리포트 생성"] },
      { id: "team-gamma", name: "Gamma", members: 8, utilization: 66, status: "bad", current_task: "오류율 대응", updatedAt: "2026-03-03T13:20:00Z", logs: ["에러율 급증", "재시도 정책 검토"] },
      { id: "team-delta", name: "Delta", members: 7, utilization: 54, status: "warn", current_task: "문서 갱신", updatedAt: "2026-03-02T22:00:00Z", logs: ["문서 템플릿 정비 작업"] }
    ];

    function badge(status) {
      return `<span class="badge ${status}">${status}</span>`;
    }

    function normalizeTeam(raw, idx = 0) {
      return {
        id: raw.id || `team-${idx}`,
        name: raw.name || `Team ${idx}`,
        members: Number(raw.members || 0) || Math.max(4, Math.round(Math.random() * 8 + 4)),
        utilization: Math.max(0, Math.min(100, Number(raw.utilization || raw.activity || raw.avg_utilization || 0) || Math.round(Math.random() * 80 + 20))),
        status: ["ok","warn","bad"].includes(raw.status) ? raw.status : "warn",
        current_task: raw.current_task || raw.mission || "운영 점검",
        updatedAt: raw.updated_at || raw.updatedAt || new Date().toISOString(),
        logs: Array.isArray(raw.logs) ? raw.logs : [`업데이트: ${new Date().toLocaleString("ko-KR", { hour12: false })}`]
      };
    }

    function fmtDate(value) {
      return new Date(value).toLocaleString("ko-KR", { hour12: false });
    }

    function visibleTeams() {
      const q = (document.getElementById("search").value || "").trim().toLowerCase();
      const filter = document.getElementById("statusFilter").value;
      return state.teams.filter((team) => {
        if (filter && team.status !== filter) return false;
        if (q && !(team.name.toLowerCase().includes(q) || team.current_task.toLowerCase().includes(q))) return false;
        return true;
      });
    }

    function renderSummary() {
      const visible = visibleTeams();
      document.getElementById("totalTeams").textContent = visible.length;
      document.getElementById("totalMembers").textContent = visible.reduce((acc, t) => acc + t.members, 0);
      document.getElementById("avgUtil").textContent = `${visible.length ? Math.round(visible.reduce((acc, t) => acc + t.utilization, 0) / visible.length) : 0}%`;
      document.getElementById("badCount").textContent = visible.filter((t) => t.status === "bad").length;
      document.getElementById("syncTime").textContent = `동기화 ${new Date().toLocaleString("ko-KR", { hour12: false })}`;
    }

    function renderCards() {
      const cards = document.getElementById("cards");
      cards.innerHTML = visibleTeams().map((t) => `
        <article class="team-card ${t.id === state.selectedId ? "selected" : ""}" data-id="${t.id}">
          <h3>${t.name}</h3>
          <div class="meta">${t.members}명 · 현재 작업 ${t.current_task}</div>
          <div class="row">
            <div>${badge(t.status)}<span class="meta">가동률 ${t.utilization}%</span></div>
            <span class="meta">${fmtDate(t.updatedAt)}</span>
          </div>
          <div class="progress-wrap"><div class="progress" style="width:${t.utilization}%;"></div></div>
        </article>
      `).join("");
    }

    function renderTable() {
      const tbody = document.getElementById("tableRows");
      const rows = visibleTeams();
      tbody.innerHTML = rows.map((t) => `
        <tr>
          <td>${t.name}</td>
          <td>${t.members}</td>
          <td>${t.utilization}%</td>
          <td>${badge(t.status)}</td>
          <td>${t.current_task}</td>
          <td>${fmtDate(t.updatedAt)}</td>
        </tr>
      `).join("") || `<tr><td colspan="6">조회 결과가 없습니다.</td></tr>`;
    }

    function selectTeam(id) {
      const team = state.teams.find((item) => item.id === id);
      if (!team) return;
      state.selectedId = id;
      document.getElementById("detailEmpty").classList.add("hidden");
      document.getElementById("detailView").classList.remove("hidden");
      document.getElementById("dName").textContent = team.name;
      document.getElementById("dMeta").textContent = `${team.members}명 · ${team.current_task} · ${fmtDate(team.updatedAt)}`;
      document.getElementById("dUtil").textContent = `${team.utilization}%`;
      document.getElementById("dBar").style.width = `${team.utilization}%`;
      document.getElementById("dLogs").innerHTML = team.logs.map((log) => `<li>${log}</li>`).join("");
      renderCards();
    }

    function exportCsv() {
      const rows = [["팀","멤버","가동률","상태","작업"], ...visibleTeams().map((t) => [t.name, t.members, `${t.utilization}%`, t.status, t.current_task])];
      const csv = rows.map((row) => row.map((cell) => `"${String(cell).replaceAll("\"", "\"\"")}"`).join(",")).join("\n");
      sfRuntime.downloadText(`teams-${Date.now()}.csv`, csv, "text/csv;charset=utf-8;");
    }

    async function loadTeams() {
      try {
        const res = await sfRuntime.apiFetch("/api/v1/teams");
        if (!res.ok) throw new Error("teams api failed");
        const payload = await res.json();
        const list = Array.isArray(payload) ? payload : (Array.isArray(payload.teams) ? payload.teams : []);
        state.teams = list.length ? list.map((item, idx) => normalizeTeam(item, idx)) : defaultTeams.map(normalizeTeam);
      } catch {
        state.teams = defaultTeams.map(normalizeTeam);
      }
      if (!state.selectedId && state.teams[0]) state.selectedId = state.teams[0].id;
      renderSummary();
      renderCards();
      renderTable();
      if (state.selectedId) selectTeam(state.selectedId);
    }

    document.getElementById("refresh").addEventListener("click", loadTeams);
    document.getElementById("exportBtn").addEventListener("click", exportCsv);
    document.getElementById("search").addEventListener("input", () => { renderSummary(); renderCards(); renderTable(); });
    document.getElementById("statusFilter").addEventListener("change", () => { renderSummary(); renderCards(); renderTable(); });
    document.getElementById("cards").addEventListener("click", (event) => {
      const target = event.target.closest("[data-id]");
      if (target) selectTeam(target.getAttribute("data-id"));
    });
    loadTeams();
  </script>
</body>
</html>
