<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 | SoftFactory</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #DC2626; color: #fff; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .header h1 { margin: 0; }
        .content { background: #f9fafb; padding: 30px; border-radius: 0 0 8px 8px; }
        .button { display: inline-block; background: #DC2626; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 4px; margin: 20px 0; }
        .warning { background: #FEE2E2; border-left: 4px solid #DC2626; padding: 15px; margin: 20px 0; }
        .footer { text-align: center; color: #666; font-size: 12px; margin-top: 20px; }
        .code { background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: monospace; text-align: center; margin: 10px 0; }
        @media (max-width: 600px) {
            .container { padding: 12px; }
            .content { padding: 20px; }
        }
    </style>
    <script src="../../mobile-optimization.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>비밀번호 재설정</h1>
        </div>
        <div class="content">
            <p>안녕하세요.</p>
            <p>SoftFactory 계정 비밀번호 재설정 링크를 요청했습니다.</p>
            <div class="warning">
                <strong>요청 시간 기준 1시간 내</strong><br>
                아래 링크를 통해 비밀번호를 재설정해 주세요.
            </div>
            <p>재설정 버튼:</p>
            <a href="{{reset_url}}" class="button">비밀번호 재설정</a>
            <p>임시 코드:</p>
            <div class="code">{{reset_code}}</div>
            <p><strong>유효 기간: 1시간</strong></p>
            <p>지원이 필요하면 <a href="mailto:support@softfactory.kr">support@softfactory.kr</a>로 연락해 주세요.</p>
            <p>감사합니다.<br>SoftFactory</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 SoftFactory. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
