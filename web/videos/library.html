<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비디오 라이브러리 - SoftFactory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../responsive-framework.css">
    <style>
        body { font-family: "Inter", sans-serif; background: #0d1422; color: #ecf3ff; }
        .card { background: rgba(18, 29, 49, 0.9); border: 1px solid rgba(148, 169, 201, 0.2); }
    </style>
    <script src="../mobile-optimization.js" defer></script>
</head>
<body>
    <div class="min-h-screen p-6 lg:p-10">
        <div class="mx-auto max-w-6xl">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div>
                    <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Videos</p>
                    <h1 class="mt-2 text-3xl font-extrabold text-white">비디오 라이브러리</h1>
                    <p class="mt-3 text-sm text-slate-400">플레이어, 업로드, 출력 점검 흐름을 한 화면에서 다시 진입할 수 있게 정리했습니다.</p>
                </div>
                <div class="flex gap-3">
                    <a href="/videos/player.html?id=1" class="rounded-xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white hover:bg-indigo-500">플레이어 열기</a>
                    <a href="/videos/upload.html" class="rounded-xl border border-slate-700 px-4 py-3 text-sm font-semibold text-slate-200 hover:border-slate-500">업로드 화면</a>
                </div>
            </div>

            <div class="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
                <article class="card rounded-3xl p-6">
                    <p class="text-2xl">▶️</p>
                    <h2 class="mt-4 text-xl font-bold text-white">비디오 플레이어</h2>
                    <p class="mt-2 text-sm leading-6 text-slate-400">비디오 상세 재생, 화질 선택, 썸네일 확인, 다운로드 동선을 제공합니다.</p>
                    <a href="/videos/player.html?id=1" class="mt-5 inline-flex rounded-xl bg-slate-800 px-4 py-2 text-sm text-white hover:bg-slate-700">열기</a>
                </article>

                <article class="card rounded-3xl p-6">
                    <p class="text-2xl">⤴️</p>
                    <h2 class="mt-4 text-xl font-bold text-white">비디오 업로드</h2>
                    <p class="mt-2 text-sm leading-6 text-slate-400">새 비디오를 업로드하고 처리 상태를 확인하는 진입점입니다.</p>
                    <a href="/videos/upload.html" class="mt-5 inline-flex rounded-xl bg-slate-800 px-4 py-2 text-sm text-white hover:bg-slate-700">열기</a>
                </article>

                <article class="card rounded-3xl p-6">
                    <p class="text-2xl">🏭</p>
                    <h2 class="mt-4 text-xl font-bold text-white">플랫폼으로 복귀</h2>
                    <p class="mt-2 text-sm leading-6 text-slate-400">비디오 흐름에서 빠져나와 플랫폼 홈으로 돌아갑니다.</p>
                    <a href="/platform/index.html" class="mt-5 inline-flex rounded-xl bg-slate-800 px-4 py-2 text-sm text-white hover:bg-slate-700">이동</a>
                </article>
            </div>
        </div>
    </div>
</body>
</html>
