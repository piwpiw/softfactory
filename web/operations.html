<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>운영 제어</title>
  <link rel="stylesheet" href="/unified-ui.css" />
  <script src="/unified-ui.js" defer></script>
  <style>
    :root {
      --line: #9fb0c4;
      --text: #0b1627;
      --muted: #334155;
      --panel: rgba(255,255,255,0.98);
      --surface: #edf6ff;
      --surface-2: #dfeaf5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(90rem 90rem at 5% -20%, #e0f2fe 0%, transparent 40%),
        radial-gradient(60rem 60rem at 95% -10%, #dcfce7 0%, transparent 35%),
        #f8fafc;
    }
    .container { max-width: 1240px; margin: 0 auto; padding: 28px 24px 40px; }
    .hero, .toolbar, .panel, .stat, .mission {
      background: var(--panel);
      border: 1px solid #8da4bb;
      border-radius: 18px;
      box-shadow: 0 14px 30px rgba(15,23,42,.08);
    }
    .hero, .toolbar, .panel { padding: 18px; }
    .hero { display:grid; grid-template-columns: 1.2fr 0.8fr; gap:16px; margin-bottom:16px; }
    h1 { margin: 0; font-size: 2rem; }
    .subtitle, .meta { color: var(--muted); line-height: 1.55; }
    .toolbar {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:16px;
    }
    .toolbar select, .toolbar input, .toolbar button {
      border:1px solid #7f96ad;
      border-radius:10px;
      background:#fff;
      padding:9px 11px;
      font: inherit;
      color: var(--text);
    }
    .toolbar button {
      color:#fff;
      background:#0f172a;
      border-color:#0f172a;
      cursor:pointer;
      font-weight:800;
    }
    .stats { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:14px; margin-bottom:16px; }
    .stat { padding:14px; background: linear-gradient(180deg,#fff,#f6faff); }
    .stat .k { color: var(--muted); font-size: .88rem; font-weight: 700; }
    .stat .v { font-size: 1.75rem; font-weight: 900; margin-top: 8px; }
    .grid { display:grid; grid-template-columns: 1.15fr 0.85fr; gap:16px; margin-bottom:16px; }
    .mission {
      border-style: dashed;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .status {
      display:inline-flex;
      padding:3px 8px;
      border-radius:999px;
      color:#fff;
      font-size:.75rem;
      font-weight:800;
    }
    .status.ok { background:#16a34a; }
    .status.warn { background:#d97706; }
    .status.bad { background:#dc2626; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 8px; border-top:1px solid #d7e2ee; font-size:.92rem; }
    th { background: var(--surface-2); color:#1e293b; font-weight:800; }
    tbody tr:hover td { background: var(--surface); }
    .actions button {
      border:1px solid #b9cadb;
      border-radius:8px;
      background:#eff6ff;
      color:#1d4ed8;
      padding:6px 8px;
      cursor:pointer;
      font-weight:700;
    }
    ul { margin:0; padding-left:16px; }
    @media (max-width: 1080px) {
      .hero, .grid { grid-template-columns:1fr; }
      .stats { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 700px) {
      .container { padding:20px 16px 32px; }
      .stats { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div>
        <h1>운영 제어</h1>
        <div class="subtitle">자동화 상태, 운영 미션, 알림 전파, 서비스 필터를 묶어 운영자가 즉시 제어할 수 있는 화면입니다.</div>
      </div>
      <div class="meta" id="sync">동기화 중...</div>
    </section>

    <section class="toolbar">
      <select id="serviceFilter">
        <option value="">전체 서비스</option>
        <option value="auth">Auth</option>
        <option value="api">API</option>
        <option value="analytics">Analytics</option>
      </select>
      <select id="severityFilter">
        <option value="">모든 심각도</option>
        <option value="high">높음</option>
        <option value="medium">보통</option>
        <option value="low">낮음</option>
      </select>
      <input id="search" placeholder="미션 검색" />
      <button id="refresh">새로고침</button>
      <button id="sendAlert">알림 발송</button>
      <button id="runHealth">헬스체크 실행</button>
    </section>

    <section class="stats">
      <article class="stat"><div class="k">자동화 파이프라인</div><div class="v" id="mPipelines">0</div></article>
      <article class="stat"><div class="k">경고</div><div class="v" id="mAlerts">0</div></article>
      <article class="stat"><div class="k">정상 항목</div><div class="v" id="mSuccess">0</div></article>
    </section>

    <section class="grid">
      <section class="panel">
        <h2>운영 미션</h2>
        <div style="display:flex; gap:8px; margin-bottom: 12px; flex-wrap:wrap;">
          <input id="missionName" placeholder="미션 입력" style="flex:1; min-width:220px;" />
          <input id="missionService" placeholder="서비스명" style="width:160px;" />
          <button id="createMission" style="background:#0f172a;color:#fff;border:none;">추가</button>
        </div>
        <div id="missions"></div>
      </section>

      <section class="panel">
        <h2>실시간 상태 로그</h2>
        <ul id="stateList" class="meta"></ul>
      </section>
    </section>

    <section class="panel">
      <h2>팀 가동 요약</h2>
      <table>
        <thead>
          <tr><th>팀</th><th>미션</th><th>상태</th><th>진행률</th><th>다음 체크</th><th>조치</th></tr>
        </thead>
        <tbody id="teamRows"></tbody>
      </table>
    </section>
  </div>

  <script src="shared-runtime.js"></script>
  <script>
    const state = { teams: [], missions: [], statusLog: [] };
    const teamsSeed = ["Alpha", "Beta", "Gamma", "Delta", "Omega"];

    function normalize(item) {
      return {
        team: item.team || item.name || teamsSeed[Math.floor(Math.random() * teamsSeed.length)],
        mission: item.mission || item.current_task || "운영 점검",
        status: ["ok", "warn", "bad"].includes(item.status) ? item.status : "warn",
        progress: Math.max(5, Math.min(100, Number(item.progress || item.utilization || Math.random() * 100))),
        dueAt: item.due_at || item.updatedAt || new Date(Date.now() + Math.random() * 6 * 3600 * 1000).toISOString(),
        id: item.id || `m-${Math.random().toString(36).slice(2,8)}`,
        service: item.service || ["auth","api","analytics"][Math.floor(Math.random() * 3)],
        severity: item.severity || ["high","medium","low"][Math.floor(Math.random() * 3)]
      };
    }

    function now() {
      return new Date().toLocaleString("ko-KR", { hour12: false });
    }

    function log(msg) {
      state.statusLog.unshift(`[${now()}] ${msg}`);
      state.statusLog = state.statusLog.slice(0, 12);
      renderLogs();
    }

    function renderLogs() {
      const ul = document.getElementById("stateList");
      ul.innerHTML = state.statusLog.map((line) => `<li>${line}</li>`).join("") || "<li>로그 없음</li>";
    }

    function filteredTeams() {
      const serviceFilter = document.getElementById("serviceFilter").value;
      const severityFilter = document.getElementById("severityFilter").value;
      const q = (document.getElementById("search").value || "").trim().toLowerCase();
      return state.teams.filter((team) => {
        if (serviceFilter && team.service !== serviceFilter) return false;
        if (severityFilter && team.severity !== severityFilter) return false;
        if (q && !(team.team.toLowerCase().includes(q) || team.mission.toLowerCase().includes(q))) return false;
        return true;
      });
    }

    function renderMissions() {
      const wrap = document.getElementById("missions");
      wrap.innerHTML = filteredTeams().map((m) => `
        <div class="mission">
          <div>
            <div><strong>${m.team}</strong> · ${m.mission}</div>
            <div class="meta">다음 체크: ${new Date(m.dueAt).toLocaleString("ko-KR", { hour12: false })}</div>
          </div>
          <div><span class="status ${m.status}">${m.status}</span> <span class="meta">${Math.round(m.progress)}%</span></div>
        </div>
      `).join("") || "<div class='meta'>표시할 미션이 없습니다.</div>";
    }

    function renderTeamRows() {
      const rows = filteredTeams();
      document.getElementById("teamRows").innerHTML = rows.map((team) => `
        <tr>
          <td>${team.team}</td>
          <td>${team.mission}</td>
          <td><span class="status ${team.status}">${team.status}</span></td>
          <td>${Math.round(team.progress)}%</td>
          <td>${new Date(team.dueAt).toLocaleString("ko-KR", { hour12: false })}</td>
          <td class="actions">
            <button data-id="${team.id}" data-action="done">완료</button>
            <button data-id="${team.id}" data-action="skip">건너뛰기</button>
          </td>
        </tr>
      `).join("") || "<tr><td colspan='6'>조회 결과가 없습니다.</td></tr>";

      document.getElementById("mSuccess").textContent = rows.filter((t) => t.status === "ok").length;
      document.getElementById("mAlerts").textContent = rows.filter((t) => t.status !== "ok").length;
      document.getElementById("mPipelines").textContent = rows.length;
      document.getElementById("sync").textContent = `동기화 ${now()}`;
    }

    function updateRender() {
      renderMissions();
      renderTeamRows();
    }

    async function loadOperations() {
      try {
        const [teamRes, statusRes] = await Promise.all([
          sfRuntime.apiFetch("/api/v1/teams"),
          sfRuntime.apiFetch("/api/v1/automation/status")
        ]);
        const teamsRaw = teamRes.ok ? await teamRes.json() : [];
        const list = Array.isArray(teamsRaw?.teams) ? teamsRaw.teams : (Array.isArray(teamsRaw) ? teamsRaw : []);
        state.teams = list.length ? list.map(normalize) : teamsSeed.map((name, index) => normalize({ name, id: `seed-${index}` }));
        if (statusRes.ok) {
          const statusPayload = await statusRes.json();
          log(`자동화 상태 동기화 완료 · 파이프라인 ${statusPayload.total_pipelines || state.teams.length}`);
        } else {
          log("자동화 상태 API 연결 실패, 기본 데이터로 동작");
        }
      } catch {
        state.teams = teamsSeed.map((name, index) => normalize({ name, id: `seed-${index}` }));
        log("운영 데이터 API 연결 실패, 기본 운영 시나리오 사용");
      }
      updateRender();
    }

    document.getElementById("refresh").addEventListener("click", loadOperations);
    document.getElementById("sendAlert").addEventListener("click", () => log("운영 알림 전파 요청"));
    document.getElementById("runHealth").addEventListener("click", () => log("헬스체크 실행 요청"));
    document.getElementById("createMission").addEventListener("click", () => {
      const name = document.getElementById("missionName").value.trim();
      const service = document.getElementById("missionService").value.trim() || "api";
      if (!name) return;
      state.teams.unshift(normalize({ name: "Ops", mission: name, service, status: "warn", severity: "medium" }));
      document.getElementById("missionName").value = "";
      log(`운영 미션 추가: ${name}`);
      updateRender();
    });
    document.getElementById("serviceFilter").addEventListener("change", updateRender);
    document.getElementById("severityFilter").addEventListener("change", updateRender);
    document.getElementById("search").addEventListener("input", updateRender);
    document.getElementById("teamRows").addEventListener("click", (event) => {
      const button = event.target;
      if (!(button instanceof HTMLButtonElement)) return;
      const id = button.getAttribute("data-id");
      const action = button.getAttribute("data-action");
      const item = state.teams.find((team) => team.id === id);
      if (!item) return;
      if (action === "done") {
        item.status = "ok";
        item.progress = 100;
        log(`미션 완료 처리: ${item.team} / ${item.mission}`);
      }
      if (action === "skip") {
        item.status = "warn";
        item.progress = Math.max(0, item.progress - 15);
        log(`미션 보류 처리: ${item.team} / ${item.mission}`);
      }
      updateRender();
    });

    loadOperations();
  </script>
</body>
</html>
