<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <title>셰프 탐색 — CooCook | SoftFactory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../platform/api.js"></script>
    <script src="./coocook-taxonomy.js"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
    <link rel="stylesheet" href="../responsive-framework.css">
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
            <div class="p-6 border-b border-slate-800">
                <a href="index.html" class="flex items-center gap-3">
                    <span class="text-2xl">🍳</span>
                    <div>
                        <h1 class="font-bold text-white text-sm">CooCook</h1>
                        <p class="text-xs text-slate-400">요리 체험 플랫폼</p>
                    </div>
                </a>
            </div>
            <nav class="soft-nav-tree flex-1 p-6 space-y-2">
                <p class="text-xs font-semibold text-slate-400 uppercase px-4 mb-3">필터</p>
                <a href="index.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🏠 홈</a>
                <a href="explore.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg bg-orange-600 text-white font-medium">🔍 셰프 탐색</a>
                <a href="my-bookings.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">📅 내 예약</a>
                <a href="recipes.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🍳 레시피</a>
                <a href="shopping-list.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🛒 쇼핑 리스트</a>
                <a href="feed.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">📰 피드</a>
                <div class="my-6 border-t border-slate-800"></div>
                <div>
                    <p class="text-xs text-slate-400 font-medium mb-2">가격 범위</p>
                    <input type="range" min="15000" max="70000" value="45000" id="priceRange" class="w-full">
                    <p class="text-xs text-slate-400 mt-2" id="priceRangeLabel">15,000원 - 45,000원</p>
                </div>
            </nav>
            <div class="p-6 border-t border-slate-800">
                <button id="sessionActionButton" class="p-2 hover:bg-slate-800 rounded-lg w-full text-left">로그아웃</button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between shrink-0">
                <div>
                    <h2 class="text-xl font-bold text-white">🔍 셰프 탐색</h2>
                    <p class="text-xs text-slate-400">국가·메뉴 필터와 제휴 연동 키워드로 셰프를 탐색하세요</p>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <section id="quickFilters" class="mb-5 flex flex-wrap gap-2"></section>
                <section id="affinityTrail" class="mb-6 p-4 rounded-lg border border-slate-800 bg-slate-900/70 text-sm text-slate-300"></section>
                <div id="chefsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="bg-slate-800 rounded-lg p-6 border border-slate-700 animate-pulse">
                        <div class="h-6 bg-slate-700 rounded mb-4 w-3/4"></div>
                        <div class="space-y-3"><div class="h-4 bg-slate-700 rounded"></div><div class="h-4 bg-slate-700 rounded w-5/6"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="text/plain" id="coocook-explore-inline-script">
        if (typeof hasAuthSession === "function" && hasAuthSession()) {
            requireAuth();
        }
        if (typeof setupSessionActionButton === "function") {
            setupSessionActionButton();
        }
        const FALLBACK_CUISINES = ['Korean', 'Italian', 'Japanese', 'French', 'Mexican'];
        const FALLBACK_CATEGORIES = ['main', 'rice', 'noodle', 'stew', 'bakery', 'grill', 'street'];

        function normalizeFallback(meta) {
            return {
                cuisine: meta?.getCuisineMeta ? meta.getCuisineMeta(meta.normalizeCuisine ? meta.normalizeCuisine('Korean') : 'Korean') : null
            };
        }

        const registry = window.CooCookTaxonomy || {
            cuisineMeta: {},
            menuCategoryMeta: {},
            normalizeCuisine: (value) => value || 'Korean',
            normalizeMenuCategory: (value) => value || 'main',
            getCuisineMeta: (value) => ({ emoji: '🍽️', label: value || 'Cuisine', chipClass: 'bg-slate-500/20 text-slate-200 border border-slate-400/30' }),
            getMenuCategoryMeta: (value) => ({ emoji: '🍽️', label: value || '카테고리', chipClass: 'bg-slate-500/20 text-slate-200 border border-slate-400/30' }),
            enrichChef: (chef) => chef,
            recipeCatalog: [],
            buildHref: (page, params = {}) => {
                const search = new URLSearchParams();
                Object.entries(params).forEach(([k, v]) => { if (v) search.set(k, v); });
                return search.toString() ? `${page}?${search.toString()}` : page;
            }
        };

        const cuisineFilters = new Set();
        const categoryFilters = new Set();
        let allChefs = [];

        function renderFilters() {
            const container = document.getElementById('quickFilters');
            const cuisineChips = FALLBACK_CUISINES.map((c) => {
                const meta = registry.getCuisineMeta(c);
                return `<button onclick="toggleCuisine('${c}')" class="px-3 py-1.5 rounded-full border text-xs font-semibold ${cuisineFilters.has(c) ? 'bg-orange-600 text-white border-orange-600' : 'border-slate-700 text-slate-200'}">${meta.emoji} ${meta.label}</button>`;
            }).join('');

            const categoryChips = FALLBACK_CATEGORIES.map((c) => {
                const meta = registry.getMenuCategoryMeta(c);
                return `<button onclick="toggleCategory('${c}')" class="px-3 py-1.5 rounded-full border text-xs font-semibold ${categoryFilters.has(c) ? 'bg-emerald-600 text-white border-emerald-600' : 'border-slate-700 text-slate-200'}">${meta.emoji} ${meta.label}</button>`;
            }).join('');

            container.innerHTML = `
                <div>
                    <p class="text-xs text-slate-400 mb-2">국가</p>
                    <div class="flex flex-wrap gap-2">${cuisineChips}</div>
                </div>
                <div class="ml-2">
                    <p class="text-xs text-slate-400 mb-2">메뉴</p>
                    <div class="flex flex-wrap gap-2">${categoryChips}</div>
                </div>
            `;
        }

        function renderTrail() {
            const price = document.getElementById('priceRange').value;
            const cuisines = [...cuisineFilters] || [];
            const categories = [...categoryFilters] || [];
            const cText = cuisines.length ? cuisines.join(', ') : '전체';
            const mText = categories.length ? categories.join(', ') : '전체';
            document.getElementById('affinityTrail').textContent = `선택 조건: ${cText} · ${mText} · 상한 ${Number(price).toLocaleString()}원`;
        }

        function toggleCuisine(value) {
            if (cuisineFilters.has(value)) cuisineFilters.delete(value);
            else cuisineFilters.add(value);
            renderFilters();
            renderChefs();
            renderTrail();
        }

        function toggleCategory(value) {
            if (categoryFilters.has(value)) categoryFilters.delete(value);
            else categoryFilters.add(value);
            renderFilters();
            renderChefs();
            renderTrail();
        }

        function matchesFilters(chef) {
            const price = Number(document.getElementById('priceRange').value);
            const cuisine = chef.cuisine || 'Korean';
            const category = chef.category || 'main';
            const selectedCuisine = cuisineFilters.size === 0 || cuisineFilters.has(cuisine);
            const selectedCategory = categoryFilters.size === 0 || categoryFilters.has(category);
            const inPrice = Number(chef.price_per_session || 0) <= price;
            return selectedCuisine && selectedCategory && inPrice;
        }

        function inferCategoryFromRecipes(chefName) {
            const firstRecipe = (registry.recipeCatalog || []).find((r) => r.chef === chefName);
            return firstRecipe ? firstRecipe.category : 'main';
        }

        function renderChefs() {
            const grid = document.getElementById('chefsGrid');
            const filtered = (allChefs || []).filter(matchesFilters);
            if (!filtered.length) {
                grid.innerHTML = `<div class="col-span-full text-center text-slate-400 py-14">조건에 맞는 셰프가 없습니다. 필터를 조정해보세요.</div>`;
                return;
            }

            const withLinks = filtered.map((chef) => {
                const meta = registry.getCuisineMeta(chef.cuisine || 'Korean');
                const cat = inferCategoryFromRecipes(chef.name || chef.id);
                const catMeta = registry.getMenuCategoryMeta(cat);
                const affiliate = chef.affiliate || registry.getCuisineAffiliate(chef.cuisine || 'Korean');
                return `
                    <a href="chef-detail.html?id=${chef.id}" class="bg-gradient-to-br from-orange-900/30 to-orange-900/10 rounded-lg p-6 border-2 border-orange-600 hover:border-opacity-100 transition block">
                        <div class="flex items-center gap-3">
                            <span class="text-4xl">${chef.avatar || meta.emoji}</span>
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-white">${chef.name}</h3>
                                <p class="text-sm text-slate-400">${chef.cuisineMeta?.label || meta.label} · ${catMeta.label}</p>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center justify-between">
                            <span class="text-yellow-400 text-sm">⭐ ${chef.rating}</span>
                            <span class="text-slate-500 text-xs">(${chef.rating_count} 리뷰)</span>
                        </div>
                        <p class="text-lg font-bold text-white mt-4">${(chef.price_per_session || 0).toLocaleString()}원</p>
                        <p class="text-xs text-slate-400 mt-1">📍 ${chef.location}</p>
                        <p class="mt-3 text-xs text-orange-300"> ${affiliate.label}</p>
                        <a href="${affiliate.url}" target="_blank" rel="noopener noreferrer sponsored" class="mt-3 inline-block text-xs bg-orange-600 hover:bg-orange-700 rounded px-3 py-1.5 text-white">셰프 추천 상품 보기</a>
                    </a>
                `;
            });

            grid.innerHTML = withLinks.join('');
        }

        function applyPriceLabel() {
            const price = Number(document.getElementById('priceRange').value);
            document.getElementById('priceRangeLabel').textContent = `15,000원 - ${price.toLocaleString()}원`;
            renderChefs();
            renderTrail();
        }

        async function init() {
            try {
                const result = await getChefs();
                const rows = result?.chefs || result || [];
                allChefs = (rows || []).map((chef) => registry.enrichChef ? registry.enrichChef(chef) : { ...chef, cuisine: chef.cuisine_type });
            } catch (error) {
                allChefs = [
                    { id: 1, name: 'Chef Park', cuisine: 'Korean', cuisineMeta: registry.getCuisineMeta('Korean'), avatar: '🍛', rating: 4.9, rating_count: 98, price_per_session: 26000, location: '서울 종로구', category: 'stew', affiliate: registry.getCuisineAffiliate('Korean') },
                    { id: 2, name: 'Chef Marco', cuisine: 'Italian', cuisineMeta: registry.getCuisineMeta('Italian'), avatar: '🍝', rating: 4.8, rating_count: 88, price_per_session: 35000, location: '서울 강남구', category: 'noodle', affiliate: registry.getCuisineAffiliate('Italian') },
                    { id: 3, name: 'Chef Tanaka', cuisine: 'Japanese', cuisineMeta: registry.getCuisineMeta('Japanese'), avatar: '🍣', rating: 4.7, rating_count: 120, price_per_session: 32000, location: '서울 서초구', category: 'rice', affiliate: registry.getCuisineAffiliate('Japanese') }
                ];
                showWarning('셰프 API가 지연되어 샘플 데이터로 표시합니다.');
            }

            renderFilters();
            renderTrail();
            renderChefs();
            document.getElementById('priceRange').addEventListener('input', applyPriceLabel);
        }

            document.addEventListener('DOMContentLoaded', init);
    </script>
    <script src="./explore-app.js" defer></script>
    <script src="../mobile-optimization.js" defer></script>
</body>
</html>
