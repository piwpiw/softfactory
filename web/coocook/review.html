<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <title>리뷰 작성 — CooCook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../platform/api.js"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
    <link rel="stylesheet" href="../responsive-framework.css">
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="flex h-screen overflow-hidden">
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between shrink-0">
                <h2 class="text-xl font-bold text-white">리뷰 작성</h2>
                <a href="my-bookings.html" class="text-slate-400 hover:text-white">예약으로 돌아가기</a>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 space-y-6">
                        <div class="bg-slate-800 rounded-xl p-8 border border-slate-700">
                            <h3 class="text-lg font-bold text-white mb-6">예약 정보</h3>
                            <div class="flex items-center gap-4 mb-6">
                                <div class="text-4xl">👨‍🍳</div>
                                <div>
                                    <p class="text-xs text-slate-400">셰프</p>
                                    <p id="chefName" class="text-xl font-bold text-white">-</p>
                                    <p id="chefCuisine" class="text-sm text-slate-400">-</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <p><span class="text-slate-400">날짜</span> <span id="bookingDate" class="ml-2 text-white">-</span></p>
                                <p><span class="text-slate-400">소요시간</span> <span id="duration" class="ml-2 text-white">-</span></p>
                            </div>
                        </div>

                        <div class="bg-slate-800 rounded-xl p-8 border border-slate-700">
                            <h3 class="text-lg font-bold text-white mb-4">종합 평점</h3>
                            <div id="ratingButtons" class="flex gap-3 text-4xl mb-4">
                                <button onclick="setRating(1)" class="opacity-40 hover:opacity-100">⭐</button>
                                <button onclick="setRating(2)" class="opacity-40 hover:opacity-100">⭐</button>
                                <button onclick="setRating(3)" class="opacity-40 hover:opacity-100">⭐</button>
                                <button onclick="setRating(4)" class="opacity-40 hover:opacity-100">⭐</button>
                                <button onclick="setRating(5)" class="opacity-40 hover:opacity-100">⭐</button>
                            </div>
                            <p id="ratingText" class="text-sm text-orange-400 mb-4">5점 만점 중 선택해주세요.</p>

                            <div class="space-y-3">
                                <label class="text-sm font-bold text-white">카테고리 점수</label>
                                <div class="grid grid-cols-1 gap-3" id="criteriaContainer"></div>
                            </div>

                            <div class="mt-6">
                                <label class="block text-sm font-bold text-white mb-2">리뷰 작성</label>
                                <div class="flex flex-wrap gap-2 mb-2" id="quickTags"></div>
                                <textarea id="reviewText" placeholder="경험을 간결하게 남겨주세요. (최대 500자)" rows="6"
                                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-orange-500 resize-none"></textarea>
                                <p class="text-xs text-slate-400 mt-1"><span id="commentCount">0</span>/500</p>
                            </div>

                            <div class="mt-6 flex gap-3">
                                <button onclick="cancelReview()" class="px-5 py-3 rounded-lg border border-slate-700 text-slate-300 hover:border-slate-600">취소</button>
                                <button onclick="submitReview()" class="px-5 py-3 rounded-lg bg-orange-600 hover:bg-orange-700 text-white font-bold">리뷰 제출</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-blue-900/30 to-blue-900/10 rounded-xl p-6 border-2 border-blue-600 h-fit">
                        <h3 class="text-lg font-bold text-white mb-6">제출 요약</h3>
                        <div class="text-center">
                            <p id="summaryRating" class="text-5xl font-bold text-orange-400">5.0</p>
                            <p class="text-sm text-slate-300 mt-2">예상 반영 평점</p>
                        </div>
                        <div class="mt-6 bg-blue-900/30 border border-blue-700 rounded-lg p-4">
                            <p class="text-xs font-bold text-white">가이드</p>
                            <ul class="text-xs text-blue-200 mt-2 space-y-1">
                                <li>솔직하고 구체적인 코멘트가 가장 유효합니다.</li>
                                <li>평균 평점은 카테고리 점수 반영으로 계산됩니다.</li>
                                <li>제출 후에도 수정은 예약 상세에서 다시 진행할 수 있습니다.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let selectedRating = 5;
        let categoryRatings = {};
        let booking = null;

        const ratingTextMap = {
            1: '1점 - 기대보다 아쉬웠어요',
            2: '2점 - 다소 아쉬운 편',
            3: '3점 - 평균적인 수준',
            4: '4점 - 만족스러운 경험',
            5: '5점 - 아주 훌륭했어요'
        };

        const criteria = [
            { key: 'service', label: '서비스', emoji: '🙌' },
            { key: 'taste', label: '맛', emoji: '🍽️' },
            { key: 'timing', label: '시간 준수', emoji: '⏱️' },
            { key: 'clean', label: '청결', emoji: '✨' }
        ];

        const tags = ['정성스러웠어요', '요리 퀄리티 좋음', '대화가 편안해요', '다음에도 이용할게요', '친절했어요', '재방문 의사 있음'];

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, Number(value || 0)));
        }

        function setRating(value) {
            selectedRating = clamp(value, 1, 5);
            const buttons = document.querySelectorAll('#ratingButtons button');
            buttons.forEach((btn, idx) => {
                btn.style.opacity = idx + 1 <= selectedRating ? '1' : '0.35';
            });
            categoryRatings.total = selectedRating;
            document.getElementById('ratingText').textContent = ratingTextMap[selectedRating];
            document.getElementById('summaryRating').textContent = selectedRating.toFixed(1);
            refreshCriteria();
            updateSummary();
        }

        function buildCriteria() {
            document.getElementById('criteriaContainer').innerHTML = criteria.map((item) => `
                <label class="block">
                    <span class="text-sm text-slate-300 mb-1 flex items-center gap-2">${item.emoji} ${item.label}</span>
                    <input data-key="${item.key}" type="range" min="1" max="5" value="${selectedRating}" class="w-full">
                </label>
            `).join('');
            document.querySelectorAll('#criteriaContainer input').forEach((input) => {
                input.addEventListener('input', (evt) => {
                    categoryRatings[evt.target.dataset.key] = Number(evt.target.value);
                    updateSummary();
                });
            });
            refreshCriteria();
        }

        function refreshCriteria() {
            document.querySelectorAll('#criteriaContainer input').forEach((input) => {
                if (!categoryRatings[input.dataset.key]) categoryRatings[input.dataset.key] = selectedRating;
                input.value = categoryRatings[input.dataset.key];
            });
        }

        function buildTags() {
            const container = document.getElementById('quickTags');
            container.innerHTML = tags.map((tag) => `<button onclick="toggleTag('${tag.replace(/'/g, "\\'")}')" class="px-3 py-1 rounded-lg bg-slate-700 hover:bg-orange-600 text-xs">${tag}</button>`).join('');
        }

        function toggleTag(tag) {
            const text = document.getElementById('reviewText');
            const current = text.value.trim();
            const next = current ? `${current}\n- ${tag}` : `- ${tag}`;
            text.value = next.length <= 500 ? next : current;
            syncChars();
        }

        function syncChars() {
            const count = document.getElementById('reviewText').value.length;
            document.getElementById('commentCount').textContent = Math.min(500, count);
            updateSummary();
        }

        function updateSummary() {
            const values = Object.values(categoryRatings);
            if (!values.length) return;
            const avg = values.reduce((acc, value) => acc + clamp(value, 1, 5), 0) / values.length;
            document.getElementById('summaryRating').textContent = avg.toFixed(1);
        }

        async function loadBooking() {
            const params = new URLSearchParams(window.location.search);
            const bookingId = params.get('booking_id');
            if (!bookingId) {
                showWarning('booking_id가 없습니다. 내 예약 화면에서 다시 진입해주세요.');
                return;
            }
            try {
                booking = await getBookingDetail(bookingId);
                const chef = await getChefDetail(booking.chef_id);
                document.getElementById('chefName').textContent = chef.name || booking.chef_name || '익명 셰프';
                document.getElementById('chefCuisine').textContent = chef.cuisine_type || '요리';
                document.getElementById('bookingDate').textContent = booking.booking_date || '-';
                document.getElementById('duration').textContent = `${booking.duration_hours || '-'}시간`;
            } catch (error) {
                const fallback = { chef_name: 'Chef Park', booking_date: new Date().toLocaleString(), duration_hours: 2, chef_id: 1 };
                booking = fallback;
                document.getElementById('chefName').textContent = fallback.chef_name;
                document.getElementById('bookingDate').textContent = fallback.booking_date;
                document.getElementById('duration').textContent = `${fallback.duration_hours}시간`;
            }
        }

        async function submitReview() {
            const comment = document.getElementById('reviewText').value.trim();
            if (!booking?.id && !booking?.booking_id && !new URLSearchParams(window.location.search).get('booking_id')) {
                showError('예약 정보가 없습니다.');
                return;
            }
            if (comment.length > 500) {
                showError('리뷰는 500자 이내로 작성해주세요.');
                return;
            }

            const payload = {
                bookingId: booking.id || booking.booking_id || new URLSearchParams(window.location.search).get('booking_id'),
                rating: selectedRating,
                criteria: categoryRatings,
                comment,
            };

            try {
                if (typeof window.submitBookingReview === 'function') {
                    await window.submitBookingReview(payload.bookingId, selectedRating, comment, payload.criteria);
                }
                showSuccess('리뷰가 등록되었습니다.');
                window.location.href = `my-bookings.html?reviewed=${payload.bookingId}`;
            } catch (error) {
                if (comment.length > 0) {
                    showWarning('임시 저장 후 이동합니다.');
                    localStorage.setItem(`coocook_review_draft_${payload.bookingId}`, JSON.stringify(payload));
                    window.location.href = `my-bookings.html`;
                } else {
                    showError('리뷰 내용이 없습니다.');
                }
            }
        }

        function cancelReview() {
            if (confirm('작성 중인 리뷰를 취소하시겠습니까?')) {
                window.location.href = 'my-bookings.html';
            }
        }

        document.getElementById('reviewText')?.addEventListener('input', syncChars);
        document.addEventListener('DOMContentLoaded', () => {
            setRating(5);
            buildCriteria();
            buildTags();
            loadBooking();
        });
    </script>
    <script src="../mobile-optimization.js" defer></script>
</body>
</html>
