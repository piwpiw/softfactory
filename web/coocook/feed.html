<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#111827">
    <title>피드 — CooCook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../platform/api.js"></script>
    <script src="./coocook-taxonomy.js"></script>
    <link rel="stylesheet" href="../responsive-framework.css">
    <style>
        body { font-family: "Inter", sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.82); backdrop-filter: blur(10px); }
        .feed-card { transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
        .feed-card:hover { transform: translateY(-3px); box-shadow: 0 18px 42px rgba(2, 6, 23, 0.35); }
        .modal-overlay { backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto">
            <div class="p-6 border-b border-slate-800">
                <a href="index.html" class="flex items-center gap-3">
                    <span class="text-2xl">🍳</span>
                    <div>
                        <h1 class="font-bold text-white text-sm">CooCook</h1>
                        <p class="text-xs text-slate-400">요리 체험 플랫폼</p>
                    </div>
                </a>
            </div>
            <nav class="soft-nav-tree flex-1 p-6 space-y-2">
                <a href="index.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🏠 홈 허브</a>
                <a href="recipes.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">📖 레시피</a>
                <a href="shopping-list.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800">🛒 쇼핑 리스트</a>
                <a href="feed.html" class="soft-nav-link flex items-center gap-3 px-4 py-2.5 rounded-lg bg-orange-600 text-white font-medium">📰 피드</a>

                <div>
                    <p class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">국가</p>
                    <div id="countryFilters" class="space-y-2"></div>
                </div>
                <div>
                    <p class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">국가 메뉴</p>
                    <div id="menuFilters" class="space-y-2"></div>
                </div>
                <div>
                    <p class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">카테고리</p>
                    <div id="categoryFilters" class="space-y-2"></div>
                </div>
            </nav>
            <div class="p-6 border-t border-slate-800">
                <button id="sessionActionButton" class="w-full rounded-lg px-4 py-2 text-left hover:bg-slate-800">로그아웃</button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between shrink-0">
                <button class="hamburger" aria-label="메뉴 토글" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
                <div>
                    <h2 class="text-xl font-bold text-white">📰 연결 피드</h2>
                    <p class="text-xs text-slate-400">국가와 메뉴 문맥에 맞는 후기, 팁, 장면을 함께 봅니다.</p>
                </div>
                <div id="viewFilters" class="flex gap-2"></div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="grid gap-6 xl:grid-cols-[0.72fr_1.45fr_0.83fr]">
                    <section class="space-y-4">
                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <div class="text-center">
                                <div id="profileEmoji" class="text-5xl">🍳</div>
                                <h3 class="mt-3 text-lg font-semibold text-white">김정호</h3>
                                <p class="text-sm text-orange-300">@coocook.daily</p>
                                <p class="mt-3 text-xs leading-6 text-slate-400">국가별 요리 무드를 저장하고, 후기에서 장보기까지 바로 넘기는 사용자를 위한 피드입니다.</p>
                            </div>
                            <div class="mt-5 grid grid-cols-3 gap-3 text-center">
                                <div class="rounded-2xl bg-slate-950/70 p-3">
                                    <p class="text-lg font-bold text-white">24</p>
                                    <p class="text-xs text-slate-400">저장</p>
                                </div>
                                <div class="rounded-2xl bg-slate-950/70 p-3">
                                    <p class="text-lg font-bold text-white">128</p>
                                    <p class="text-xs text-slate-400">팔로워</p>
                                </div>
                                <div class="rounded-2xl bg-slate-950/70 p-3">
                                    <p class="text-lg font-bold text-white">45</p>
                                    <p class="text-xs text-slate-400">리뷰</p>
                                </div>
                            </div>
                        </div>

                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <h3 class="font-semibold text-white">관심 국가</h3>
                            <div id="preferredCuisines" class="mt-3 flex flex-wrap gap-2"></div>
                            <h3 class="mt-5 font-semibold text-white">관심 카테고리</h3>
                            <div id="preferredCategories" class="mt-3 flex flex-wrap gap-2"></div>
                        </div>
                    </section>

                    <section class="space-y-4">
                        <div id="feedBanner" class="overflow-hidden rounded-3xl border border-slate-800"></div>
                        <div id="activeFilterBar" class="flex flex-wrap gap-2"></div>
                        <div id="feedStream" class="space-y-5"></div>
                    </section>

                    <section class="space-y-4">
                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <h3 class="font-semibold text-white">🔥 추천 셰프</h3>
                            <div id="recommendedChefs" class="mt-4 space-y-3"></div>
                        </div>
                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <h3 class="font-semibold text-white">🔗 바로 이어가기</h3>
                            <div id="flowLinks" class="mt-4 space-y-3"></div>
                        </div>
                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <h3 class="font-semibold text-white">🛍️ 제휴 상품 링크</h3>
                            <div id="affiliateRail" class="mt-4 space-y-3"></div>
                            <p id="affiliateDisclosure" class="mt-4 text-xs text-slate-500"></p>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <div id="commentModal" class="fixed inset-0 hidden items-center justify-center bg-black/60 p-4 modal-overlay z-50">
        <div class="w-full max-w-lg rounded-3xl border border-slate-700 bg-slate-900">
            <div class="flex items-center justify-between border-b border-slate-800 px-6 py-4">
                <div>
                    <p class="text-xs text-slate-400">피드 반응 남기기</p>
                    <h3 id="commentRecipeName" class="mt-1 text-xl font-bold text-white"></h3>
                </div>
                <button onclick="closeCommentModal()" class="text-2xl text-slate-400 hover:text-white">✕</button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <p class="mb-2 text-sm font-semibold text-white">평점</p>
                    <div class="flex gap-2" id="ratingButtons"></div>
                </div>
                <textarea id="commentText" class="h-32 w-full rounded-2xl border border-slate-700 bg-slate-800 px-4 py-3 text-white placeholder-slate-500" placeholder="이 게시물에서 유용했던 점을 남겨보세요."></textarea>
            </div>
            <div class="border-t border-slate-800 px-6 py-4">
                <button onclick="submitComment()" class="w-full rounded-2xl bg-orange-600 px-4 py-3 text-sm font-medium text-white hover:bg-orange-500">댓글 남기기</button>
            </div>
        </div>
    </div>

    <script>
        if (typeof hasAuthSession === "function" && hasAuthSession()) {
            requireAuth();
        }
        if (typeof setupSessionActionButton === "function") {
            setupSessionActionButton();
        }

        const taxonomy = window.CooCookTaxonomy;
        const state = taxonomy.parseState();
        const viewOptions = [
            { key: "", label: "전체" },
            { key: "tip", label: "팁" },
            { key: "review", label: "후기" },
        ];
        const feedPosts = taxonomy.buildFeedPosts();
        const recommendedChefs = [
            { name: "Chef Park", cuisine: "Korean", followers: 1240 },
            { name: "Chef Marco", cuisine: "Italian", followers: 890 },
            { name: "Chef Tanaka", cuisine: "Japanese", followers: 2100 },
            { name: "Chef Garcia", cuisine: "Mexican", followers: 960 },
        ];
        let activeRating = 5;
        let activePostId = null;

        function getActiveCountry() {
            return state.country || "KR";
        }

        function resolveDefaultCuisine() {
            return taxonomy.resolveDefaultCuisine(getActiveCountry());
        }

        function getCountryMenus() {
            return taxonomy.getCountryMenus(getActiveCountry());
        }

        function getPostMenu(post) {
            return taxonomy.getRecipeCategoryAsMenu(getCountryMenus(), post.category);
        }

        function toggleState(key, value) {
            state[key] = state[key] === value ? "" : value;
            if (key === "country") {
                state.cuisine = state[key] ? resolveDefaultCuisine() : "";
                state.category = "";
                state.menu = "";
            }
            if (key === "cuisine") state.category = "";
            if (key === "category") state.menu = "";
            if (key === "menu") state.category = "";
            taxonomy.updateUrl(state);
            render();
        }

        function resetFeedFilters() {
            state.country = "";
            state.cuisine = "";
            state.menu = "";
            state.category = "";
            state.view = "";
            taxonomy.updateUrl(state);
            render();
        }

        function simplifyFeedSidebar() {
            state.country = "";
            state.menu = "";
            const countrySection = document.getElementById("countryFilters")?.parentElement;
            const menuSection = document.getElementById("menuFilters")?.parentElement;
            const categorySection = document.getElementById("categoryFilters")?.parentElement;
            if (countrySection) countrySection.classList.add("hidden");
            if (menuSection) menuSection.classList.add("hidden");
            if (categorySection) {
                categorySection.innerHTML = `
                    <div class="rounded-2xl border border-slate-700 bg-slate-800/70 p-4">
                        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">Feed Focus</p>
                        <p class="mt-2 text-sm leading-6 text-slate-300">Use cuisine and view chips first. Keep feed browsing simple, then open a post for recipe and shopping details.</p>
                        <button onclick="resetFeedFilters()" class="mt-3 w-full rounded-xl bg-orange-600 px-3 py-2 text-sm font-medium text-white hover:bg-orange-500">Reset Feed</button>
                        <div id="categoryFilters" class="hidden"></div>
                    </div>
                `;
            }
        }

        function getFilteredPosts() {
            return feedPosts.filter((post) => {
                const cuisineMatch = !state.cuisine || post.cuisine === state.cuisine;
                const categoryMatch = !state.category || post.category === state.category;
                const menuMatch = !state.menu || getPostMenu(post) === state.menu;
                const viewMatch = !state.view || post.type === state.view;
                return cuisineMatch && categoryMatch && menuMatch && viewMatch;
            });
        }

        function renderViewFilters() {
            document.getElementById("viewFilters").innerHTML = viewOptions.map((option) => {
                const active = state.view === option.key || (!state.view && option.key === "");
                return `<button onclick="toggleState('view', '${option.key}')" class="rounded-full px-3 py-2 text-sm ${active ? 'bg-orange-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}">${option.label}</button>`;
            }).join("");
        }

        function renderPreferences() {
            ["countryFilters", "menuFilters", "categoryFilters", "preferredCuisines", "preferredCategories"].forEach((id) => {
                if (!document.getElementById(id)) {
                    const fallback = document.createElement("div");
                    fallback.id = id;
                    fallback.className = "hidden";
                    document.body.appendChild(fallback);
                }
            });
            document.getElementById("countryFilters").innerHTML = [{ key: "", label: "전체 국가", icon: "🌍" }]
                .concat(taxonomy.getAvailableCountries().map((key) => {
                    const meta = taxonomy.getCountryMeta(key);
                    return { key, label: meta.label, icon: meta.flag };
                }))
                .map((item) => {
                    const active = getActiveCountry() === item.key && item.key !== "";
                    return `<button onclick="toggleState('country', '${item.key}')" class="w-full rounded-lg border px-3 py-2 text-left text-sm ${active ? 'border-orange-400 bg-orange-500/10 text-white' : 'border-slate-700 bg-slate-800 text-slate-300 hover:border-slate-500'}">${item.icon} ${item.label}</button>`;
                }).join("");

            document.getElementById("menuFilters").innerHTML = [
                { key: "", label: "전체 메뉴", icon: "🗂" },
                ...getCountryMenus().map((menu) => ({ key: menu.key, label: menu.label, icon: menu.emoji })),
            ].map((item) => {
                const active = state.menu === item.key;
                return `<button onclick="toggleState('menu', '${item.key}')" class="w-full rounded-lg border px-3 py-2 text-left text-sm ${active ? 'border-emerald-400 bg-emerald-500/10 text-white' : 'border-slate-700 bg-slate-800 text-slate-300 hover:border-slate-500'}">${item.icon} ${item.label}</button>`;
            }).join("");

            document.getElementById("categoryFilters").innerHTML = taxonomy.getAvailableMenuCategoryKeys().map((key) => {
                const meta = taxonomy.getMenuCategoryMeta(key);
                const active = state.category === key;
                return `<button onclick="toggleState('category', '${key}')" class="w-full rounded-lg border px-3 py-2 text-left text-sm ${active ? 'border-orange-400 bg-orange-500/10 text-white' : 'border-slate-700 bg-slate-800 text-slate-300 hover:border-slate-500'}">${meta.emoji} ${meta.label}</button>`;
            }).join("");

            document.getElementById("preferredCuisines").innerHTML = taxonomy.getAvailableCuisineKeys().map((key) => {
                const meta = taxonomy.getCuisineMeta(key);
                return `<button onclick="toggleState('cuisine', '${key}')" class="rounded-full px-3 py-1 text-sm ${meta.chipClass}">${meta.flag} ${meta.label}</button>`;
            }).join("");

            document.getElementById("preferredCategories").innerHTML = taxonomy.getAvailableMenuCategoryKeys().map((key) => {
                const meta = taxonomy.getMenuCategoryMeta(key);
                return `<button onclick="toggleState('category', '${key}')" class="rounded-full px-3 py-1 text-sm ${meta.chipClass}">${meta.emoji} ${meta.label}</button>`;
            }).join("");
            simplifyFeedSidebar();
        }

        function renderBanner(filteredPosts) {
            const representative = filteredPosts[0] || feedPosts[0];
            const cuisineMeta = taxonomy.getCuisineMeta(representative.cuisine);
            const categoryMeta = taxonomy.getMenuCategoryMeta(representative.category);
            const countryMeta = taxonomy.getCountryMeta(getActiveCountry());
            document.getElementById("profileEmoji").textContent = cuisineMeta.emoji;
            document.getElementById("feedBanner").innerHTML = `
                <div class="grid lg:grid-cols-[1.1fr_0.9fr]">
                    <img src="${representative.thumb}" alt="${representative.title}" class="h-72 w-full object-cover">
                    <div class="bg-gradient-to-br ${cuisineMeta.panelClass} p-6">
                        <p class="inline-flex rounded-full px-3 py-1 text-xs font-semibold ${countryMeta.chipClass || 'bg-slate-800 text-white'}">${countryMeta.flag} ${countryMeta.label}</p>
                        <h1 class="mt-4 text-3xl font-extrabold text-white">${representative.title}</h1>
                        <p class="mt-3 text-sm leading-7 text-slate-100">${representative.content}</p>
                        <div class="mt-4 flex flex-wrap gap-2">
                            <button onclick="toggleState('cuisine', '${representative.cuisine}')" class="rounded-full px-3 py-1 text-sm ${cuisineMeta.chipClass}">${cuisineMeta.emoji} ${cuisineMeta.label}</button>
                            <button onclick="toggleState('category', '${representative.category}')" class="rounded-full px-3 py-1 text-sm ${categoryMeta.chipClass}">${categoryMeta.emoji} ${categoryMeta.label}</button>
                            <button onclick="toggleState('country', '${getActiveCountry()}')" class="rounded-full px-3 py-1 text-sm ${countryMeta.chipClass || 'bg-slate-800 text-white'}">${countryMeta.flag} ${countryMeta.label}</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderActiveFilterBar() {
            const chips = [];
            if (state.country) {
                const countryMeta = taxonomy.getCountryMeta(state.country);
                chips.push(`<button onclick="toggleState('country', '${state.country}')" class="rounded-full px-3 py-1 text-sm border border-slate-700 bg-slate-800 text-white">${countryMeta.flag} ${countryMeta.label} ✕</button>`);
            }
            if (state.cuisine) {
                const meta = taxonomy.getCuisineMeta(state.cuisine);
                chips.push(`<button onclick="toggleState('cuisine', '${state.cuisine}')" class="rounded-full px-3 py-1 text-sm ${meta.chipClass}">${meta.flag} ${meta.label} ✕</button>`);
            }
            if (state.menu) {
                const menu = getCountryMenus().find((item) => item.key === state.menu);
                chips.push(`<button onclick="toggleState('menu', '${state.menu}')" class="rounded-full px-3 py-1 text-sm bg-emerald-600 text-white">${menu ? `${menu.emoji} ${menu.label}` : "메뉴"} ✕</button>`);
            }
            if (state.category) {
                const meta = taxonomy.getMenuCategoryMeta(state.category);
                chips.push(`<button onclick="toggleState('category', '${state.category}')" class="rounded-full px-3 py-1 text-sm ${meta.chipClass}">${meta.emoji} ${meta.label} ✕</button>`);
            }
            if (state.view) {
                chips.push(`<button onclick="toggleState('view', '${state.view}')" class="rounded-full border border-slate-700 bg-slate-800 px-3 py-1 text-sm text-slate-200">${state.view === "tip" ? "팁" : "후기"} ✕</button>`);
            }
            document.getElementById("activeFilterBar").innerHTML = chips.join("");
        }

        function renderFeed() {
            const filteredPosts = getFilteredPosts();
            renderBanner(filteredPosts);
            renderActiveFilterBar();
            document.getElementById("feedStream").innerHTML = filteredPosts.map((post) => {
                const cuisineMeta = taxonomy.getCuisineMeta(post.cuisine);
                const categoryMeta = taxonomy.getMenuCategoryMeta(post.category);
                return `
                    <article class="feed-card overflow-hidden rounded-3xl border border-slate-800 bg-slate-900">
                        <div class="flex items-center justify-between border-b border-slate-800 px-5 py-4">
                            <div class="flex items-center gap-3">
                                <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-800 text-2xl">${post.avatar}</div>
                                <div>
                                    <p class="font-semibold text-white">${post.author}</p>
                                    <p class="text-xs text-slate-400">${post.time}</p>
                                </div>
                            </div>
                            <button onclick="toggleFollow('${post.author}')" class="rounded-full bg-orange-600 px-3 py-2 text-xs font-medium text-white hover:bg-orange-500">팔로우</button>
                        </div>
                        <img src="${post.thumb}" alt="${post.title}" class="h-64 w-full object-cover">
                        <div class="p-5">
                            <div class="flex flex-wrap gap-2">
                                <button onclick="toggleState('cuisine', '${post.cuisine}')" class="rounded-full px-3 py-1 text-xs font-medium ${cuisineMeta.chipClass}">${cuisineMeta.flag} ${cuisineMeta.label}</button>
                                <button onclick="toggleState('category', '${post.category}')" class="rounded-full px-3 py-1 text-xs font-medium ${categoryMeta.chipClass}">${categoryMeta.emoji} ${categoryMeta.label}</button>
                                <span class="rounded-full border border-slate-700 bg-slate-800 px-3 py-1 text-xs text-slate-300">${post.type === 'tip' ? '팁' : '후기'}</span>
                            </div>
                            <h3 class="mt-4 text-xl font-semibold text-white">${post.image} ${post.title}</h3>
                            <p class="mt-3 text-sm leading-7 text-slate-400">${post.content}</p>
                            <div class="mt-4 grid gap-2 sm:grid-cols-3">
                                <a href="${taxonomy.buildHref('recipes.html', { cuisine: post.cuisine, category: post.category, country: getActiveCountry(), menu: state.menu, recipe: post.recipeId })}" class="rounded-2xl bg-slate-800 px-4 py-3 text-center text-sm text-white hover:bg-slate-700">📖 관련 레시피</a>
                                <a href="${taxonomy.buildHref('shopping-list.html', { cuisine: post.cuisine, category: post.category, country: getActiveCountry(), menu: state.menu, recipe: post.recipeId })}" class="rounded-2xl bg-slate-800 px-4 py-3 text-center text-sm text-white hover:bg-slate-700">🛒 장보기 연결</a>
                                <a href="${post.affiliateLinks[1].url}" target="_blank" rel="noopener noreferrer sponsored" class="rounded-2xl bg-slate-800 px-4 py-3 text-center text-sm text-white hover:bg-slate-700">🛍️ 상품 보기</a>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 border-t border-slate-800 bg-slate-950/70 text-sm">
                            <button onclick="toggleLike(${post.id})" class="px-4 py-3 text-slate-300 hover:text-white"><span id="like-icon-${post.id}">${post.liked ? "❤️" : "🤍"}</span> <span id="like-count-${post.id}">${post.likes}</span></button>
                            <button onclick="openCommentModal(${post.id})" class="px-4 py-3 text-slate-300 hover:text-white">💬 ${post.comments}</button>
                            <button onclick="copyShareLink(${post.id})" class="px-4 py-3 text-slate-300 hover:text-white">🔗 공유</button>
                        </div>
                    </article>
                `;
            }).join("") || `
                <div class="rounded-3xl border border-slate-800 bg-slate-900 p-10 text-center">
                    <p class="text-lg font-semibold text-white">현재 조건에 맞는 피드가 없습니다.</p>
                    <p class="mt-2 text-sm text-slate-400">국가나 카테고리를 하나 풀고 다시 확인해보세요.</p>
                </div>
            `;
        }

        function renderRecommendations() {
            const cuisine = state.cuisine || getFilteredPosts()[0]?.cuisine || "Korean";
            document.getElementById("recommendedChefs").innerHTML = recommendedChefs
                .filter((chef) => !state.cuisine || chef.cuisine === cuisine)
                .map((chef) => {
                    const meta = taxonomy.getCuisineMeta(chef.cuisine);
                    return `
                        <div class="rounded-2xl border border-slate-800 bg-slate-950/70 p-4">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">${meta.emoji}</span>
                                    <div>
                                        <p class="font-semibold text-white">${chef.name}</p>
                                        <p class="text-xs text-slate-400">${meta.flag} ${meta.label} · ${chef.followers} 팔로워</p>
                                    </div>
                                </div>
                                <a href="${taxonomy.buildHref('recipes.html', { cuisine: chef.cuisine })}" class="text-xs text-orange-300">보기</a>
                            </div>
                        </div>
                    `;
                }).join("");

            const representative = getFilteredPosts()[0] || feedPosts[0];
            document.getElementById("flowLinks").innerHTML = [
                { icon: "📖", title: "같은 레시피로 이동", href: taxonomy.buildHref("recipes.html", { cuisine: representative.cuisine, category: representative.category, country: getActiveCountry(), menu: state.menu, recipe: representative.recipeId }) },
                { icon: "🛒", title: "같은 재료 묶기", href: taxonomy.buildHref("shopping-list.html", { cuisine: representative.cuisine, category: representative.category, country: getActiveCountry(), menu: state.menu, recipe: representative.recipeId }) },
                { icon: "🏠", title: "허브에서 다시 정리", href: taxonomy.buildHref("index.html", { cuisine: representative.cuisine, category: representative.category, country: getActiveCountry(), menu: state.menu }) },
            ].map((item) => `
                <a href="${item.href}" class="flex items-center justify-between rounded-2xl bg-slate-950/70 px-4 py-3 text-sm text-white hover:bg-slate-800">
                    <span>${item.icon} ${item.title}</span>
                    <span class="text-slate-400">이동</span>
                </a>
            `).join("");

            document.getElementById("affiliateRail").innerHTML = representative.affiliateLinks.map((item) => `
                <a href="${item.url}" target="_blank" rel="noopener noreferrer sponsored" class="block rounded-2xl bg-slate-950/70 px-4 py-3 text-sm text-white hover:bg-slate-800">
                    <div class="flex items-center justify-between">
                        <span>${item.emoji} ${item.label}</span>
                        <span class="text-slate-400">열기</span>
                    </div>
                    <p class="mt-2 text-xs text-slate-500">${item.keyword}</p>
                </a>
            `).join("");
            document.getElementById("affiliateDisclosure").textContent = taxonomy.affiliateMeta.disclosure;
        }

        function toggleLike(postId) {
            const post = feedPosts.find((item) => item.id === postId);
            if (!post) return;
            post.liked = !post.liked;
            post.likes += post.liked ? 1 : -1;
            document.getElementById(`like-icon-${postId}`).textContent = post.liked ? "❤️" : "🤍";
            document.getElementById(`like-count-${postId}`).textContent = post.likes;
        }

        function toggleFollow(author) {
            showSuccess(`${author}을(를) 팔로우했습니다.`);
        }

        function renderRatingButtons() {
            document.getElementById("ratingButtons").innerHTML = [1, 2, 3, 4, 5].map((value) => `
                <button onclick="setRating(${value})" class="rounded-xl px-3 py-2 text-sm ${activeRating === value ? 'bg-orange-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}">${"⭐".repeat(value)}</button>
            `).join("");
        }

        function setRating(value) {
            activeRating = value;
            renderRatingButtons();
        }

        function openCommentModal(postId) {
            activePostId = postId;
            const post = feedPosts.find((item) => item.id === postId);
            document.getElementById("commentRecipeName").textContent = post ? post.title : "피드 반응";
            document.getElementById("commentText").value = "";
            renderRatingButtons();
            document.getElementById("commentModal").classList.remove("hidden");
            document.getElementById("commentModal").classList.add("flex");
        }

        function closeCommentModal() {
            document.getElementById("commentModal").classList.add("hidden");
            document.getElementById("commentModal").classList.remove("flex");
            activePostId = null;
        }

        function submitComment() {
            const text = document.getElementById("commentText").value.trim();
            if (!text) {
                showError("댓글을 입력하세요.");
                return;
            }
            showSuccess(`${activeRating}점 의견을 남겼습니다.`);
            closeCommentModal();
        }

        function copyShareLink(postId) {
            const url = taxonomy.buildHref("feed.html", { ...state, recipe: feedPosts.find((item) => item.id === postId)?.recipeId || "" });
            navigator.clipboard.writeText(url).then(() => showSuccess("피드 링크를 복사했습니다."));
        }

        function render() {
            renderViewFilters();
            renderPreferences();
            renderFeed();
            renderRecommendations();
        }

        function init() {
            if (!state.cuisine || !taxonomy.cuisineMeta[state.cuisine]) {
                state.cuisine = state.country ? resolveDefaultCuisine() : "";
            }
            render();
            document.getElementById("commentModal").addEventListener("click", (event) => {
                if (event.target.id === "commentModal") closeCommentModal();
            });
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
    <script src="../mobile-optimization.js" defer></script>
</body>
</html>
