<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#111827">
    <title>쇼핑리스트 - CooCook</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23ea580c'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' font-size='28' font-family='Arial' fill='white'%3ECC%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../platform/api.js"></script>
    <script src="./coocook-taxonomy.js"></script>
    <link rel="stylesheet" href="../responsive-framework.css">
    <style>
        body { font-family: "Inter", sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.82); backdrop-filter: blur(10px); }
        .item-card { transition: transform 0.2s ease, border-color 0.2s ease; }
        .item-card:hover { transform: translateY(-2px); }
        .modal-overlay { backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 shrink-0 overflow-y-auto border-r border-slate-800 bg-slate-900">
            <div class="border-b border-slate-800 p-6">
                <a href="index.html" class="flex items-center gap-3">
                    <span class="text-2xl">🛒</span>
                    <div>
                        <h1 class="text-sm font-bold text-white">CooCook</h1>
                        <p class="text-xs text-slate-400">쇼핑리스트 워크스페이스</p>
                    </div>
                </a>
            </div>

            <nav class="soft-nav-tree flex-1 space-y-2 p-6">
                <a href="index.html" class="soft-nav-link flex items-center gap-3 rounded-lg px-4 py-2.5 text-slate-300 hover:bg-slate-800">🧭 허브</a>
                <a href="recipes.html" class="soft-nav-link flex items-center gap-3 rounded-lg px-4 py-2.5 text-slate-300 hover:bg-slate-800">📖 레시피</a>
                <a href="shopping-list.html" class="soft-nav-link flex items-center gap-3 rounded-lg bg-orange-600 px-4 py-2.5 font-medium text-white">🛒 쇼핑리스트</a>
                <a href="feed.html" class="soft-nav-link flex items-center gap-3 rounded-lg px-4 py-2.5 text-slate-300 hover:bg-slate-800">📰 피드</a>
            </nav>

            <div class="space-y-3 border-t border-slate-800 p-6">
                <button onclick="openCreateModal()" class="w-full rounded-lg bg-orange-600 px-4 py-2 text-sm font-medium text-white hover:bg-orange-500">+ 레시피 추가</button>
                <button id="sessionActionButton" class="w-full rounded-lg px-4 py-2 text-left text-slate-200 hover:bg-slate-800">로그아웃</button>
            </div>
        </aside>

        <div class="flex flex-1 flex-col overflow-hidden">
            <header class="flex h-16 shrink-0 items-center justify-between border-b border-slate-800 bg-slate-900 px-6">
                <button class="hamburger" aria-label="메뉴 열기" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
                <div>
                    <h2 class="text-xl font-bold text-white">연결형 쇼핑리스트</h2>
                    <p class="text-xs text-slate-400">선택한 레시피 문맥에 맞춰 재료를 카테고리별로 정리합니다.</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-400">예상 총액</p>
                    <p id="totalPrice" class="text-lg font-bold text-orange-400">-</p>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <section class="grid gap-4 xl:grid-cols-[1.1fr_0.9fr]">
                    <div id="contextBanner" class="overflow-hidden rounded-3xl border border-slate-800"></div>
                    <div class="glass-card space-y-4 rounded-3xl border border-slate-800 p-5">
                        <div>
                            <p class="text-sm text-slate-400">현재 리스트 해석</p>
                            <p id="listHeadline" class="mt-2 text-2xl font-bold text-white"></p>
                            <p id="listCopy" class="mt-2 text-sm leading-6 text-slate-300"></p>
                        </div>
                        <div id="summaryStats" class="grid gap-3 sm:grid-cols-3"></div>
                        <div id="flowActions" class="space-y-3"></div>
                    </div>
                </section>

                <section class="mt-6 grid gap-6 xl:grid-cols-[1.5fr_0.9fr]">
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-white">재료 카테고리별 정리</h3>
                                <p class="text-sm text-slate-400">채소, 양념, 단백질처럼 구매 동선 기준으로 다시 묶었습니다.</p>
                            </div>
                            <button onclick="clearAll()" class="rounded-xl bg-slate-800 px-4 py-2 text-sm text-white hover:bg-slate-700">전체 비우기</button>
                        </div>
                        <div id="itemsByCategory" class="space-y-4"></div>
                    </div>

                    <div class="space-y-4">
                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <h3 class="font-semibold text-white">카테고리 비용</h3>
                            <div id="categorySummary" class="mt-4 space-y-3"></div>
                        </div>
                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <h3 class="font-semibold text-white">연결된 레시피</h3>
                            <div id="selectedRecipes" class="mt-4 space-y-3"></div>
                        </div>
                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <h3 class="font-semibold text-white">바로 이어가기</h3>
                            <div id="nextRoutes" class="mt-4 space-y-3"></div>
                        </div>
                        <div class="glass-card rounded-3xl border border-slate-800 p-5">
                            <h3 class="font-semibold text-white">제휴 상품 링크</h3>
                            <div id="affiliatePanel" class="mt-4 space-y-3"></div>
                            <p id="affiliateDisclosure" class="mt-4 text-xs text-slate-500"></p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div id="createModal" class="modal-overlay fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-4">
        <div class="w-full max-w-2xl rounded-3xl border border-slate-700 bg-slate-900">
            <div class="flex items-center justify-between border-b border-slate-800 px-6 py-4">
                <div>
                    <p class="text-xs text-slate-400">레시피 추가</p>
                    <h3 class="mt-1 text-xl font-bold text-white">리스트에 연결할 레시피를 선택하세요</h3>
                </div>
                <button onclick="closeCreateModal()" class="text-2xl text-slate-400 hover:text-white">×</button>
            </div>
            <div class="space-y-4 p-6">
                <div id="modalRecipeFilters" class="flex flex-wrap gap-2"></div>
                <div id="recipesList" class="grid max-h-[50vh] gap-3 overflow-y-auto"></div>
            </div>
            <div class="border-t border-slate-800 px-6 py-4">
                <button onclick="appendSelectedRecipes()" class="w-full rounded-2xl bg-orange-600 px-4 py-3 text-sm font-medium text-white hover:bg-orange-500">선택한 레시피 추가</button>
            </div>
        </div>
    </div>

    <script src="./shopping-list-app.js" defer></script>
    <script src="../mobile-optimization.js" defer></script>
</body>
</html>
