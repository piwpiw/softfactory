        .field:focus { outline: none; border-color: rgba(99, 102, 241, 0.9); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18); }

            <div class="p-6 border-t border-slate-800 soft-user-panel"><div class="flex items-center justify-between"><div><p class="text-sm font-medium text-white" id="userName">사용자</p><p class="text-xs text-slate-400" id="userEmail">demo@softfactory.com</p></div><button onclick="logout()" class="p-2 hover:bg-slate-800 rounded-lg transition" title="로그아웃" type="button">🚪</button></div></div>
        </aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="soft-topbar px-6 py-4 flex items-start justify-between gap-4 shrink-0">
                <div><p class="text-xs uppercase tracking-[0.2em] text-slate-500 mb-2">Settings</p><h2 class="text-xl font-bold text-white">워크스페이스 설정</h2><p class="text-sm text-slate-400 mt-1">조직, 알림, 데이터 정책, 브랜드 기준을 운영 기준에 맞게 관리합니다.</p></div>
                <div class="flex flex-wrap gap-2"><button class="soft-btn px-3 py-2 rounded-lg text-sm" type="button" onclick="resetForm()">변경 취소</button><button class="soft-btn soft-btn-primary px-3 py-2 rounded-lg text-sm" type="button" onclick="saveSettings()">저장</button></div>
            </header>
            <main id="main" class="flex-1 overflow-y-auto soft-main space-y-6">
                <section class="soft-card p-5"><div class="flex flex-wrap gap-2" role="tablist" aria-label="설정 탭">
                    <button class="settings-tab active" data-tab="organization" type="button">조직 정보</button>
                    <button class="settings-tab" data-tab="notifications" type="button">알림 정책</button>
                    <button class="settings-tab" data-tab="branding" type="button">브랜드</button>
                    <button class="settings-tab" data-tab="data" type="button">데이터 정책</button>
                    <button class="settings-tab" data-tab="advanced" type="button">고급</button>
                </div></section>
                <section class="tab-panel space-y-6" data-panel="organization">
                    <div class="soft-card p-6"><h3 class="text-lg font-bold text-white mb-4">조직 정보</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="block"><span class="text-sm text-slate-300 mb-2 block">조직명</span><input class="field" id="orgName" value="SoftFactory Platform"></label>
                        <label class="block"><span class="text-sm text-slate-300 mb-2 block">운영 연락처</span><input class="field" id="opsEmail" value="ops@softfactory.com"></label>
                        <label class="block md:col-span-2"><span class="text-sm text-slate-300 mb-2 block">조직 소개</span><textarea class="field min-h-[120px]" id="orgDesc">운영 콘솔, Growth Automation, 마케팅 자동화를 통합 관리하는 SaaS 워크스페이스입니다.</textarea></label>
                    </div></div>
                </section>
                <section class="tab-panel space-y-6 hidden" data-panel="notifications">
                    <div class="soft-card p-6"><h3 class="text-lg font-bold text-white mb-4">알림 라우팅</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="flex items-start gap-3 rounded-xl border border-slate-700 bg-slate-900/70 p-4"><input type="checkbox" id="notifyIncident" class="mt-1 accent-indigo-500" checked><span><span class="font-semibold text-white block">장애 알림</span><span class="text-sm text-slate-400">P1, P2 장애는 Slack과 이메일로 동시에 전송합니다.</span></span></label>
                        <label class="flex items-start gap-3 rounded-xl border border-slate-700 bg-slate-900/70 p-4"><input type="checkbox" id="notifyBilling" class="mt-1 accent-indigo-500" checked><span><span class="font-semibold text-white block">청구 알림</span><span class="text-sm text-slate-400">실패 결제, 요금제 변경, 갱신 예정 알림을 전송합니다.</span></span></label>
                        <label class="flex items-start gap-3 rounded-xl border border-slate-700 bg-slate-900/70 p-4"><input type="checkbox" id="notifyGrowth" class="mt-1 accent-indigo-500" checked><span><span class="font-semibold text-white block">Growth 이벤트</span><span class="text-sm text-slate-400">DLQ 증가, Journey 실패율 상승 시 즉시 공유합니다.</span></span></label>
                        <label class="flex items-start gap-3 rounded-xl border border-slate-700 bg-slate-900/70 p-4"><input type="checkbox" id="notifyDigest" class="mt-1 accent-indigo-500"><span><span class="font-semibold text-white block">일간 다이제스트</span><span class="text-sm text-slate-400">매일 오전 9시에 KPI 스냅샷을 발송합니다.</span></span></label>
                    </div></div>
                </section>
                <section class="tab-panel space-y-6 hidden" data-panel="branding">
                    <div class="soft-card p-6"><h3 class="text-lg font-bold text-white mb-4">브랜드 가이드</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <label class="block"><span class="text-sm text-slate-300 mb-2 block">대표 컬러</span><input class="field" id="brandPrimary" value="#6366F1"></label>
                        <label class="block"><span class="text-sm text-slate-300 mb-2 block">보조 컬러</span><input class="field" id="brandSecondary" value="#0F172A"></label>
                        <label class="block"><span class="text-sm text-slate-300 mb-2 block">도메인</span><input class="field" id="brandDomain" value="softfactory-platform.vercel.app"></label>
                    </div></div>
                </section>
                <section class="tab-panel space-y-6 hidden" data-panel="data">
                    <div class="soft-card p-6"><h3 class="text-lg font-bold text-white mb-4">데이터 정책</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="block"><span class="text-sm text-slate-300 mb-2 block">로그 보관 기간</span><select class="field" id="retentionDays"><option>30일</option><option selected>90일</option><option>180일</option><option>365일</option></select></label>
                        <label class="block"><span class="text-sm text-slate-300 mb-2 block">내보내기 기본 포맷</span><select class="field" id="exportFormat"><option selected>CSV</option><option>JSON</option><option>PDF</option></select></label>
                    </div></div>
                </section>
                <section class="tab-panel space-y-6 hidden" data-panel="advanced">
                    <div class="soft-card p-6"><h3 class="text-lg font-bold text-white mb-4">고급 운영 스위치</h3><div class="space-y-4">
                        <label class="flex items-start gap-3 rounded-xl border border-slate-700 bg-slate-900/70 p-4"><input type="checkbox" id="maintenanceMode" class="mt-1 accent-indigo-500"><span><span class="font-semibold text-white block">점검 모드</span><span class="text-sm text-slate-400">사용자 대시보드에 공지 배너를 표시하고 일부 쓰기 작업을 제한합니다.</span></span></label>
                        <label class="flex items-start gap-3 rounded-xl border border-slate-700 bg-slate-900/70 p-4"><input type="checkbox" id="betaFeatures" class="mt-1 accent-indigo-500" checked><span><span class="font-semibold text-white block">베타 기능 노출</span><span class="text-sm text-slate-400">운영팀과 관리자에게만 실험 기능을 노출합니다.</span></span></label>
                    </div></div>
                </section>
            </main>
        </div>
    </div>
    <script>
        function safeText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
        function notify(message) { if (typeof showToast === 'function') { showToast(message); return; } window.alert(message); }
        function setUserInfo() { if (typeof getUser !== 'function') return; const user = getUser(); if (!user) return; safeText('userName', user.name || '사용자'); safeText('userEmail', user.email || 'demo@softfactory.com'); }
        const defaults = {};
        function cacheDefaults() { document.querySelectorAll('input, textarea, select').forEach((field) => { defaults[field.id] = field.type === 'checkbox' ? field.checked : field.value; }); }
        function resetForm() { Object.entries(defaults).forEach(([id, value]) => { const field = document.getElementById(id); if (!field) return; if (field.type === 'checkbox') field.checked = value; else field.value = value; }); notify('변경 사항을 마지막 저장 상태로 되돌렸습니다.'); }
        function saveSettings() { notify('워크스페이스 설정을 저장했습니다.'); }
        function activateTab(tab) {
            document.querySelectorAll('.settings-tab').forEach((button) => button.classList.toggle('active', button.dataset.tab === tab));
            document.querySelectorAll('.tab-panel').forEach((panel) => panel.classList.toggle('hidden', panel.dataset.panel !== tab));
        }
        document.querySelectorAll('.settings-tab').forEach((button) => { button.addEventListener('click', () => activateTab(button.dataset.tab)); });
        if (typeof requireAuth === 'function') requireAuth();
        setUserInfo();
        cacheDefaults();
    </script>
    <script src="../mobile-optimization.js" defer></script>
</body>
